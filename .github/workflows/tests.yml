name: tests

on:
  push:
    branches: [main]
  pull_request:

env:
  # TODO : adapter l'URL une fois le repo stase publié sur GitHub
  # (voir CARD_project/card/ROADMAP dans docs/dev — noms de repos en réflexion)
  STASE_GIT: "stase @ git+https://github.com/louis-heraut/stase.git"

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    name: pytest (py${{ matrix.python-version }})
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install "${{ env.STASE_GIT }}"
          pip install -e .
          pip install pytest
      - name: Run tests
        run: pytest
      - name: Lint des fiches YAML (card.schema)
        run: python -m card.schema

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check src tests scripts
