id: TSA_season
version: "1.0"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-04-26"

meta:
  en:
    variable: [TSA_DJF, TSA_MAM, TSA_JJA, TSA_SON]
    unit: "°C"
    name:
      - Annual winter temperatures
      - Annual spring temperatures
      - Annual summer temperatures
      - Annual autumn temperatures
    description:
      - "Months of December, January, and February"
      - "Months of March, April, and May"
      - "Months of June, July, and August"
      - "Months of September, October, and November"
    method:
      - "1. seasonal annual aggregation [12-01, 02-28(29)] - mean"
      - "1. seasonal annual aggregation [03-01, 05-31] - mean"
      - "1. seasonal annual aggregation [06-01, 08-31] - mean"
      - "1. seasonal annual aggregation [09-01, 11-30] - mean"
    sampling_period:
      - ["12-01", "02-28(29)"]
      - ["03-01", "05-31"]
      - ["06-01", "08-31"]
      - ["09-01", "11-30"]
    classification:
      domain: temperature
      aspect: magnitude
      season: by season
      output: series

  fr:
    variable: [TSA_DJF, TSA_MAM, TSA_JJA, TSA_SON]
    unit: "°C"
    name:
      - Températures hivernales annuelles
      - Températures printanières annuelles
      - Températures estivales annuelles
      - Températures automnales annuelles
    description:
      - "Mois de décembre, janvier et février"
      - "Mois de mars, avril et mai"
      - "Mois de juin, juillet et août"
      - "Mois de septembre, octobre et novembre"
    method:
      - "1. agrégation annuelle saisonnalisée [01-12, 28(29)-02] - moyenne"
      - "1. agrégation annuelle saisonnalisée [01-03, 31-05] - moyenne"
      - "1. agrégation annuelle saisonnalisée [01-06, 31-08] - moyenne"
      - "1. agrégation annuelle saisonnalisée [01-09, 30-11] - moyenne"
    sampling_period:
      - ["01-12", "28(29)-02"]
      - ["01-03", "31-05"]
      - ["01-06", "31-08"]
      - ["01-09", "30-11"]
    classification:
      domain: température
      aspect: intensité
      season: par saison
      output: série

  global:
    input_vars: T
    relative: false
    palette: ["#053061", "#2166AC", "#4393C3", "#92C5DE", "#D1E5F0",
              "#FDDBC7", "#F4A582", "#D6604D", "#B2182B", "#67001F"]

process:
  P1:
    func:
      TSA: [nanmean, "T"]
    time_step: year-season
    seasons: [DJF, MAM, JJA, SON]
    max_na_pct: 3
    max_na_years: 10
    compress: true
