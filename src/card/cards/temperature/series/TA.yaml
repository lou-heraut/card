id: TA
version: "1.0.1"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-04-26"

meta:
  en:
    variable: TA
    unit: "°C"
    name: Annual mean temperature
    description: ""
    method: "1. annual aggregation [09-01, 08-31] - mean"
    sampling_period: ["09-01", "08-31"]
    classification:
      domain: temperature
      phenomenon: mean temperatures
      aspect: magnitude
      season: annual
      output: series

  fr:
    variable: TA
    unit: "°C"
    name: Température moyenne annuelle
    description: ""
    method: "1. agrégation annuelle [01-09, 31-08] - moyenne"
    sampling_period: ["01-09", "31-08"]
    classification:
      domain: température
      phenomenon: températures moyennes
      aspect: intensité
      season: annuelle
      output: série

  global:
    input_vars: T
    relative: false
    palette: ["#053061", "#2166AC", "#4393C3", "#92C5DE", "#D1E5F0",
              "#FDDBC7", "#F4A582", "#D6604D", "#B2182B", "#67001F"]

process:
  P1:
    func:
      TA: [nanmean, "T"]
    sampling_period: "09-01"
    max_na_pct: 3
    max_na_years: 10
