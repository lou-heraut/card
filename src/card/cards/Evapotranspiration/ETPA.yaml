id: ETPA
version: "1.0"
authors: []
date: "2026-04-26"

meta:
  en:
    variable: ETPA
    unit: mm
    name: Annual cumulative potential evapotranspiration
    description: ""
    method: "1. annual aggregation [09-01, 08-31] - sum"
    sampling_period: ["09-01", "08-31"]
    classification:
      domain: evapotranspiration
      aspect: magnitude
      season: annual
      output: series

  fr:
    variable: ETPA
    unit: mm
    name: Cumul annuel de l'évapotranspiration potentielle
    description: ""
    method: "1. agrégation annuelle [01-09, 31-08] - somme"
    sampling_period: ["01-09", "31-08"]
    classification:
      domain: évapotranspiration
      aspect: intensité
      season: annuelle
      output: série

  global:
    input_vars: ETP
    relative: false
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    func:
      ETPA: [nansum, "ETP"]
    sampling_period: "09-01"
    max_na_pct: 3
    max_na_years: 10
