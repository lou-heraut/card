id: ETPA
version: "1.1.1"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-07-18"

meta:
  en:
    variable: ETPA
    unit: mm
    name: Annual cumulative potential evapotranspiration
    description: ""
    method: "1. annual aggregation [09-01, 08-31] - sum"
    sampling_period: ["09-01", "08-31"]
    classification:
      domain: evapotranspiration
      phenomenon: evaporative demand
      aspect: magnitude
      season: annual
      output: series

  fr:
    variable: ETPA
    unit: mm
    name: Cumul annuel de l'évapotranspiration potentielle
    description: ""
    method: "1. agrégation annuelle [01-09, 31-08] - somme"
    sampling_period: ["01-09", "31-08"]
    classification:
      domain: évapotranspiration
      phenomenon: demande évaporative
      aspect: intensité
      season: annuelle
      output: série

  global:
    input_vars: ETP
    relative: false
    palette: ["#003C30", "#01665E", "#35978F", "#80CDC1", "#C7EAE5",
              "#F6E8C3", "#DFC27D", "#BF812D", "#8C510A", "#543005"]

process:
  P1:
    func:
      ETPA: [nansum_strict, "ETP"]
    sampling_period: "09-01"
    max_na_pct: 3
    max_na_years: 10
