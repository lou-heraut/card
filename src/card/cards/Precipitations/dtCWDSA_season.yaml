id: dtCWDSA_season
version: "1.0"
authors: []
date: "2026-04-26"

meta:
  en:
    variable: [dtCWDSA_DJF, dtCWDSA_MAM, dtCWDSA_JJA, dtCWDSA_SON]
    unit: day
    name:
      - Maximum number of consecutive rainy days in winter
      - Maximum number of consecutive rainy days in spring
      - Maximum number of consecutive rainy days in summer
      - Maximum number of consecutive rainy days in autumn
    description:
      - "Maximum number of consecutive days in winter with at least 1 mm of precipitation (months of December, January, and February)"
      - "Maximum number of consecutive days in spring with at least 1 mm of precipitation (months of March, April, and May)"
      - "Maximum number of consecutive days in summer with at least 1 mm of precipitation (months of June, July, and August)"
      - "Maximum number of consecutive days in autumn with at least 1 mm of precipitation (months of September, October, and November)"
    method:
      - "1. seasonal annual aggregation [12-01, 02-28(29)] - length of the longest period with precipitation of at least 1 mm"
      - "1. seasonal annual aggregation [03-01, 05-31] - length of the longest period with precipitation of at least 1 mm"
      - "1. seasonal annual aggregation [06-01, 08-31] - length of the longest period with precipitation of at least 1 mm"
      - "1. seasonal annual aggregation [09-01, 11-30] - length of the longest period with precipitation of at least 1 mm"
    sampling_period:
      - ["12-01", "02-28(29)"]
      - ["03-01", "05-31"]
      - ["06-01", "08-31"]
      - ["09-01", "11-30"]
    classification:
      domain: precipitation
      phenomenon: wet days
      aspect: duration
      season: by season
      output: series

  fr:
    variable: [dtCWDSA_DJF, dtCWDSA_MAM, dtCWDSA_JJA, dtCWDSA_SON]
    unit: jour
    name:
      - Nombre maximal de jours pluvieux consécutifs dans l'hiver
      - Nombre maximal de jours pluvieux consécutifs au printemps
      - Nombre maximal de jours pluvieux consécutifs en été
      - Nombre maximal de jours pluvieux consécutifs en automne
    description:
      - "Nombre maximal de jours consécutifs dans l'hiver avec au moins 1 mm de précipitation (mois de décembre, janvier et février)"
      - "Nombre maximal de jours consécutifs au printemps avec au moins 1 mm de précipitation (mois de mars, avril et mai)"
      - "Nombre maximal de jours consécutifs en été avec au moins 1 mm de précipitation (mois de juin, juillet et août)"
      - "Nombre maximal de jours consécutifs en automne avec au moins 1 mm de précipitation (mois de septembre, octobre et novembre)"
    method:
      - "1. agrégation annuelle saisonnalisée [01-12, 28(29)-02] - durée de la plus longue période avec des précipitations d'au moins 1 mm"
      - "1. agrégation annuelle saisonnalisée [01-03, 31-05] - durée de la plus longue période avec des précipitations d'au moins 1 mm"
      - "1. agrégation annuelle saisonnalisée [01-06, 31-08] - durée de la plus longue période avec des précipitations d'au moins 1 mm"
      - "1. agrégation annuelle saisonnalisée [01-09, 30-11] - durée de la plus longue période avec des précipitations d'au moins 1 mm"
    sampling_period:
      - ["01-12", "28(29)-02"]
      - ["01-03", "31-05"]
      - ["01-06", "31-08"]
      - ["01-09", "30-11"]
    classification:
      domain: précipitations
      phenomenon: jours pluvieux
      aspect: durée
      season: par saison
      output: série

  global:
    input_vars: R
    relative: false
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    func:
      dtCWDSA: [apply_threshold, "R", {lim: 1, where: ">=", what: length, select: longest}]
    time_step: year-season
    seasons: [DJF, MAM, JJA, SON]
    max_na_pct: 3
    max_na_years: 10
    compress: true
