id: RAs_ratio
version: "1.0"
authors: []
date: "2026-04-26"

meta:
  en:
    variable: RAs_ratio
    unit: without unit
    name: Ratio of annual solid precipitation to total annual precipitation
    description: ""
    method: "1. annual aggregation [09-01, 08-31] - sums of total and solid precipitation\n2. no temporal aggregation - solid/total ratio"
    sampling_period: ["09-01", "08-31"]
    topic: "Precipitations, Moderate, Ratio"

  fr:
    variable: RAs_ratio
    unit: sans unité
    name: Ratio des précipitations annuelles solides sur les précipitations annuelles totales
    description: ""
    method: "1. agrégation annuelle [01-09, 31-08] - sommes des précipitations totales et solides\n2. aucune agrégation temporelle - rapport solide/total"
    sampling_period: ["01-09", "31-08"]
    topic: "Précipitations, Modérée, Ratio"

  global:
    input_vars: "R, Rs"
    relative: false
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    func:
      RA:  [nansum_strict, "R"]
      RAs: [nansum_strict, "Rs"]
    sampling_period: "09-01"
    max_na_pct: 3
    max_na_years: 10
  P2:
    func:
      RAs_ratio: [ratio, "RAs", "RA"]
