id: CR
version: "1.0"
authors: []
date: "2026-04-26"

meta:
  en:
    variable: CR
    unit: "without unit"
    name: Correction coefficient for precipitation
    description: ""
    method: "1. annual aggregation [09-01, 08-31] - sums of observed and simulated precipitation\n2. no temporal aggregation - inter-annual means\n3. no temporal aggregation - simulated/observed ratio"
    sampling_period: ["09-01", "08-31"]
    classification:
      domain: precipitation
      aspect: magnitude
      season: annual
      output: scalar

  fr:
    variable: CR
    unit: "sans unité"
    name: Coefficient correctif des précipitations
    description: ""
    method: "1. agrégation annuelle [01-09, 31-08] - sommes des précipitations observées et simulées\n2. aucune agrégation temporelle - moyennes inter-annuelles\n3. aucune agrégation temporelle - rapport simulé/observé"
    sampling_period: ["01-09", "31-08"]
    classification:
      domain: précipitations
      aspect: intensité
      season: annuelle
      output: scalaire

  global:
    input_vars: "R_obs, R_sim"
    relative: false
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    func:
      RA_obs: [nansum_strict, "R_obs"]
      RA_sim: [nansum_strict, "R_sim"]
    sampling_period: "09-01"
    max_na_pct: 3
    max_na_years: 10

  P2:
    func:
      mean-RA_obs: [nanmean, "RA_obs"]
      mean-RA_sim: [nanmean, "RA_sim"]
    time_step: none

  P3:
    func:
      CR: [ratio, "mean-RA_sim", "mean-RA_obs"]
    time_step: none
