id: dtRA50mm
version: "1.0"
authors: []
date: "2026-04-26"

meta:
  en:
    variable: dtRA50mm
    unit: day
    name: Number of extreme rain days in the year
    description: Number of days with at least 50 mm of precipitation
    method: ""
    sampling_period: ["09-01", "08-31"]
    topic: "Precipitations, Heavy, Duration"

  fr:
    variable: dtRA50mm
    unit: jour
    name: Nombre de jours de pluie extrême dans l'année
    description: Nombre de jours avec au moins 50 mm de précipitations
    method: ""
    sampling_period: ["01-09", "31-08"]
    topic: "Précipitations, Forte, Durée"

  global:
    input_vars: R
    relative: false
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    func:
      dtRA50mm: [apply_threshold, "R", {lim: 50, where: ">=", what: length, select: all}]
    sampling_period: "09-01"
    max_na_pct: 3
    max_na_years: 10
