id: RCXA5
version: "1.0"
authors: []
date: "2026-04-26"

meta:
  en:
    variable: RCXA5
    unit: mm
    name: Annual maximum of 5-day cumulative daily precipitation
    description: ""
    method: ""
    sampling_period: Month of minimum monthly precipitation
    topic: "Precipitations, Heavy, Intensity"

  fr:
    variable: RCXA5
    unit: mm
    name: Maximum annuel du cumul sur 5 jours des précipitations journalières
    description: ""
    method: ""
    sampling_period: Mois du minimum des précipitations mensuelles
    topic: "Précipitations, Forte, Intensité"

  global:
    input_vars: R
    relative: false
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    func:
      RC5: [rollsum_center, "R", {k: 5}]
    time_step: none
    keep: all
    max_na_years: 10
  P2:
    func:
      RCXA5: [nanmax, "RC5"]
    sampling_period:
      type: adaptive
      func: [nanmin, "R"]
    max_na_pct: 3
