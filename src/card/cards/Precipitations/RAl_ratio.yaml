id: RAl_ratio
version: "1.0"
authors: []
date: "2026-04-26"

meta:
  en:
    variable: RAl_ratio
    unit: without unit
    name: Ratio of annual liquid precipitation to total annual precipitation
    description: ""
    method: "1. annual aggregation [09-01, 08-31] - sums of total and liquid precipitation\n2. no temporal aggregation - liquid/total ratio"
    sampling_period: ["09-01", "08-31"]
    classification:
      domain: precipitation
      aspect: magnitude
      season: annual
      output: series

  fr:
    variable: RAl_ratio
    unit: sans unité
    name: Ratio des précipitations annuelles liquides sur les précipitations annuelles totales
    description: ""
    method: "1. agrégation annuelle [01-09, 31-08] - sommes des précipitations totales et liquides\n2. aucune agrégation temporelle - rapport liquide/total"
    sampling_period: ["01-09", "31-08"]
    classification:
      domain: précipitations
      aspect: intensité
      season: annuelle
      output: série

  global:
    input_vars: "R, Rl"
    relative: false
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    func:
      RA:  [nansum_strict, "R"]
      RAl: [nansum_strict, "Rl"]
    sampling_period: "09-01"
    max_na_pct: 3
    max_na_years: 10
  P2:
    func:
      RAl_ratio: [ratio, "RAl", "RA"]
