id: dtCWDA
version: "1.0"
authors: []
date: "2026-04-26"

meta:
  en:
    variable: dtCWDA
    unit: day
    name: Maximum number of consecutive rainy days in the year
    description: "Maximum number of consecutive days in the year with at least 1 mm of precipitation"
    method: ""
    sampling_period: ["09-01", "08-31"]
    topic: "Precipitations, Low, Duration"

  fr:
    variable: dtCWDA
    unit: jour
    name: Nombre maximal de jours pluvieux consécutifs dans l'année
    description: "Nombre maximal de jours consécutifs dans l'année avec au moins 1 mm de précipitation"
    method: ""
    sampling_period: ["01-09", "31-08"]
    topic: "Précipitations, Faibles, Durée"

  global:
    input_vars: R
    relative: false
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    func:
      dtCWDA: [apply_threshold, "R", {lim: 1, where: ">=", what: length, select: longest}]
    sampling_period: "09-01"
    max_na_pct: 3
    max_na_years: 10
