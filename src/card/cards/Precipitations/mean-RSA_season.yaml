id: mean-RSA_season
version: "1.0"
authors: []
date: "2026-04-26"

meta:
  en:
    variable: [mean-RA_DJF, mean-RA_MAM, mean-RA_JJA, mean-RA_SON]
    unit: mm
    name:
      - "Average total precipitations of each winter (months of December, January and February)"
      - "Average total precipitations of each spring (months of March, April and May)"
      - "Average total precipitations of each summer (months of June, July and August)"
      - "Average total precipitations of each fall (months of September, October and November)"
    description:
      - ""
      - ""
      - ""
      - ""
    method:
      - "1. seasonal annual aggregation [12-01, 02-28(29)] - average\n2. no temporal aggregation - average"
      - "1. seasonal annual aggregation [03-01, 05-31] - average\n2. no temporal aggregation - average"
      - "1. seasonal annual aggregation [06-01, 08-31] - average\n2. no temporal aggregation - average"
      - "1. seasonal annual aggregation [09-01, 11-30] - average\n2. no temporal aggregation - average"
    sampling_period:
      - ["12-01", "02-28(29)"]
      - ["03-01", "05-31"]
      - ["06-01", "08-31"]
      - ["09-01", "11-30"]
    topic: "Precipitations, Moderate, Intensity"

  fr:
    variable: [moyenne-RA_DJF, moyenne-RA_MAM, moyenne-RA_JJA, moyenne-RA_SON]
    unit: mm
    name:
      - Moyenne des précipitations totales de chaque hiver
      - Moyenne des précipitations totales de chaque printemps
      - Moyenne des précipitations totales de chaque été
      - Moyenne des précipitations totales de chaque automne
    description:
      - "Mois de décembre, janvier et février"
      - "Mois de mars, avril et mai"
      - "Mois de juin, juillet et août"
      - "Mois de septembre, octobre et novembre"
    method:
      - "1. agrégation annuelle saisonnalisé [01-12, 28(29)-02] - moyenne\n2. aucune agrégation temporelle - moyenne"
      - "1. agrégation annuelle saisonnalisé [01-03, 31-05] - moyenne\n2. aucune agrégation temporelle - moyenne"
      - "1. agrégation annuelle saisonnalisé [01-06, 31-08] - moyenne\n2. aucune agrégation temporelle - moyenne"
      - "1. agrégation annuelle saisonnalisé [01-09, 30-11] - moyenne\n2. aucune agrégation temporelle - moyenne"
    sampling_period:
      - ["01-12", "28(29)-02"]
      - ["01-03", "31-05"]
      - ["01-06", "31-08"]
      - ["01-09", "30-11"]
    topic: "Précipitations, Modérée, Intensité"

  global:
    input_vars: R
    to_normalise: false
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    funct:
      RA: [nansum_strict, "R"]
    time_step: year-season
    Seasons: [DJF, MAM, JJA, SON]
    NApct_lim: 3
    NAyear_lim: 10
    compress: true
  P2:
    funct:
      mean-RA_DJF: [nanmean, "RA_DJF"]
      mean-RA_MAM: [nanmean, "RA_MAM"]
      mean-RA_JJA: [nanmean, "RA_JJA"]
      mean-RA_SON: [nanmean, "RA_SON"]
    time_step: none
