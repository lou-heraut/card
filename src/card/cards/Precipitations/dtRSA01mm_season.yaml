id: dtRSA01mm_season
version: "1.0"
authors: []
date: "2026-04-26"

meta:
  en:
    variable: [dtRSA01mm_DJF, dtRSA01mm_MAM, dtRSA01mm_JJA, dtRSA01mm_SON]
    unit: day
    name:
      - Number of rainy days in winter
      - Number of rainy days in spring
      - Number of rainy days in summer
      - Number of rainy days in autumn
    description:
      - "number of days with at least 1 mm of precipitation (months of December, January, and February)"
      - "number of days with at least 1 mm of precipitation (months of March, April, and May)"
      - "number of days with at least 1 mm of precipitation (months of June, July, and August)"
      - "number of days with at least 1 mm of precipitation (months of September, October, and November)"
    method: ""
    sampling_period:
      - ["12-01", "02-28(29)"]
      - ["03-01", "05-31"]
      - ["06-01", "08-31"]
      - ["09-01", "11-30"]
    topic: "Precipitations, Low, Duration"

  fr:
    variable: [dtRSA01mm_DJF, dtRSA01mm_MAM, dtRSA01mm_JJA, dtRSA01mm_SON]
    unit: jour
    name:
      - Nombre de jours pluvieux en hiver
      - Nombre de jours pluvieux au printemps
      - Nombre de jours pluvieux en été
      - Nombre de jours pluvieux en automne
    description:
      - "Nombre de jours dans l'hiver avec au moins 1 mm de précipitations (mois de décembre, janvier et février)"
      - "Nombre de jours au printemps avec au moins 1 mm de précipitations (mois de mars, avril et mai)"
      - "Nombre de jours en été avec au moins 1 mm de précipitations (mois de juin, juillet et août)"
      - "Nombre de jours en automne avec au moins 1 mm de précipitations (mois de septembre, octobre et novembre)"
    method: ""
    sampling_period:
      - ["01-12", "28(29)-02"]
      - ["01-03", "31-05"]
      - ["01-06", "31-08"]
      - ["01-09", "30-11"]
    topic: "Précipitations, Faibles, Durée"

  global:
    input_vars: R
    relative: false
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    func:
      dtRSA01mm: [apply_threshold, "R", {lim: 1, where: ">=", what: length, select: all}]
    time_step: year-season
    seasons: [DJF, MAM, JJA, SON]
    max_na_pct: 3
    max_na_years: 10
    compress: true
