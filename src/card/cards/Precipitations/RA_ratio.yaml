id: RA_ratio
version: "1.0"
authors: []
date: "2026-04-26"

meta:
  en:
    variable: RA_ratio
    unit: without unit
    name: Precipitation ratio
    description: ""
    method: ""
    sampling_period: ["09-01", "08-31"]
    topic: "Precipitations, Moderate, Ratio"

  fr:
    variable: RA_ratio
    unit: sans unité
    name: Ratio des précipitations
    description: ""
    method: ""
    sampling_period: ["01-09", "31-08"]
    topic: "Précipitations, Modérée, Ratio"

  global:
    input_vars: "R, Rl, Rs"
    relative: false

process:
  P1:
    func:
      RA:  [nansum_strict, "R"]
      RAl: [nansum_strict, "Rl"]
      RAs: [nansum_strict, "Rs"]
    sampling_period: "09-01"
    max_na_pct: 3
    max_na_years: 10
  P2:
    func:
      mean-RA:  [nanmean, "RA"]
      mean-RAl: [nanmean, "RAl"]
      mean-RAs: [nanmean, "RAs"]
    time_step: none
  P3:
    func:
      Rl_ratio: [ratio, "mean-RAl", "mean-RA"]
      Rs_ratio: [ratio, "mean-RAs", "mean-RA"]
    time_step: none
