id: dtRA01mm
version: "1.0"
authors: []
date: "2026-04-26"

meta:
  en:
    variable: dtRA01mm
    unit: day
    name: Number of rainy days in the year
    description: "Number of days with at least 1 mm of precipitation"
    method: ""
    sampling_period: ["09-01", "08-31"]
    topic: "Precipitations, Low, Duration"

  fr:
    variable: dtRA01mm
    unit: jour
    name: Nombre de jours pluvieux dans l'année
    description: "Nombre de jours avec au moins 1 mm de précipitations"
    method: ""
    sampling_period: ["01-09", "31-08"]
    topic: "Précipitations, Faibles, Durée"

  global:
    input_vars: R
    to_normalise: false
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    funct:
      dtRA01mm: [apply_threshold, "R", {lim: 1, where: ">=", what: length, select: all}]
    sampling_period: "09-01"
    NApct_lim: 3
    NAyear_lim: 10
