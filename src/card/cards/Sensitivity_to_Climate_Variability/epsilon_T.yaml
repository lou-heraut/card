id: epsilon_T
version: "1.0"
authors: []
date: "2026-04-26"

meta:
  en:
    variable: epsilon_T
    unit: without unit
    name: Annual flow elasticity to air temperatures
    description: ""
    method: "1. annual aggregation [Month of minimum monthly flows] - mean flow and mean temperatures\n2. no temporal aggregation - calculation of elasticity ε"
    sampling_period: Month of minimum monthly flows
    topic: "Flow / Temperature, Sensitivity to Climate Variability"

  fr:
    variable: epsilon_T
    unit: sans unité
    name: Élasticité annuelle du débit aux températures de l'air
    description: ""
    method: "1. agrégation annuelle [Mois du minimum des débits mensuels] - débit moyen et températures moyennes\n2. aucune agrégation temporelle - calcul de l'élasticité ε"
    sampling_period: Mois du minimum des débits mensuels
    topic: "Débit / Température, Sensibilité à la variabilité climatique"

  global:
    input_vars: "Q, T"
    source: |
      SANKARASUBRAMANIAN, A., R. M. VOGEL et J. F. LIMBRUNNER (1991). « Climate elasticity of streamflow in the United States ». In : Water Resour. Res. 37, p. 1771-1781.

process:
  P1:
    func:
      QA: [nanmean, "Q"]
      TA: [nanmean, "T"]
    sampling_period:
      type: adaptive
      func: [nanmin, "Q"]
    max_na_pct: 3
    max_na_years: 10
  P2:
    func:
      epsilon_T: [elasticity, {Q: "QA", X: "TA"}]
    time_step: none
