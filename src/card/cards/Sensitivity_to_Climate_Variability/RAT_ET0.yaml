id: RAT_ET0
version: "1.0"
authors: []
date: "2026-04-26"

meta:
  en:
    variable: RAT_ET0
    unit: bool
    name: Robustness test to a variation in reference evapotranspiration
    description: ""
    method: "1. annual aggregation [09-01, 08-31] - relative bias of simulated vs observed flow, and mean reference evapotranspiration\n2. no temporal aggregation - RAT with a 5 % significance level"
    sampling_period: ["09-01", "08-31"]
    classification:
      domain: [flow, evapotranspiration]
      season: annual
      output: scalar
      purpose: climate sensitivity

  fr:
    variable: RAT_ET0
    unit: bool
    name: Test de robustesse à une variation d'évapotranspiration de référence
    description: ""
    method: "1. agrégation annuelle [01-09, 31-08] - biais relatif entre débits simulés et observés, et évapotranspiration de référence moyenne\n2. aucune agrégation temporelle - RAT avec un seuil de significativité de 5 %"
    sampling_period: ["01-09", "31-08"]
    classification:
      domain: [débit, évapotranspiration]
      season: annuelle
      output: scalaire
      purpose: sensibilité climatique

  global:
    input_vars: "Q_obs, Q_sim, ET0_obs"
    relative: false
    source: |
      NICOLLE, P. et al. (2021). « Technical note : RAT – a robustness assessment test for calibrated and uncalibrated hydrological models ». In : Hydrol. Earth Syst. Sci. 25, p. 5013-5027. DOI : 10.5194/hess-25-5013-2021.

process:
  P1:
    func:
      BiasA:  [bias, "Q_obs", "Q_sim"]
      ET0A:   [nanmean, "ET0_obs"]
    sampling_period: "09-01"
    max_na_pct: 3
    max_na_years: 10
  P2:
    func:
      RAT_ET0: [RAT, "BiasA", "ET0A", {thresh: 0.05}]
    time_step: none
