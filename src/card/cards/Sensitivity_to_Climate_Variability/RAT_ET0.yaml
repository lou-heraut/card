id: RAT_ET0
version: "1.0"
authors: []
date: "2026-04-26"

meta:
  en:
    variable: RAT_ET0
    unit: bool
    name: Robustness test to a variation in reference evapotranspiration
    description: ""
    method: "1. annual aggregation [09-01, 08-31] - Qref − Qsim and mean temperatures\n2. no temporal aggregation - RAT with a 10 % risk"
    sampling_period: ["09-01", "08-31"]
    topic: "Flow / Evapotranspiration, Sensitivity to Climate Variability"

  fr:
    variable: RAT_ET0
    unit: bool
    name: Test de robustesse à une variation d'évapotranspiration de référence
    description: ""
    method: "1. agrégation annuelle [01-09, 31-08] - Qref − Qsim et températures moyennes\n2. aucune agrégation temporelle - RAT avec un risque de 10 %"
    sampling_period: ["01-09", "31-08"]
    topic: "Débit / Évapotranspiration, Sensibilité à la variabilité climatique"

  global:
    input_vars: "Q_obs, Q_sim, ET0_obs"
    to_normalise: false
    source: |
      NICOLLE, P. et al. (2021). « Technical note : RAT – a robustness assessment test for calibrated and uncalibrated hydrological models ». In : Hydrol. Earth Syst. Sci. 25, p. 5013-5027. DOI : 10.5194/hess-25-5013-2021.

process:
  P1:
    funct:
      BiasA:  [bias, "Q_obs", "Q_sim"]
      ET0A:   [nanmean, "ET0_obs"]
    sampling_period: "09-01"
    NApct_lim: 3
    NAyear_lim: 10
  P2:
    funct:
      RAT_ET0: [RAT, "BiasA", "ET0A", {thresh: 0.05}]
    time_step: none
