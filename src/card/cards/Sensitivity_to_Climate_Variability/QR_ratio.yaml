id: QR_ratio
version: "1.0"
authors: []
date: "2026-04-26"

meta:
  en:
    variable: QR_ratio
    unit: "m^{3}.s^{-1}.mm^{-1}"
    name: Ratio of cumulative flow to cumulative precipitation
    description: >-
      Ratio between the sum of flows and the sum of precipitation.
      Proportional to the runoff coefficient through the basin area
      (dimensionless coefficient = 86.4 × ratio / area in km²): suited
      to temporal monitoring of a station, not to comparison between
      basins
    method: "1. no temporal aggregation - sum of flows divided by sum of precipitation"
    topic: "Flow / Precipitations, Sensitivity to Climate Variability"

  fr:
    variable: QR_ratio
    unit: "m^{3}.s^{-1}.mm^{-1}"
    name: Rapport des cumuls débit sur précipitations
    description: >-
      Rapport entre la somme des débits et la somme des précipitations.
      Proportionnel au coefficient de ruissellement via la surface du
      bassin (coefficient adimensionnel = 86,4 × rapport / surface en
      km²) : adapté au suivi temporel d'une station, pas à la
      comparaison entre bassins
    method: "1. aucune agrégation temporelle - somme des débits divisée par la somme des précipitations"
    topic: "Débit / Précipitations, Sensibilité à la variabilité climatique"

  global:
    input_vars: "Q, R"

process:
  P1:
    func:
      QR_ratio: [runoff_coefficient, "Q", "R"]
    time_step: none
    max_na_years: 10
