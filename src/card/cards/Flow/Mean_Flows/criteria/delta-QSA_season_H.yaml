              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]
    horizons:
      H0: ["1976-01-01", "2005-08-31"]
      H1: ["2021-01-01", "2050-12-31"]
      H2: ["2041-01-01", "2070-12-31"]
      H3: ["2070-01-01", "2099-12-31"]

process:
  P1:
    func:
      QSA: [nanmean, "Q"]
    time_step: year-season
    seasons: [DJF, MAM, JJA, SON]
    max_na_pct: 3
    max_na_years: 10
    compress: true

  P2:
    func:
      delta-QSA_DJF_H1: [delta, "QSA_DJF", "date", {past: $H0, future: $H1, relative: true}]
      delta-QSA_DJF_H2: [delta, "QSA_DJF", "date", {past: $H0, future: $H2, relative: true}]
