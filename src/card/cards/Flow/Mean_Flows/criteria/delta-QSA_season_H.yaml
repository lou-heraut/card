      delta-QSA_MAM_H3: [delta, "QSA_MAM", "date", {past: $H0, future: $H3, relative: true}]
      delta-QSA_JJA_H1: [delta, "QSA_JJA", "date", {past: $H0, future: $H1, relative: true}]
      delta-QSA_JJA_H2: [delta, "QSA_JJA", "date", {past: $H0, future: $H2, relative: true}]
      delta-QSA_JJA_H3: [delta, "QSA_JJA", "date", {past: $H0, future: $H3, relative: true}]
