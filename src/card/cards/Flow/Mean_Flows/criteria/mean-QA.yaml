id: mean-QA
version: "1.0"
authors: []
date: "2026-04-26"

meta:
  en:
    variable: mean-QA
    unit: "m^{3}.s^{-1}"
    name: Average of annual average daily flow
    description: ""
    method: |
      1. annual aggregation [09-01, 08-31] - mean
      2. no temporal aggregation - average
    sampling_period: ["09-01", "08-31"]
    topic: "Flow, Mean Flows, Intensity"

  fr:
    variable: moyenne-QA
    unit: "m^{3}.s^{-1}"
    name: Moyenne des moyennes annuelles du débit journalier
    description: ""
    method: |
      1. agrégation annuelle [01-09, 31-08] - moyenne
      2. aucune agrégation temporelle - moyenne
    sampling_period: ["01-09", "31-08"]
    topic: "Débit, Moyennes Eaux, Intensité"

  global:
    input_vars: Q
    preferred_sampling_period: "09-01"

process:
  P1:
    funct:
      QA: [nanmean, "Q"]
    sampling_period: "09-01"
    NApct_lim: 3
    NAyear_lim: 10

  P2:
    funct:
      mean-QA: [nanmean, "QA"]
    time_step: none
