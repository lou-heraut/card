id: mean-QA
version: "1.0"
authors: []
date: "2026-04-26"

meta:
  en:
    variable: mean-QA
    unit: "m^{3}.s^{-1}"
    name: Inter-annual mean of the annual mean daily flow
    description: ""
    method: |
      1. annual aggregation [09-01, 08-31] - mean
      2. no temporal aggregation - average
    sampling_period: ["09-01", "08-31"]
    classification:
      domain: flow
      phenomenon: mean flows
      aspect: magnitude
      season: annual
      output: scalar

  fr:
    variable: moyenne-QA
    unit: "m^{3}.s^{-1}"
    name: Moyenne inter-annuelle du débit moyen annuel
    description: ""
    method: |
      1. agrégation annuelle [01-09, 31-08] - moyenne
      2. aucune agrégation temporelle - moyenne
    sampling_period: ["01-09", "31-08"]
    classification:
      domain: débit
      phenomenon: moyennes eaux
      aspect: intensité
      season: annuelle
      output: scalaire

  global:
    input_vars: Q
    preferred_sampling_period: "09-01"

process:
  P1:
    func:
      QA: [nanmean, "Q"]
    sampling_period: "09-01"
    max_na_pct: 3
    max_na_years: 10

  P2:
    func:
      mean-QA: [nanmean, "QA"]
    time_step: none
