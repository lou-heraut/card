id: delta-QA_H
version: "1.0"
authors: []
date: "2026-04-26"

meta:
  en:
    variable: [delta-QA_H1, delta-QA_H2, delta-QA_H3]
    unit: "%"
    name:
      - "Average change of annual mean daily discharge between the near
         horizon and historical period"
      - "Average change of annual mean daily discharge between the middle
         horizon and historical period"
      - "Average change of annual mean daily discharge between the distant
         horizon and historical period"
    description: ""
    method: |
      1. annual aggregation [09-01, 08-31] - mean
      2. no temporal aggregation - calculation of the average change between
         the historical period and the {horizon} horizon
    horizon_labels: {H1: near, H2: middle, H3: distant}
    sampling_period: ["09-01", "08-31"]
    topic: "Flow, Mean Flows, Intensity"

  fr:
    variable: [delta-QA_H1, delta-QA_H2, delta-QA_H3]
    unit: "%"
    name:
      - "Changement moyen de la moyenne annuelle du débit journalier entre
         l'horizon proche et la période historique"
      - "Changement moyen de la moyenne annuelle du débit journalier entre
         l'horizon moyen et la période historique"
      - "Changement moyen de la moyenne annuelle du débit journalier entre
         l'horizon lointain et la période historique"
    description: ""
    method: |
      1. agrégation annuelle [01-09, 31-08] - moyenne
      2. aucune agrégation temporelle - calcul du changement moyen entre la
         période historique et l'horizon {horizon}
    horizon_labels: {H1: proche, H2: moyen, H3: lointain}
    sampling_period: ["01-09", "31-08"]
    topic: "Débit, Moyennes Eaux, Intensité"

  global:
    input_vars: Q
    preferred_sampling_period: "09-01"
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]
    horizons:
      H0: ["1976-01-01", "2005-08-31"]
      H1: ["2021-01-01", "2050-12-31"]
      H2: ["2041-01-01", "2070-12-31"]
      H3: ["2070-01-01", "2099-12-31"]

process:
  P1:
    func:
      QA: [nanmean, "Q"]
    sampling_period: "09-01"
    max_na_pct: 3
    max_na_years: 10

  P2:
    func:
      delta-QA_H1: [delta, "QA", "date", {past: $H0, future: $H1, relative: true}]
      delta-QA_H2: [delta, "QA", "date", {past: $H0, future: $H2, relative: true}]
      delta-QA_H3: [delta, "QA", "date", {past: $H0, future: $H3, relative: true}]
    time_step: none
