id: FDC_H0
version: "1.0"
authors: []
date: "2026-04-30"

meta:
  en:
    variable: [FDC_H0_p, FDC_H0_Q]
    unit: [without unit, "m^{3}.s^{-1}"]
    name:
      - "Exceedance probabilities of the flow duration curve (historical period)"
      - "Flow quantiles of the flow duration curve (historical period)"
    description: ""
    method: "1. no temporal aggregation - flow duration curves with 1000 points spaced according to a centered reduced normal distribution."
    topic: "Flow, Mean Flows, Intensity"

  fr:
    variable: [CDC_H0_p, CDC_H0_Q]
    unit: [sans unité, "m^{3}.s^{-1}"]
    name:
      - "Probabilités de dépassement de la courbe des débits classés (période historique)"
      - "Quantiles de débit de la courbe des débits classés (période historique)"
    description: ""
    method: "1. aucune agrégation temporelle - courbes des débits classés avec 1000 points espacés selon une loi normale centrée réduite"
    topic: "Débit, Moyennes Eaux, Intensité"

  global:
    input_vars: Q

process:
  P1:
    func:
      FDC_H0_p: [fdc_probabilities, {n: 1000, norm_spacing: true}]
      FDC_H0_Q: [fdc_quantiles, "Q", {n: 1000, norm_spacing: true}]
    period: ["1976-01-01", "2005-08-31"]
    time_step: none
    max_na_years: 10
