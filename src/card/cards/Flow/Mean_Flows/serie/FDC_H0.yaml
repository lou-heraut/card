id: FDC_H0
version: "1.0"
authors: []
date: "2026-04-30"

meta:
  en:
    variable: FDC_H0
    unit: "m^{3}.s^{-1}"
    name: Flow duration curve of the historical period
    description: >-
      Curve of flow quantiles as a function of exceedance probability over the historical period [1976-01-01, 2005-08-31];
      the card outputs its two coordinates (FDC_H0_p, unitless
      probabilities; FDC_H0_Q, flow quantiles)
    method: "1. no temporal aggregation - flow duration curves with 1000 points spaced according to a centered reduced normal distribution."
    topic: "Flow, Mean Flows, Intensity"

  fr:
    variable: CDC_H0
    unit: "m^{3}.s^{-1}"
    name: Courbe des débits classés de la période historique
    description: >-
      Courbe des quantiles de débit en fonction de la probabilité de
      dépassement sur la période historique [1976-01-01, 2005-08-31] ;
      la fiche produit ses deux coordonnées (FDC_H0_p, probabilités
      sans unité ; FDC_H0_Q, quantiles de débit)
    method: "1. aucune agrégation temporelle - courbes des débits classés avec 1000 points espacés selon une loi normale centrée réduite"
    topic: "Débit, Moyennes Eaux, Intensité"

  global:
    input_vars: Q

process:
  P1:
    func:
      FDC_H0_p: [fdc_probabilities, {n: 1000, norm_spacing: true}]
      FDC_H0_Q: [fdc_quantiles, "Q", {n: 1000, norm_spacing: true}]
    period: ["1976-01-01", "2005-08-31"]
    time_step: none
    max_na_years: 10
