id: QA
version: "1.0"
authors: []
date: "2026-04-30"

meta:
  en:
    variable: QA
    unit: "m^{3}.s^{-1}"
    name: Annual mean daily discharge
    description: ""
    method: "1. annual aggregation [09-01, 08-31] - mean"
    sampling_period: ["09-01", "08-31"]
    classification:
      domain: flow
      phenomenon: mean flows
      aspect: magnitude
      season: annual
      output: series

  fr:
    variable: QA
    unit: "m^{3}.s^{-1}"
    name: Moyenne annuelle du débit journalier
    description: ""
    method: "1. agrégation annuelle [01-09, 31-08] - moyenne"
    sampling_period: ["01-09", "31-08"]
    classification:
      domain: débit
      phenomenon: moyennes eaux
      aspect: intensité
      season: annuelle
      output: série

  global:
    input_vars: Q
    preferred_sampling_period: "09-01"
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    func:
      QA: [nanmean, "Q"]
    sampling_period: "09-01"
    max_na_pct: 3
    max_na_years: 10
