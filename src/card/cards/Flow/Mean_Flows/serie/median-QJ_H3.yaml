id: median-QJ_H3
version: "1.0"
authors: []
date: "2026-04-30"

meta:
  en:
    variable: median-QJ_H3
    unit: "m^{3}.s^{-1}"
    name: Median inter-annual flow of distant horizon
    description: ""
    method: "1. aggregation by day of the year over the distant horizon [2070-01-01, 2099-12-31] - median"
    topic: "Flow, Mean Flows, Intensity"

  fr:
    variable: mediane-QJ_H3
    unit: "m^{3}.s^{-1}"
    name: "Débit médian inter-annuel de l'horizon lointain"
    description: ""
    method: "1. agrégation par jour de l'année sur l'horizon lointain [2070-01-01, 2099-12-31] - médiane"
    topic: "Débit, Moyennes Eaux, Intensité"

  global:
    input_vars: Q

process:
  P1:
    func:
      median-QJ_H3: [nanmedian, "Q"]
    period: ["2070-01-01", "2099-12-31"]
    time_step: yearday
