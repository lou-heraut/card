id: FDC
version: "1.0"
authors: []
date: "2026-04-30"

meta:
  en:
    variable: FDC
    unit: "m^{3}.s^{-1}"
    name: Flow duration curve
    description: ""
    method: "1. no temporal aggregation - flow duration curves with 1000 points spaced according to a centered reduced normal distribution."
    topic: "Flow, Mean Flows, Intensity"

  fr:
    variable: CDC
    unit: "m^{3}.s^{-1}"
    name: Courbe des débits classés
    description: ""
    method: "1. aucune agrégation temporelle - courbes des débits classés avec 1000 points espacés selon une loi normale centrée réduite"
    topic: "Débit, Moyennes Eaux, Intensité"

  global:
    input_vars: Q

process:
  P1:
    funct:
      FDC_p: [fdc_probabilities, {n: 1000, norm_spacing: true}]
      FDC_Q: [fdc_quantiles, "Q", {n: 1000, norm_spacing: true}]
    time_step: none
    NAyear_lim: 10
