id: median-QJ_H0
version: "1.0"
authors: []
date: "2026-04-30"

meta:
  en:
    variable: median-QJ_H0
    unit: "m^{3}.s^{-1}"
    name: Median inter-annual flow of historical period
    description: ""
    method: "1. aggregation by day of the year over the historical period [1976-01-01, 2005-08-31] - median"
    topic: "Flow, Mean Flows, Intensity"

  fr:
    variable: mediane-QJ_H0
    unit: "m^{3}.s^{-1}"
    name: Débit médian inter-annuel de la période historique
    description: ""
    method: "1. agrégation par jour de l'année sur la période historique [1976-01-01, 2005-08-31] - médiane"
    topic: "Débit, Moyennes Eaux, Intensité"

  global:
    input_vars: Q

process:
  P1:
    func:
      median-QJ_H0: [nanmedian, "Q"]
    period: ["1976-01-01", "2005-08-31"]
    time_step: yearday
