id: QJC10
version: "1.0"
authors: []
date: "2026-04-30"

meta:
  en:
    variable: QJC10
    unit: "m^{3}.s^{-1}"
    name: Mean monthly discharge averaged over 10 days
    description: ""
    method: ""
    topic: "Flow, Mean Flows, Intensity"

  fr:
    variable: QJC10
    unit: "m^{3}.s^{-1}"
    name: Débit moyen mensuel moyenné sur 10 jours
    description: ""
    method: ""
    topic: "Débit, Moyennes Eaux, Intensité"

  global:
    input_vars: Q

process:
  P1:
    funct:
      QJ: [nanmean, "Q_obs"]
    time_step: yearday
    keep: all
    NApct_lim: 3
    NAyear_lim: 10

  P2:
    funct:
      QJC10: [rollmean_center, "QJ", {k: 10, cyclical: true}]
    time_step: none
    keep: [QJC10]
