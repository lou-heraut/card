  fr:
    variable: QM_H0
    unit: "m^{3}.s^{-1}"
    name: Débit moyen mensuel de la période historique
    description: ""
    method: "1. agrégation mensuelle sur la période historique [1976-01-01, 2005-08-31] - moyenne"
    topic: "Débit, Moyennes Eaux, Intensité"

  global:
    input_vars: Q

process:
  P1:
    func:
      QM_H0: [nanmean, "Q"]
