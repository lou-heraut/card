id: QM_H0
version: "1.0"
authors: []
date: "2026-04-30"

meta:
  en:
    variable: QM_H0
    unit: "m^{3}.s^{-1}"
    name: Mean monthly discharge of historical period
    description: ""
    method: "1. monthly aggregation over the historical period [1976-01-01, 2005-08-31] - mean"
