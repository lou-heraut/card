id: median-centerBF
version: "1.0"
authors: []
date: "2026-04-26"

meta:
  en:
    variable: median-centerBF
    unit: yearday
    name: Median center of baseflow
    description: >-
      Median of the dates at which 50 % of the annual cumulative baseflow
      is reached
    method: |
      1. annual aggregation [09-01, 08-31] - date at which the baseflow
         (Wallingford) sum Qb corresponds to 50 % of the total sum
      2. no temporal aggregation - median
    sampling_period: ["09-01", "08-31"]
    topic: "Flow, Baseflow, Seasonality"

  fr:
    variable: mediane-centreQB
    unit: "jour de l'année"
    name: Médiane du centre des écoulements lents
    description: >-
      Médiane des dates à laquelle 50 % du cumul annuel du débit de base
      sont atteints
    method: |
      1. agrégation annuelle [01-09, 31-08] - date à laquelle la somme du
         débit de base (Wallingford) Qb correspond à 50 % de la somme totale
      2. aucune agrégation temporelle - médiane
    sampling_period: ["01-09", "31-08"]
    topic: "Débit, Débit de Base, Saisonnalité"

  global:
    input_vars: Q
    source: >-
      TALLAKSEN, L. et H. VAN LANEN, éd. (2004). Hydrological drought. Processes
      and estimation methods for streamflow and groundwater. Developments in water
      science 48. Netherlands : Elsevier. ISBN : 9780444516886.
    preferred_sampling_period: "09-01"
    is_date: true
    relative: false

process:
  P1:
    func:
      centerBF: [snowmelt_timing, "Q", {fraction: 0.5, method: Wal}, true]
    sampling_period: "09-01"
    max_na_pct: 3
    max_na_years: 10

  P2:
    func:
      median-centerBF: [circular_median, "centerBF", {periodicity: 365.25}]
    time_step: none
