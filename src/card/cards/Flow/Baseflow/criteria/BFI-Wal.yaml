id: BFI-Wal
version: "1.0"
authors: []
date: "2026-04-26"

meta:
  en:
    variable: BFI-Wal
    unit: without unit
    name: Baseflow index
    description: >-
      Ratio between mean inter-annual base flow and mean inter-annual flow
    method: |
      1. no temporal aggregation - extraction of the base flow (Wallingford)
      2. no temporal aggregation - calculation of the Base Flow Index (BFI)
    topic: "Flow, Base Flow, Intensity"

  fr:
    variable: BFI-Wal
    unit: sans unité
    name: Indice de débit de base
    description: >-
      Rapport entre débit de base moyen inter-annuel et débit moyen inter-annuel
    method: |
      1. aucune agrégation temporelle - extraction du débit de base (Wallingford)
      2. aucune agrégation temporelle - calcul du BFI
    topic: "Débit, Débit de Base, Intensité"

  global:
    input_vars: Q
    source: >-
      TALLAKSEN, L. et H. VAN LANEN, éd. (2004). Hydrological drought. Processes
      and estimation methods for streamflow and groundwater. Developments in water
      science 48. Netherlands : Elsevier. ISBN : 9780444516886.
    relative: false

process:
  P1:
    func:
      BF-Wal: [baseflow, "Q", {method: Wal}]
    time_step: none
    keep: all
    max_na_years: 10

  P2:
    func:
      BFI-Wal: [BFI, "Q", "BF-Wal"]
    time_step: none
