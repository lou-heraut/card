id: delta-vBF_H
version: "1.0"
authors: []
date: "2026-04-26"

meta:
  en:
    variable: [delta-vBF_H1, delta-vBF_H2, delta-vBF_H3]
    unit: "%"
    name:
      - "Average change of annual volume generated by the baseflow between the
         near horizon and historical period"
      - "Average change of annual volume generated by the baseflow between the
         middle horizon and historical period"
      - "Average change of annual volume generated by the baseflow between the
         distant horizon and historical period"
    description: ""
    method: |
      1. annual aggregation [09-01, 08-31] - sum of volumes discharged each day
         for base flow (Wallingford)
      2. no temporal aggregation - calculation of the average change between the
         historical period and the {horizon} horizon
    horizon_labels: {H1: near, H2: middle, H3: distant}
    sampling_period: ["09-01", "08-31"]
    topic: "Flow, Baseflow, Intensity"

  fr:
    variable: [delta-vQB_H1, delta-vQB_H2, delta-vQB_H3]
    unit: "%"
    name:
      - "Changement moyen du volume annuel généré par le débit de base entre
         l'horizon proche et la période historique"
      - "Changement moyen du volume annuel généré par le débit de base entre
         l'horizon moyen et la période historique"
      - "Changement moyen du volume annuel généré par le débit de base entre
         l'horizon lointain et la période historique"
    description: ""
    method: |
      1. agrégation annuelle [01-09, 31-08] - somme des volumes écoulés chaque
         jour pour le débit de base (Wallingford)
      2. aucune agrégation temporelle - calcul du changement moyen entre la
         période historique et l'horizon {horizon}
    horizon_labels: {H1: proche, H2: moyen, H3: lointain}
    sampling_period: ["01-09", "31-08"]
    topic: "Débit, Débit de Base, Intensité"

  global:
    input_vars: Q
    source: >-
      TALLAKSEN, L. et H. VAN LANEN, éd. (2004). Hydrological drought. Processes
      and estimation methods for streamflow and groundwater. Developments in water
      science 48. Netherlands : Elsevier. ISBN : 9780444516886.
    preferred_sampling_period: "09-01"
    palette: ["#003C30", "#01665E", "#35978F", "#80CDC1", "#C7EAE5",
              "#F6E8C3", "#DFC27D", "#BF812D", "#8C510A", "#543005"]
    horizons:
      H0: ["1976-01-01", "2005-08-31"]
      H1: ["2021-01-01", "2050-12-31"]
      H2: ["2041-01-01", "2070-12-31"]
      H3: ["2070-01-01", "2099-12-31"]

process:
  P1:
    func:
      vBF: [snowmelt_volume, "Q", {method: Wal}]
    sampling_period: "09-01"
    max_na_pct: 3
    max_na_years: 10

  P2:
    func:
      delta-vBF_H1: [delta, "vBF", "date",
                     {past: $H0, future: $H1, relative: true}]
      delta-vBF_H2: [delta, "vBF", "date",
                     {past: $H0, future: $H2, relative: true}]
      delta-vBF_H3: [delta, "vBF", "date",
                     {past: $H0, future: $H3, relative: true}]
    time_step: none
