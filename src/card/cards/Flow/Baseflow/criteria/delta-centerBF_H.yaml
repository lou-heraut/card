id: delta-centerBF_H
version: "1.0"
authors: []
date: "2026-04-26"

meta:
  en:
    variable: [delta-centerBF_H1, delta-centerBF_H2, delta-centerBF_H3]
    unit: day
    name:
      - "Average change of the center of low flows between the near horizon
         and historical period"
      - "Average change of the center of low flows between the middle horizon
         and historical period"
      - "Average change of the center of low flows between the distant horizon
         and historical period"
    description: >-
      Date when 50 % of the annual cumulative baseflow is reached
    method: |
      1. annual aggregation [09-01, 08-31] - date when the baseflow (Wallingford)
         sum corresponds to 50 % of the total sum
      2. no temporal aggregation - calculation of the average change between the
         historical period and the {horizon} horizon
    horizon_labels: {H1: near, H2: middle, H3: distant}
    sampling_period: ["09-01", "08-31"]
    topic: "Flow, Baseflow, Seasonality"

  fr:
    variable: [delta-centreQB_H1, delta-centreQB_H2, delta-centreQB_H3]
    unit: jour
    name:
      - "Changement moyen du centre des écoulements lents entre l'horizon proche
         et la période historique"
      - "Changement moyen du centre des écoulements lents entre l'horizon moyen
         et la période historique"
      - "Changement moyen du centre des écoulements lents entre l'horizon lointain
         et la période historique"
    description: >-
      Date à laquelle 50 % du cumul annuel du débit de base sont atteints
    method: |
      1. agrégation annuelle [01-09, 31-08] - date à laquelle la somme du débit
         de base (Wallingford) correspond à 50 % de la somme totale
      2. aucune agrégation temporelle - calcul du changement moyen entre la
         période historique et l'horizon {horizon}
    horizon_labels: {H1: proche, H2: moyen, H3: lointain}
    sampling_period: ["01-09", "31-08"]
    topic: "Débit, Débit de Base, Saisonnalité"

  global:
    input_vars: Q
    source: >-
      TALLAKSEN, L. et H. VAN LANEN, éd. (2004). Hydrological drought. Processes
      and estimation methods for streamflow and groundwater. Developments in water
      science 48. Netherlands : Elsevier. ISBN : 9780444516886.
    preferred_sampling_period: "09-01"
    is_date: true
    relative: false
    palette: ["#60265e", "#893687", "#c05fbe", "#dba3da", "#edd1ec",
              "#f6ddd3", "#edbaa7", "#e08765", "#CD5629", "#8f3c1d"]
    horizons:
      H0: ["1976-01-01", "2005-08-31"]
      H1: ["2021-01-01", "2050-12-31"]
      H2: ["2041-01-01", "2070-12-31"]
      H3: ["2070-01-01", "2099-12-31"]

process:
  P1:
    func:
      centerBF: [snowmelt_timing, "Q", {fraction: 0.5, method: Wal}, true]
    sampling_period: "09-01"
    max_na_pct: 3
    max_na_years: 10

  P2:
    func:
      delta-centerBF_H1: [delta, "centerBF", "date",
                           {past: $H0, future: $H1, relative: false}]
      delta-centerBF_H2: [delta, "centerBF", "date",
                           {past: $H0, future: $H2, relative: false}]
      delta-centerBF_H3: [delta, "centerBF", "date",
                           {past: $H0, future: $H3, relative: false}]
    time_step: none
