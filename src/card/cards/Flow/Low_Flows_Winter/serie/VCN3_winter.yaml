id: VCN3_winter
version: "1.0"
authors: []
date: "2026-04-30"

meta:
  en:
    variable: VCN3_winter
    unit: "m^{3}.s^{-1}"
    name: Winter minimum of 3-day mean daily discharge
    description: ""
    method: |
      1. no temporal aggregation - 3-day centered moving average
      2. annual aggregation [11-01, 04-30] - minimum
    sampling_period: ["11-01", "04-30"]
    topic: "Flow, Low Flows, Intensity"

  fr:
    variable: VCN3_hiver
    unit: "m^{3}.s^{-1}"
    name: Minimum hivernal de la moyenne sur 3 jours du débit journalier
    description: ""
    method: |
      1. aucune agrégation temporelle - moyenne mobile centrée sur 3 jours
      2. agrégation annuelle [01-11, 30-04] - minimum
    sampling_period: ["01-11", "30-04"]
    topic: "Débit, Basses Eaux, Intensité"

  global:
    input_vars: Q
    preferred_sampling_period: "01-01"
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    funct:
      VC3_winter: [rollmean_center, "Q", {k: 3}]
    time_step: none
    keep: all
    NAyear_lim: 10

  P2:
    funct:
      VCN3_winter: [nanmin, "VC3_winter"]
    sampling_period: ["11-01", "04-30"]
    NApct_lim: 3
