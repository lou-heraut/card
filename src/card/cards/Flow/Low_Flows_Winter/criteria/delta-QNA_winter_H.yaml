id: delta-QNA_winter_H
version: "1.0"
authors: []
date: "2026-04-30"

meta:
  en:
    variable: [delta-QNA_winter_H1, delta-QNA_winter_H2, delta-QNA_winter_H3]
    unit: "%"
    name: Average change of winter minimum of daily discharge between the {horizon} horizon and historical period
    description: ""
    method: ""
    sampling_period: ["11-01", "04-30"]
    topic: "Flow, Low Flows, Intensity"
    horizon_labels: {H1: near, H2: middle, H3: distant}

  fr:
    variable: [delta-QNA_hiver_H1, delta-QNA_hiver_H2, delta-QNA_hiver_H3]
    unit: "%"
    name: "Changement moyen du minimum hivernal du débit journalier entre l'horizon {horizon} et la période historique"
    description: ""
    method: ""
    sampling_period: ["01-11", "30-04"]
    topic: "Débit, Basses Eaux, Intensité"
    horizon_labels: {H1: proche, H2: moyen, H3: lointain}

  global:
    input_vars: Q
    preferred_sampling_period: "01-01"
    to_normalise: false
    horizons:
      H0: ["1976-01-01", "2005-08-31"]
      H1: ["2021-01-01", "2050-12-31"]
      H2: ["2041-01-01", "2070-12-31"]
      H3: ["2070-01-01", "2099-12-31"]
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    funct:
      QNA_winter: [nanmin, "Q"]
    sampling_period: ["11-01", "04-30"]
    NApct_lim: 3
    NAyear_lim: 10

  P2:
    funct:
      delta-QNA_winter_H1: [delta, "QNA_winter", "date", {past: $H0, future: $H1, relative: false}]
      delta-QNA_winter_H2: [delta, "QNA_winter", "date", {past: $H0, future: $H2, relative: false}]
      delta-QNA_winter_H3: [delta, "QNA_winter", "date", {past: $H0, future: $H3, relative: false}]
    time_step: none
