process:
  P1:
    funct:
      VC10_winter: [rollmean_center, "Q", {k: 10}]
    time_step: none
    keep: all

  P2:
    funct:
      VCN10_winter: [nanmin, "VC10_winter"]
    sampling_period: ["11-01", "04-30"]
    NApct_lim: 3
    NAyear_lim: 10
    keep: all

  P3:
    funct:
      upLim: [nanmax, "VCN10_winter"]
    time_step: none
    keep: all

  P4:
    funct:
      startLF_winter:  [apply_threshold, "VC10_winter", {lim: upLim, where: "<=", what: first, select: longest}, true]
      centerLF_winter: [apply_threshold, "VC10_winter", {lim: upLim, where: "<=", what: nanargmin, select: longest}, true]
      endLF_winter:    [apply_threshold, "VC10_winter", {lim: upLim, where: "<=", what: last, select: longest}, true]
      dtLF_winter:     [apply_threshold, "VC10_winter", {lim: upLim, where: "<=", what: length, select: longest}]
      vLF_winter:      [deficit_volume, "VC10_winter", {threshold: upLim}]
    sampling_period: ["11-01", "04-30"]
    NApct_lim: 3

  P5:
    funct:
      delta-startLF_winter_H1:  [delta, "startLF_winter", "date", {past: $H0, future: $H1, relative: false}]
      delta-startLF_winter_H2:  [delta, "startLF_winter", "date", {past: $H0, future: $H2, relative: false}]
      delta-startLF_winter_H3:  [delta, "startLF_winter", "date", {past: $H0, future: $H3, relative: false}]
      delta-centerLF_winter_H1: [delta, "centerLF_winter", "date", {past: $H0, future: $H1, relative: false}]
      delta-centerLF_winter_H2: [delta, "centerLF_winter", "date", {past: $H0, future: $H2, relative: false}]
      delta-centerLF_winter_H3: [delta, "centerLF_winter", "date", {past: $H0, future: $H3, relative: false}]
      delta-endLF_winter_H1:    [delta, "endLF_winter", "date", {past: $H0, future: $H1, relative: false}]
      delta-endLF_winter_H2:    [delta, "endLF_winter", "date", {past: $H0, future: $H2, relative: false}]
      delta-endLF_winter_H3:    [delta, "endLF_winter", "date", {past: $H0, future: $H3, relative: false}]
      delta-dtLF_winter_H1:     [delta, "dtLF_winter", "date", {past: $H0, future: $H1, relative: false}]
      delta-dtLF_winter_H2:     [delta, "dtLF_winter", "date", {past: $H0, future: $H2, relative: false}]
      delta-dtLF_winter_H3:     [delta, "dtLF_winter", "date", {past: $H0, future: $H3, relative: false}]
      delta-vLF_winter_H1:      [delta, "vLF_winter", "date", {past: $H0, future: $H1, relative: false}]
      delta-vLF_winter_H2:      [delta, "vLF_winter", "date", {past: $H0, future: $H2, relative: false}]
      delta-vLF_winter_H3:      [delta, "vLF_winter", "date", {past: $H0, future: $H3, relative: false}]
    time_step: none
