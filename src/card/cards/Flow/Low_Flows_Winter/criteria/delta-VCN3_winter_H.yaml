id: delta-VCN3_winter_H
version: "1.0"
authors: []
date: "2026-04-30"

meta:
  en:
    variable: [delta-VCN3_winter_H1, delta-VCN3_winter_H2, delta-VCN3_winter_H3]
    unit: "%"
    name:
      - "Average change of winter minimum of 3-day mean daily discharge between
         the near horizon and historical period"
      - "Average change of winter minimum of 3-day mean daily discharge between
         the middle horizon and historical period"
      - "Average change of winter minimum of 3-day mean daily discharge between
         the distant horizon and historical period"
    description: ""
    method: |
      1. no temporal aggregation - 3-day centered moving average
      2. annual aggregation [11-01, 04-30] - minimum
      3. no temporal aggregation - calculation of the average change between the historical period and the {horizon} horizon
    sampling_period: ["11-01", "04-30"]
    classification:
      domain: flow
      phenomenon: low flows
      aspect: magnitude
      season: winter
      output: scalar
    horizon_labels: {H1: near, H2: middle, H3: distant}

  fr:
    variable: [delta-VCN3_hiver_H1, delta-VCN3_hiver_H2, delta-VCN3_hiver_H3]
    unit: "%"
    name:
      - "Changement moyen du minimum hivernal de la moyenne sur 3 jours du débit
         journalier entre l'horizon proche et la période historique"
      - "Changement moyen du minimum hivernal de la moyenne sur 3 jours du débit
         journalier entre l'horizon moyen et la période historique"
      - "Changement moyen du minimum hivernal de la moyenne sur 3 jours du débit
         journalier entre l'horizon lointain et la période historique"
    description: ""
    method: |
      1. aucune agrégation temporelle - moyenne mobile centrée sur 3 jours
      2. agrégation annuelle [01-11, 30-04] - minimum
      3. aucune agrégation temporelle - calcul du changement moyen entre la période historique et l'horizon {horizon}
    sampling_period: ["01-11", "30-04"]
    classification:
      domain: débit
      phenomenon: basses eaux
      aspect: intensité
      season: hivernale
      output: scalaire
    horizon_labels: {H1: proche, H2: moyen, H3: lointain}

  global:
    input_vars: Q
    preferred_sampling_period: "01-01"
    horizons:
      H0: ["1976-01-01", "2005-08-31"]
      H1: ["2021-01-01", "2050-12-31"]
      H2: ["2041-01-01", "2070-12-31"]
      H3: ["2070-01-01", "2099-12-31"]
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    func:
      VC3_winter: [rollmean_center, "Q", {k: 3}]
    time_step: none
    keep: all
    max_na_years: 10

  P2:
    func:
      VCN3_winter: [nanmin, "VC3_winter"]
    sampling_period: ["11-01", "04-30"]
    max_na_pct: 3

  P3:
    func:
      delta-VCN3_winter_H1: [delta, "VCN3_winter", "date", {past: $H0, future: $H1, relative: true}]
      delta-VCN3_winter_H2: [delta, "VCN3_winter", "date", {past: $H0, future: $H2, relative: true}]
      delta-VCN3_winter_H3: [delta, "VCN3_winter", "date", {past: $H0, future: $H3, relative: true}]
    time_step: none
