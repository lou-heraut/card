id: Bias
version: "1.0"
authors: []
date: "2026-04-26"

meta:
  en:
    variable: Bias
    unit: "without unit"
    name: Bias
    description: >-
      Relative difference between simulated and reference data. It measures
      the mean deviation over the entire series.
    method: "1. no temporal aggregation - Bias calculation"
    topic: "Flow, Performance"

  fr:
    variable: Biais
    unit: "sans unité"
    name: Biais
    description: >-
      Différence relative entre les données simulées et de référence.
      Il mesure l'écart moyen sur l'ensemble de la série.
    method: "1. aucune agrégation temporelle - calcul du Biais"
    topic: "Débit, Performance"

  global:
    input_vars: "Q_obs, Q_sim"
    to_normalise: false

process:
  P1:
    funct:
      Bias: [bias, "Q_obs", "Q_sim"]
    time_step: none
    NAyear_lim: 10
