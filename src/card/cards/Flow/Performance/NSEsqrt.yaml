id: NSEsqrt
version: "1.0"
authors: []
date: "2026-04-26"

meta:
  en:
    variable: NSEsqrt
    unit: "without unit"
    name: Nash-Sutcliffe Efficiency of the square root of the data
    description: >-
      Identical to NSE, this score, however, gives equal weight across the
      entire range of the evaluated variable.
    method: "1. no temporal aggregation - square root of simulated and reference data, then NSE"
    topic: "Flow, Performance"

  fr:
    variable: NSEracine
    unit: "sans unité"
    name: Coefficient d'efficience de Nash-Sutcliffe de la racine carrée des données
    description: >-
      Identique au NSE, ce score donne cependant un poids équivalent sur
      l'ensemble de la plage de variation de la variable évaluée.
    method: "1. aucune agrégation temporelle - racine carrée des données simulées et de référence puis NSE"
    topic: "Débit, Performance"

  global:
    input_vars: "Q_obs, Q_sim"
    source: |
      NASH, J. E. et J. V. SUTCLIFFE (1970). « River flow forecasting through conceptual models
      part I — A discussion of principles ». In : Journal of Hydrology 10.3, p. 282-290.
      DOI : 10.1016/0022-1694(70)90255-6.
    relative: false

process:
  P1:
    func:
      NSEsqrt: [NSE_sqrt, "Q_obs", "Q_sim"]
    time_step: none
    max_na_years: 10
