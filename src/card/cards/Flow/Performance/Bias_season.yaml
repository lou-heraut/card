id: Bias_season
version: "1.0"
authors: []
date: "2026-04-26"

meta:
  en:
    variable: [Bias_DJF, Bias_MAM, Bias_JJA, Bias_SON]
    unit: "without unit"
    name:
      - Winter Bias
      - Spring Bias
      - Summer Bias
      - Autumn Bias
    description:
      - >-
        Relative difference between simulated and reference winter data.
        Similar to Bias, this score measures the mean deviation only over
        winter months (December, January, and February).
      - >-
        Relative difference between simulated and reference spring data.
        Similar to Bias, this score measures the mean deviation only over
        spring months (March, April, and May).
      - >-
        Relative difference between simulated and reference summer data.
        Similar to Bias, this score measures the mean deviation only over
        summer months (June, July, and August).
      - >-
        Relative difference between simulated and reference autumn data.
        Similar to Bias, this score measures the mean deviation only over
        autumn months (September, October, and November).
    method:
      - "1. seasonal aggregation [12-01, 02-28(29)] - Bias calculation"
      - "1. seasonal aggregation [03-01, 05-31] - Bias calculation"
      - "1. seasonal aggregation [06-01, 08-31] - Bias calculation"
      - "1. seasonal aggregation [09-01, 11-30] - Bias calculation"
    sampling_period:
      - ["12-01", "02-28(29)"]
      - ["03-01", "05-31"]
      - ["06-01", "08-31"]
      - ["09-01", "11-30"]
    topic: "Flow, Performance"

  fr:
    variable: [Biais_DJF, Biais_MAM, Biais_JJA, Biais_SON]
    unit: "sans unité"
    name:
      - Biais hivernal
      - Biais printanier
      - Biais estival
      - Biais automnal
    description:
      - >-
        Différence relative entre les données d'hiver simulées et de référence.
        Identique au Biais, ce score mesure l'écart moyen uniquement sur les
        mois d'hiver (mois de décembre, janvier et février).
      - >-
        Différence relative entre les données de printemps simulées et de
        référence. Identique au Biais, ce score mesure l'écart moyen
        uniquement sur les mois de printemps (mois de mars, avril et mai).
      - >-
        Différence relative entre les données d'été simulées et de référence.
        Identique au Biais, ce score mesure l'écart moyen uniquement sur les
        mois d'été (mois de juin, juillet et août).
      - >-
        Différence relative entre les données d'automne simulées et de
        référence. Identique au Biais, ce score mesure l'écart moyen
        uniquement sur les mois d'automne (mois de septembre, octobre et
        novembre).
    method:
      - "1. agrégation saisonnière [01-12, 28(29)-02] - calcul du Biais"
      - "1. agrégation saisonnière [01-03, 31-05] - calcul du Biais"
      - "1. agrégation saisonnière [01-06, 31-08] - calcul du Biais"
      - "1. agrégation saisonnière [01-09, 30-11] - calcul du Biais"
    sampling_period:
      - ["01-12", "28(29)-02"]
      - ["01-03", "31-05"]
      - ["01-06", "31-08"]
      - ["01-09", "30-11"]
    topic: "Débit, Performance"

  global:
    input_vars: "Q_obs, Q_sim"
    to_normalise: false

process:
  P1:
    funct:
      Bias: [bias, "Q_obs", "Q_sim"]
    time_step: season
    Seasons: [DJF, MAM, JJA, SON]
    NApct_lim: 3
    NAyear_lim: 10
    compress: true
