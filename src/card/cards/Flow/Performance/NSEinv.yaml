id: NSEinv
version: "1.0"
authors: []
date: "2026-04-26"

meta:
  en:
    variable: NSEinv
    unit: "without unit"
    name: Nash-Sutcliffe Efficiency of the inverse of the data
    description: >-
      Identical to NSE, this score, however, gives strong emphasis on the
      reconstruction of low values of the examined variable.
    method: "1. no temporal aggregation - inverse of daily data, then NSE"
    topic: "Flow, Performance"

  fr:
    variable: NSEinv
    unit: "sans unité"
    name: Coefficient d'efficience de Nash-Sutcliffe de l'inverse des données
    description: >-
      Identique au NSE, ce score donne cependant un poids fort à la
      reconstitution des valeurs faibles de la variable examinée.
    method: "1. aucune agrégation temporelle - inverse des données journalières puis NSE"
    topic: "Débit, Performance"

  global:
    input_vars: "Q_obs, Q_sim"
    source: |
      NASH, J. E. et J. V. SUTCLIFFE (1970). « River flow forecasting through conceptual models
      part I — A discussion of principles ». In : Journal of Hydrology 10.3, p. 282-290.
      DOI : 10.1016/0022-1694(70)90255-6.
    relative: false

process:
  P1:
    func:
      NSEinv: [NSE_inverse, "Q_obs", "Q_sim"]
    time_step: none
    max_na_years: 10
