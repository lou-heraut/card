id: STD
version: "1.0"
authors: []
date: "2026-04-26"

meta:
  en:
    variable: STD
    unit: "m^{3}.s^{-1}"
    name: Standard deviation of daily data
    description: >-
      This score measures the ability of models to reproduce the variability
      of the examined variable.
    method: "1. no temporal aggregation - standard deviation"
    topic: "Flow, Performance"

  fr:
    variable: STD
    unit: "m^{3}.s^{-1}"
    name: Écart-type des données journalières
    description: >-
      Ce score mesure la capacité des modèles à reproduire la variabilité
      de la variable examinée.
    method: "1. aucune agrégation temporelle - écart-type"
    topic: "Débit, Performance"

  global:
    input_vars: "Q_obs, Q_sim"

process:
  P1:
    func:
      STD: [std_ratio, "Q_obs", "Q_sim"]
    time_step: none
    max_na_years: 10
