id: STD_ratio
version: "1.0"
authors: []
date: "2026-04-26"

meta:
  en:
    variable: STD_ratio
    unit: without unit
    name: Ratio of simulated to observed standard deviations
    description: >-
      Ratio sd(sim)/sd(obs) of the daily data: the α component of the
      KGE (Gupta et al. 2009). Measures the ability of models to
      reproduce the variability of the examined variable.
    method: "1. no temporal aggregation - ratio of standard deviations sd(sim)/sd(obs)"
    classification:
      domain: flow
      season: record
      output: scalar
      purpose: model performance

  fr:
    variable: STD_ratio
    unit: sans unité
    name: Rapport des écarts-types simulé/observé
    description: >-
      Rapport sd(sim)/sd(obs) des données journalières : la composante α
      du KGE (Gupta et al. 2009). Mesure la capacité des modèles à
      reproduire la variabilité de la variable examinée.
    method: "1. aucune agrégation temporelle - rapport des écarts-types sd(sim)/sd(obs)"
    classification:
      domain: débit
      season: chronique
      output: scalaire
      purpose: performance de modèle

  global:
    input_vars: "Q_obs, Q_sim"

process:
  P1:
    func:
      STD_ratio: [std_ratio, "Q_obs", "Q_sim"]
    time_step: none
    max_na_years: 10
