id: QNA
version: "1.0"
authors: []
date: "2026-04-28"

meta:
  en:
    variable: QNA
    unit: "m^{3}.s^{-1}"
    name: Annual minimum of daily discharge
    description: ""
    method: "1. annual aggregation [Month of maximum monthly flows] - minimum"
    sampling_period: Month of maximum monthly flows
    classification:
      domain: flow
      phenomenon: low flows
      aspect: magnitude
      season: annual
      output: series

  fr:
    variable: QNA
    unit: "m^{3}.s^{-1}"
    name: Minimum annuel du débit journalier
    description: ""
    method: "1. agrégation annuelle [Mois du maximum des débits mensuels] - minimum"
    sampling_period: Mois du maximum des débits mensuels
    classification:
      domain: débit
      phenomenon: basses eaux
      aspect: intensité
      season: annuelle
      output: série

  global:
    input_vars: Q
    preferred_sampling_period: "01-01"
    relative: false
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    func:
      QNA: [nanmin, "Q"]
    sampling_period:
      type: adaptive
      func: [nanmax, "Q"]
    max_na_pct: 3
    max_na_years: 10
