id: Q99A
version: "1.0"
authors: []
date: "2026-04-28"

meta:
  en:
    variable: Q99A
    unit: "m^{3}.s^{-1}"
    name: Annual flow exceeded 99 years out of 100
    description: Annual flow with an exceedance probability of 99 % (1st percentile)
    method: "1. annual aggregation [01-01, 12-31] - quantile at the exceedance probability of 99 %"
    sampling_period: ["01-01", "12-31"]
    topic: "Flow, Low Flows, Intensity"

  fr:
    variable: Q99A
    unit: "m^{3}.s^{-1}"
    name: Débit annuel dépassé 99 années sur 100
    description: Débit annuel avec une probabilité de dépassement de 99 % (centile 1 %)
    method: "1. agrégation annuelle [01-01, 31-12] - quantile à la probabilité au dépassement de 99 %"
    sampling_period: ["01-01", "31-12"]
    topic: "Débit, Basses Eaux, Intensité"

  global:
    input_vars: Q
    preferred_sampling_period: "01-01"
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    func:
      Q99A: [exceedance_quantile, "Q", {p: 0.99}]
    sampling_period: "01-01"
    max_na_pct: 3
    max_na_years: 10
