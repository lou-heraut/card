id: VCN30-2
version: "1.0"
authors: []
date: "2026-04-30"

meta:
  en:
    variable: VCN30-2
    unit: "m^{3}.s^{-1}"
    name: Annual minimum of 30-day mean daily discharge with a return period of 2 years
    description: ""
    method: |
      1. no temporal aggregation - 30-day centered moving average
      2. annual aggregation [Month of maximum monthly flows] - minimum
      3. no temporal aggregation - calculation of the 2-year return period flow using the log-normal distribution
    sampling_period: Month of maximum monthly flows
    topic: "Flow, Low Flows, Intensity"

  fr:
    variable: VCN30-2
    unit: "m^{3}.s^{-1}"
    name: Minimum annuel de la moyenne sur 30 jours du débit journalier de période de retour 2 ans
    description: ""
    method: |
      1. aucune agrégation temporelle - moyenne mobile centrée sur 30 jours
      2. agrégation annuelle [Mois du maximum des débits mensuels] - minimum
      3. aucune agrégation temporelle - calcul du débit de période de retour 2 ans avec la loi log-normal
    sampling_period: Mois du maximum des débits mensuels
    topic: "Débit, Basses Eaux, Intensité"

  global:
    input_vars: Q
    preferred_sampling_period: "01-01"

process:
  P1:
    func:
      VC30: [rollmean_center, "Q", {k: 30}]
    time_step: none
    keep: all
    max_na_years: 10

  P2:
    func:
      VCN30: [nanmin, "VC30"]
    sampling_period:
      type: adaptive
      func: [nanmax, "Q"]
    max_na_pct: 3

  P3:
    func:
      VCN30-2: [return_level, "VCN30", {return_period: 2, water_type: "low"}]
    time_step: none
