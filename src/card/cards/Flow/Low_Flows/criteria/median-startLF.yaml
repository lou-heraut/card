id: median-startLF
version: "1.0"
authors: []
date: "2026-04-30"

meta:
  en:
    variable: median-startLF
    unit: yearday
    name: Median start of low flows
    description: Median of the dates of the first 10-day mean flow below the maximum of the annual minima of the 10-day mean flow of daily VCN10
    method: |
      1. no temporal aggregation - 10-day centered moving average
      2. annual aggregation [Month of maximum monthly flows] - minimum (extraction from the series of VCN10)
      3. no temporal aggregation - the maximum of the previous series is taken as the threshold
      4. annual aggregation [Month of maximum monthly flows] - date of the first day of the longest period below the previous threshold
      5. no temporal aggregation - median
    sampling_period: Month of maximum monthly flows
    topic: "Flow, Low Flows, Seasonality"

  fr:
    variable: mediane-debutBE
    unit: "jour de l'année"
    name: Médiane du début des basses eaux
    description: Médiane des dates de la première moyenne sur 10 jours sous le maximum des minimums annuels de la moyenne sur 10 jours du débit journalier VCN10
    method: |
      1. aucune agrégation temporelle - moyenne mobile centrée sur 10 jours
      2. agrégation annuelle [Mois du maximum des débits mensuels] - minimum (extraction de la série des VCN10)
      3. aucune agrégation temporelle - le maximum de la précédente série est pris comme seuil
      4. agrégation annuelle [Mois du maximum des débits mensuels] - date du premier jour de la plus longue période sous le précédent seuil
      5. aucune agrégation temporelle - médiane
    sampling_period: Mois du maximum des débits mensuels
    topic: "Débit, Basses Eaux, Saisonnalité"

  global:
    input_vars: Q
    preferred_sampling_period: "01-01"
    is_date: true
    relative: false

process:
  P1:
    func:
      VC10: [rollmean_center, "Q", {k: 10}]
    time_step: none
    keep: all

  P2:
    func:
      VCN10: [nanmin, "VC10"]
    sampling_period:
      type: adaptive
      func: [nanmax, "Q"]
    max_na_pct: 3
    max_na_years: 10
    keep: all

  P3:
    func:
      upLim: [nanmax, "VCN10"]
    time_step: none
    keep: all

  P4:
    func:
      startLF: [apply_threshold, "VC10", {lim: upLim, where: "<=", what: first, select: longest}, true]
    sampling_period:
      type: adaptive
      func: [nanmax, "Q"]
    max_na_pct: 3

  P5:
    func:
      median-startLF: [circular_median, "startLF", {periodicity: 365.25}]
    time_step: none
