id: delta-Q99A_H
version: "1.0"
authors: []
date: "2026-04-28"

meta:
  en:
    variable: [delta-Q99A_H1, delta-Q99A_H2, delta-Q99A_H3]
    unit: "%"
    name:
      - Average change of annual flow exceeded 99 years out of 100 between the near horizon and historical period
      - Average change of annual flow exceeded 99 years out of 100 between the middle horizon and historical period
      - Average change of annual flow exceeded 99 years out of 100 between the distant horizon and historical period
    description: Annual flow with an exceedance probability of 99 % (1st percentile)
    method: |
      1. annual aggregation [01-01, 12-31] - quantile at the exceedance probability of 99 %
      2. no temporal aggregation - calculation of the average change between the historical period and the {horizon} horizon
    horizon_labels: {H1: near, H2: middle, H3: distant}
    sampling_period: ["01-01", "12-31"]
    topic: "Flow, Low Flows, Intensity"

  fr:
    variable: [delta-Q99A_H1, delta-Q99A_H2, delta-Q99A_H3]
    unit: "%"
    name:
      - Changement moyen du débit annuel dépassé 99 années sur 100 entre l'horizon proche et la période historique
      - Changement moyen du débit annuel dépassé 99 années sur 100 entre l'horizon moyen et la période historique
      - Changement moyen du débit annuel dépassé 99 années sur 100 entre l'horizon lointain et la période historique
    description: Débit annuel avec une probabilité de dépassement de 99 % (centile 1 %)
    method: |
      1. agrégation annuelle [01-01, 31-12] - quantile à la probabilité au dépassement de 99 %
      2. aucune agrégation temporelle - calcul du changement moyen entre la période historique et l'horizon {horizon}
    horizon_labels: {H1: proche, H2: moyen, H3: lointain}
    sampling_period: ["01-01", "31-12"]
    topic: "Débit, Basses Eaux, Intensité"

  global:
    input_vars: Q
    preferred_sampling_period: "01-01"
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]
    horizons:
      H0: ["1976-01-01", "2005-08-31"]
      H1: ["2021-01-01", "2050-12-31"]
      H2: ["2041-01-01", "2070-12-31"]
      H3: ["2070-01-01", "2099-12-31"]

process:
  P1:
    funct:
      Q99A: [exceedance_quantile, "Q", {p: 0.99}]
    sampling_period: "01-01"
    NApct_lim: 3
    NAyear_lim: 10

  P2:
    funct:
      delta-Q99A_H1: [delta, "Q99A", "date", {past: $H0, future: $H1, relative: true}]
      delta-Q99A_H2: [delta, "Q99A", "date", {past: $H0, future: $H2, relative: true}]
      delta-Q99A_H3: [delta, "Q99A", "date", {past: $H0, future: $H3, relative: true}]
    time_step: none
