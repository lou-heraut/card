id: QMNA-5
version: "1.0"
authors: []
date: "2026-04-30"

meta:
  en:
    variable: QMNA-5
    unit: "m^{3}.s^{-1}"
    name: Annual minimum of monthly flows with a return period of 5 years
    description: ""
    method: |
      1. monthly aggregation - mean
      2. annual aggregation [Month of maximum monthly flows] - minimum
      3. no temporal aggregation - calculation of 5-year return period flow with the log-normal distribution
    sampling_period: Month of maximum monthly flows
    topic: "Flow, Low Flows, Intensity"

  fr:
    variable: QMNA-5
    unit: "m^{3}.s^{-1}"
    name: Minimum annuel des débits mensuels de période de retour 5 ans
    description: ""
    method: |
      1. agrégation mensuelle - moyenne
      2. agrégation annuelle [Mois du maximum des débits mensuels] - minimum
      3. aucune agrégation temporelle - calcul du débit de période de retour 5 ans avec la loi log-normal
    sampling_period: Mois du maximum des débits mensuels
    topic: "Débit, Basses Eaux, Intensité"

  global:
    input_vars: Q
    preferred_sampling_period: "01-01"

process:
  P1:
    funct:
      QMA: [nanmean, "Q"]
    time_step: year-month
    NApct_lim: 3
    NAyear_lim: 10
    keep: all

  P2:
    funct:
      QMNA: [nanmin, "QMA"]
    sampling_period:
      type: adaptive
      funct: [nanmax, "QMA"]
    NApct_lim: 3

  P3:
    funct:
      QMNA-5: [return_level, "QMNA", {return_period: 5, water_type: "low"}]
    time_step: none
