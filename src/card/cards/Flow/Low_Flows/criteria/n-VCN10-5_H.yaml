id: n-VCN10-5_H
version: "1.0"
authors: []
date: "2026-04-30"

meta:
  en:
    variable: [n-VCN10-5_H1, n-VCN10-5_H2, n-VCN10-5_H3]
    unit: without unit
    name: Number of years in the {horizon} horizon where VCN10 is superior to VCN10-5 from the historical period
    description: ""
    method: |
      1. no temporal aggregation - 10-day centered moving average
      2. annual aggregation [Month of maximum monthly flows] - minimum (VCN10)
      3. no temporal aggregation - calculation of the 5-year return period flow with the log-normal distribution from the historical period (VCN10-5_H0)
      4. no temporal aggregation - counting the number of VCN10 in the {horizon} horizon above VCN10-5_H0
    sampling_period: Month of maximum monthly flows
    topic: "Flow, Low Flows, Occurrence"
    horizon_labels: {H1: near, H2: middle, H3: distant}

  fr:
    variable: [nVCN10-5_H1, nVCN10-5_H2, nVCN10-5_H3]
    unit: sans unité
    name: "Nombre d'années de l'horizon {horizon} où le VCN10 est supérieur au VCN10-5 de la période historique"
    description: ""
    method: |
      1. aucune agrégation temporelle - moyenne mobile centrée sur 10 jours
      2. agrégation annuelle [Mois du maximum des débits mensuels] - minimum (VCN10)
      3. aucune agrégation temporelle - calcul du débit de période de retour 5 ans avec la loi log-normal sur la période historique (VCN10-5_H0)
      4. aucune agrégation temporelle - décompte du nombre de VCN10 de l'horizon {horizon} au dessus du VCN10-5_H0
    sampling_period: Mois du maximum des débits mensuels
    topic: "Débit, Basses Eaux, Occurrence"
    horizon_labels: {H1: proche, H2: moyen, H3: lointain}

  global:
    input_vars: Q
    preferred_sampling_period: "01-01"
    horizons:
      H0: ["1976-01-01", "2005-08-31"]
      H1: ["2021-01-01", "2050-12-31"]
      H2: ["2041-01-01", "2070-12-31"]
      H3: ["2070-01-01", "2099-12-31"]

process:
  P1:
    func:
      VC10: [rollmean_center, "Q", {k: 10}]
    time_step: none
    keep: all
    max_na_years: 10

  P2:
    func:
      VCN10: [nanmin, "VC10"]
    sampling_period:
      type: adaptive
      func: [nanmax, "Q"]
    max_na_pct: 3

  P3:
    func:
      VCN10-5_H0: [return_level, "VCN10", {return_period: 5, water_type: "low", dates: "date", period: $H0}]
    time_step: none
    keep: all

  P4:
    func:
      n-VCN10-5_H1: [apply_threshold, "VCN10", {lim: VCN10-5_H0, where: "<=", what: length, select: all, dates: "date", period: $H1}]
      n-VCN10-5_H2: [apply_threshold, "VCN10", {lim: VCN10-5_H0, where: "<=", what: length, select: all, dates: "date", period: $H2}]
      n-VCN10-5_H3: [apply_threshold, "VCN10", {lim: VCN10-5_H0, where: "<=", what: length, select: all, dates: "date", period: $H3}]
    time_step: none
