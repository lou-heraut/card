id: Q90
version: "1.0"
authors: []
date: "2026-04-30"

meta:
  en:
    variable: Q90
    unit: "m^{3}.s^{-1}"
    name: Flow exceeded 9 years out of 10
    description: "Flow with an exceedance probability of 90 % (10th percentile)"
    method: "1. no temporal aggregation - quantile at the exceedance probability of 90 %"
    topic: "Flow, Low Flows, Intensity"

  fr:
    variable: Q90
    unit: "m^{3}.s^{-1}"
    name: Débit dépassé 9 années sur 10
    description: "Débit avec une probabilité de dépassement de 90 % (centile 10 %)"
    method: "1. aucune agrégation temporelle - quantile à la probabilité de dépassement de 90 %"
    topic: "Débit, Basses Eaux, Intensité"

  global:
    input_vars: Q
    preferred_sampling_period: "01-01"

process:
  P1:
    func:
      Q90: [exceedance_quantile, "Q", {p: 0.9}]
    time_step: none
    max_na_years: 10
