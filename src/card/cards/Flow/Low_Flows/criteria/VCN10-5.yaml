id: VCN10-5
version: "1.0"
authors: []
date: "2026-04-30"

meta:
  en:
    variable: VCN10-5
    unit: "m^{3}.s^{-1}"
    name: Annual minimum of 10-day mean daily discharge with a return period of 5 years
    description: ""
    method: |
      1. no temporal aggregation - 10-day centered moving average
      2. annual aggregation [Month of maximum monthly flows] - minimum
      3. no temporal aggregation - calculation of the 5-year return period flow with the log-normal distribution
    sampling_period: Month of maximum monthly flows
    topic: "Flow, Low Flows, Intensity"

  fr:
    variable: VCN10-5
    unit: "m^{3}.s^{-1}"
    name: Minimum annuel de la moyenne sur 10 jours du débit journalier VCN10 de période de retour 5 ans
    description: ""
    method: |
      1. aucune agrégation temporelle - moyenne mobile centrée sur 10 jours
      2. agrégation annuelle [Mois du maximum des débits mensuels] - minimum
      3. aucune agrégation temporelle - calcul du débit de période de retour 5 ans avec la loi log-normal
    sampling_period: Mois du maximum des débits mensuels
    topic: "Débit, Basses Eaux, Intensité"

  global:
    input_vars: Q
    preferred_sampling_period: "01-01"

process:
  P1:
    funct:
      VC10: [rollmean_center, "Q", {k: 10}]
    time_step: none
    keep: all
    NAyear_lim: 10

  P2:
    funct:
      VCN10: [nanmin, "VC10"]
    sampling_period:
      type: adaptive
      funct: [nanmax, "Q"]
    NApct_lim: 3

  P3:
    funct:
      VCN10-5: [return_level, "VCN10", {return_period: 5, water_type: "low"}]
    time_step: none
