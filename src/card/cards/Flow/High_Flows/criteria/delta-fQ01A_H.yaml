id: delta-fQ01A_H
version: "1.0"
authors: []
date: "2026-04-26"

meta:
  en:
    variable: [delta-fQ01A_H1, delta-fQ01A_H2, delta-fQ01A_H3]
    unit: "day.year^{-1}"
    name:
      - "Average change of the annual frequency of exceeding Q01 between
         the near horizon and historical period"
      - "Average change of the annual frequency of exceeding Q01 between
         the middle horizon and historical period"
      - "Average change of the annual frequency of exceeding Q01 between
         the distant horizon and historical period"
    description: >-
      Annual frequency of exceeding Q > Q01, where Q01 is the flow exceeded
      1 % of the time, extracted from the ranked flow curve
    method: |
      1. no temporal aggregation - the quantile at the 1 % exceedance
         probability is taken as the threshold
      2. annual aggregation [Month of minimum monthly flows] - ratio of the
         number of days with flow exceeding the threshold to the number of
         days in the year
      3. no temporal aggregation - calculation of the average change between
         the historical period and the {horizon} horizon
    horizon_labels: {H1: near, H2: middle, H3: distant}
    sampling_period: Month of minimum monthly flows
    topic: "Flow, High Flows, Frequency"

  fr:
    variable: [delta-fQ01A_H1, delta-fQ01A_H2, delta-fQ01A_H3]
    unit: "jour.an^{-1}"
    name:
      - "Changement moyen de la fréquence annuelle de dépassement du Q01
         entre l'horizon proche et la période historique"
      - "Changement moyen de la fréquence annuelle de dépassement du Q01
         entre l'horizon moyen et la période historique"
      - "Changement moyen de la fréquence annuelle de dépassement du Q01
         entre l'horizon lointain et la période historique"
    description: >-
      Fréquence annuelle de dépassement de Q > Q01, Q01 est le débit dépassé
      1 % du temps, extrait de la courbe des débits classés
    method: |
      1. aucune agrégation temporelle - le quantile à la probabilité au
         dépassement de 1 % est pris comme seuil
      2. agrégation annuelle [Mois du minimum des débits mensuels] - rapport
         du nombre de jours où le débit dépasse le seuil par le nombre de
         jours dans l'année
      3. aucune agrégation temporelle - calcul du changement moyen entre la
         période historique et l'horizon {horizon}
    horizon_labels: {H1: proche, H2: moyen, H3: lointain}
    sampling_period: Mois du minimum des débits mensuels
    topic: "Débit, Hautes Eaux, Fréquence"

  global:
    input_vars: Q
    preferred_sampling_period: "09-01"
    relative: false
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]
    horizons:
      H0: ["1976-01-01", "2005-08-31"]
      H1: ["2021-01-01", "2050-12-31"]
      H2: ["2041-01-01", "2070-12-31"]
      H3: ["2070-01-01", "2099-12-31"]

process:
  P1:
    func:
      lowLim: [exceedance_quantile, "Q", {p: 0.01}]
    time_step: none
    keep: all
    max_na_years: 10

  P2:
    func:
      fQ01A: [exceedance_frequency, "Q", {threshold: lowLim}]
    sampling_period:
      type: adaptive
      func: [nanmin, "Q"]
    max_na_pct: 3

  P3:
    func:
      delta-fQ01A_H1: [delta, "fQ01A", "date",
                       {past: $H0, future: $H1, relative: false}]
      delta-fQ01A_H2: [delta, "fQ01A", "date",
                       {past: $H0, future: $H2, relative: false}]
      delta-fQ01A_H3: [delta, "fQ01A", "date",
                       {past: $H0, future: $H3, relative: false}]
    time_step: none
