id: Q10
version: "1.0"
authors: []
date: "2026-04-28"

meta:
  en:
    variable: Q10
    unit: "m^{3}.s^{-1}"
    name: "Daily flow exceeded 10 % of the time (whole record)"
    description: >-
      Flow with an exceedance probability of 10 % (90th percentile)
    method: |
      1. no temporal aggregation - quantile at the exceedance probability
         of 10 %
    topic: "Flow, High Flows, Intensity"

  fr:
    variable: Q10
    unit: "m^{3}.s^{-1}"
    name: "Débit journalier dépassé 10 % du temps (chronique entière)"
    description: >-
      Débit avec une probabilité de dépassement de 10 % (centile 90 %)
    method: |
      1. aucune agrégation temporelle - quantile à la probabilité de
         dépassement de 10 %
    topic: "Débit, Hautes Eaux, Intensité"

  global:
    input_vars: Q
    preferred_sampling_period: "01-01"

process:
  P1:
    func:
      Q10: [exceedance_quantile, "Q", {p: 0.1}]
    time_step: none
    max_na_years: 10
