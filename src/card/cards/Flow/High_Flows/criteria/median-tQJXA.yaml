id: median-tQJXA
version: "1.0"
authors: []
date: "2026-04-28"

meta:
  en:
    variable: median-tQJXA
    unit: yearday
    name: "Median of dates of the annual maximum daily discharge"
    description: ""
    method: |
      1. annual aggregation [Month of minimum monthly flows] - date of maximum
      2. no temporal aggregation - median
    sampling_period: Month of minimum monthly flows
    topic: "Flow, High Flows, Seasonality"

  fr:
    variable: mediane-tQJXA
    unit: "jour de l'année"
    name: "Médiane des dates du débit journalier maximal annuel"
    description: ""
    method: |
      1. agrégation annuelle [Mois du minimum des débits mensuels] - date du maximum
      2. aucune agrégation temporelle - médiane
    sampling_period: Mois du minimum des débits mensuels
    topic: "Débit, Hautes Eaux, Saisonnalité"

  global:
    input_vars: Q
    preferred_sampling_period: "09-01"
    is_date: true
    relative: false

process:
  P1:
    func:
      tQJXA: [nanargmax, "Q", true]
    sampling_period:
      type: adaptive
      func: [nanmin, "Q"]
    max_na_pct: 3
    max_na_years: 10

  P2:
    func:
      median-tQJXA: [circular_median, "tQJXA", {periodicity: 365.25}]
    time_step: none
