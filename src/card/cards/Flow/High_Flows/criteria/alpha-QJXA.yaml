id: alpha-QJXA
version: "1.0"
authors: []
date: "2026-04-26"

meta:
  en:
    variable: [alpha-QJXA, hyp-alpha-QJXA]
    unit: "m^{3}.s^{-1}.year^{-1}"
    name: >-
      Slope of Sen and Mann-Kendall Test result calculated on the series
      of annual maximum daily flows QJXA
    description: ""
    method: |
      1. annual aggregation [Month of minimum monthly flows] - maximum
         (extraction from the series of QJXA)
      2. no temporal aggregation - Sen's slope
    sampling_period: Month of minimum monthly flows
    topic: "Flow, High Flows, Intensity"

  fr:
    variable: [alpha-QJXA, hyp-alpha-QJXA]
    unit: "m^{3}.s^{-1}.an^{-1}"
    name: >-
      Pente de Sen et résultat du test de Mann-Kendall calculés sur la
      série des débits journaliers maximaux annuels QJXA
    description: ""
    method: |
      1. agrégation annuelle [Mois du minimum des débits mensuels] - maximum
         (extraction de la série des QJXA)
      2. aucune agrégation temporelle - pente de Sen
    sampling_period: Mois du minimum des débits mensuels
    topic: "Débit, Hautes Eaux, Intensité"

  global:
    input_vars: Q
    source: |
      KENDALL, M. G. (1975). « Rank Correlation Methods ». Griffin, London, UK.
      MANN, H. (1945). « Nonparametric tests against trend ». Econometrica, 13(3):245-259.
      SEN, P. K. (1968). « Estimates of the regression coefficient based on Kendall's tau ».
      In : Journal of the American Statistical Association 63, p. 1379-1389. DOI : doi:10.2307/2285891.
    preferred_sampling_period: "09-01"
    relative: [true, false]
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    func:
      QJXA: [nanmax, "Q"]
    sampling_period:
      type: adaptive
      func: [nanmin, "Q"]
    max_na_pct: 3
    max_na_years: 10

  P2:
    func:
      alpha-QJXA:     [mannkendall_slope, "QJXA", {level: 0.1}]
      hyp-alpha-QJXA: [mannkendall_test,     "QJXA", {level: 0.1}]
    time_step: none
