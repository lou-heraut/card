id: median-dtFlood
version: "1.0"
authors: []
date: "2026-04-28"

meta:
  en:
    variable: median-dtFlood
    unit: day
    name: "Median duration of floods"
    description: >-
      Median of the durations of floods sampled by annual maxima
    method: |
      1. no temporal aggregation - Qr difference between daily flow values
         and base flow
      2. annual aggregation [Month of minimum monthly flows] - maximum of Qr
      3. annual aggregation [Month of minimum monthly flows] - division by two
         of annual maxima to obtain a threshold
      4. annual aggregation [Month of minimum monthly flows] - number of days
         where the difference is greater than the threshold
      5. no temporal aggregation - median
    sampling_period: Month of minimum monthly flows
    topic: "Flow, High Flows, Duration"

  fr:
    variable: mediane-dtCrue
    unit: jour
    name: "Durée médiane des crues"
    description: >-
      Médiane des durées des crues échantillonnées par maxima annuel
    method: |
      1. aucune agrégation temporelle - différence Qr entre les valeurs
         journalières de débit par le débit de base
      2. agrégation annuelle [Mois du minimum des débits mensuels] - maximum de Qr
      3. agrégation annuelle [Mois du minimum des débits mensuels] - division par
         deux des maxima annuels pour obtenir un seuil
      4. agrégation annuelle [Mois du minimum des débits mensuels] - nombre de
         jours où la différence est supérieure au seuil
      5. aucune agrégation temporelle - médiane
    sampling_period: Mois du minimum des débits mensuels
    topic: "Débit, Hautes Eaux, Durée"

  global:
    input_vars: Q
    preferred_sampling_period: "09-01"

process:
  P1:
    func:
      dQ: [quickflow, "Q"]
    time_step: none
    keep: all
    max_na_years: 10

  P2:
    func:
      dQXA: [nanmax, "dQ"]
    sampling_period:
      type: adaptive
      func: [nanmin, "Q"]
    keep: all

  P3:
    func:
      lowLim: [ratio, "dQXA", 2, {first: true}]
    sampling_period:
      type: adaptive
      func: [nanmin, "Q"]
    keep: all

  P4:
    func:
      dtFlood: [apply_threshold, "dQ",
                {lim: lowLim, where: ">=", what: length, select: dQXA}]
    sampling_period:
      type: adaptive
      func: [nanmin, "Q"]
    max_na_pct: 3

  P5:
    func:
      median-dtFlood: [nanmedian, "dtFlood"]
    time_step: none
