id: delta-tVCX3_H
version: "1.0"
authors: []
date: "2026-04-28"

meta:
  en:
    variable: [delta-tVCX3_H1, delta-tVCX3_H2, delta-tVCX3_H3]
    unit: day
    name:
      - "Average change of the date of the annual maximum of the 3-day mean
         of daily flow between the near horizon and historical period"
      - "Average change of the date of the annual maximum of the 3-day mean
         of daily flow between the middle horizon and historical period"
      - "Average change of the date of the annual maximum of the 3-day mean
         of daily flow between the distant horizon and historical period"
    description: ""
    method: |
      1. no temporal aggregation - 3-day centered moving average
      2. annual aggregation [Month of minimum monthly flows] - date of the maximum
      3. no temporal aggregation - calculation of the average change between
         the historical period and the {horizon} horizon
    horizon_labels: {H1: near, H2: middle, H3: distant}
    sampling_period: Month of minimum monthly flows
    classification:
      domain: flow
      phenomenon: high flows
      aspect: timing
      season: annual
      output: scalar

  fr:
    variable: [delta-tVCX3_H1, delta-tVCX3_H2, delta-tVCX3_H3]
    unit: jour
    name:
      - "Changement moyen de la date du maximum annuel de la moyenne sur 3
         jours du débit journalier entre l'horizon proche et la période historique"
      - "Changement moyen de la date du maximum annuel de la moyenne sur 3
         jours du débit journalier entre l'horizon moyen et la période historique"
      - "Changement moyen de la date du maximum annuel de la moyenne sur 3
         jours du débit journalier entre l'horizon lointain et la période historique"
    description: ""
    method: |
      1. aucune agrégation temporelle - moyenne mobile centrée sur 3 jours
      2. agrégation annuelle [Mois du minimum des débits mensuels] - date du maximum
      3. aucune agrégation temporelle - calcul du changement moyen entre la
         période historique et l'horizon {horizon}
    horizon_labels: {H1: proche, H2: moyen, H3: lointain}
    sampling_period: Mois du minimum des débits mensuels
    classification:
      domain: débit
      phenomenon: hautes eaux
      aspect: saisonnalité
      season: annuelle
      output: scalaire

  global:
    input_vars: Q
    preferred_sampling_period: "09-01"
    is_date: true
    relative: false
    palette: ["#60265e", "#893687", "#c05fbe", "#dba3da", "#edd1ec",
              "#f6ddd3", "#edbaa7", "#e08765", "#CD5629", "#8f3c1d"]
    horizons:
      H0: ["1976-01-01", "2005-08-31"]
      H1: ["2021-01-01", "2050-12-31"]
      H2: ["2041-01-01", "2070-12-31"]
      H3: ["2070-01-01", "2099-12-31"]

process:
  P1:
    func:
      VC3: [rollmean_center, "Q", {k: 3}]
    time_step: none
    keep: all
    max_na_years: 10

  P2:
    func:
      tVCX3: [nanargmax, "VC3", true]
    sampling_period:
      type: adaptive
      func: [nanmin, "Q"]
    max_na_pct: 3

  P3:
    func:
      delta-tVCX3_H1: [delta, "tVCX3", "date",
                       {past: $H0, future: $H1, relative: false}]
      delta-tVCX3_H2: [delta, "tVCX3", "date",
                       {past: $H0, future: $H2, relative: false}]
      delta-tVCX3_H3: [delta, "tVCX3", "date",
                       {past: $H0, future: $H3, relative: false}]
    time_step: none
