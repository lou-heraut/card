id: VCX10
version: "1.0"
authors: []
date: "2026-04-28"

meta:
  en:
    variable: VCX10
    unit: "m^{3}.s^{-1}"
    name: "Annual maximum of the 10-day moving average of daily flows"
    description: ""
    method: |
      1. no temporal aggregation - 10-day centered moving average
      2. annual aggregation [Month of minimum monthly flows] - maximum
    sampling_period: Month of minimum monthly flows
    topic: "Flow, High Flows, Intensity"

  fr:
    variable: VCX10
    unit: "m^{3}.s^{-1}"
    name: "Maximum annuel de la moyenne mobile sur 10 jours des débits journaliers"
    description: ""
    method: |
      1. aucune agrégation temporelle - moyenne mobile centrée sur 10 jours
      2. agrégation annuelle [Mois du minimum des débits mensuels] - maximum
    sampling_period: Mois du minimum des débits mensuels
    topic: "Débit, Hautes Eaux, Intensité"

  global:
    input_vars: Q
    preferred_sampling_period: "09-01"
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    func:
      VC10: [rollmean_center, "Q", {k: 10}]
    time_step: none
    keep: all
    max_na_years: 10

  P2:
    func:
      VCX10: [nanmax, "VC10"]
    sampling_period:
      type: adaptive
      func: [nanmin, "Q"]
    max_na_pct: 3
