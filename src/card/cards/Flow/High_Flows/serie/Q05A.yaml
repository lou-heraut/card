id: Q05A
version: "1.0"
authors: []
date: "2026-04-28"

meta:
  en:
    variable: Q05A
    unit: "m^{3}.s^{-1}"
    name: "Daily flow exceeded 5 % of the time within the year"
    description: >-
      Annual flow with an exceedance probability of 5 % (95th percentile)
    method: |
      1. annual aggregation [01-01, 12-31] - quantile at the exceedance
         probability of 5 %
    sampling_period: ["01-01", "12-31"]
    topic: "Flow, High Flows, Intensity"

  fr:
    variable: Q05A
    unit: "m^{3}.s^{-1}"
    name: "Débit journalier dépassé 5 % du temps de l'année"
    description: >-
      Débit annuel avec une probabilité de dépassement de 5 % (centile 95 %)
    method: |
      1. agrégation annuelle [01-01, 31-12] - quantile à la probabilité de
         dépassement de 5 %
    sampling_period: ["01-01", "31-12"]
    topic: "Débit, Hautes Eaux, Intensité"

  global:
    input_vars: Q
    preferred_sampling_period: "01-01"
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    func:
      Q05A: [exceedance_quantile, "Q", {p: 0.05}]
    sampling_period: "01-01"
    max_na_pct: 3
    max_na_years: 10
