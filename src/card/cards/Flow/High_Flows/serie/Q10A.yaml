id: Q10A
version: "1.0"
authors: []
date: "2026-04-28"

meta:
  en:
    variable: Q10A
    unit: "m^{3}.s^{-1}"
    name: "Annual flow exceeded 1 year in 10"
    description: >-
      Annual flow with an exceedance probability of 10 % (90th percentile)
    method: |
      1. annual aggregation [01-01, 12-31] - quantile at the exceedance
         probability of 10 %
    sampling_period: ["01-01", "12-31"]
    topic: "Flow, High Flows, Intensity"

  fr:
    variable: Q10A
    unit: "m^{3}.s^{-1}"
    name: "Débit annuel dépassé 1 année sur 10"
    description: >-
      Débit annuel avec une probabilité de dépassement de 10 % (centile 90 %)
    method: |
      1. agrégation annuelle [01-01, 31-12] - quantile à la probabilité de
         dépassement de 10 %
    sampling_period: ["01-01", "31-12"]
    topic: "Débit, Hautes Eaux, Intensité"

  global:
    input_vars: Q
    preferred_sampling_period: "01-01"
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    funct:
      Q10A: [exceedance_quantile, "Q", {p: 0.1}]
    sampling_period: "01-01"
    NApct_lim: 3
    NAyear_lim: 10
