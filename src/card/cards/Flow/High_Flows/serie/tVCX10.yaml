id: tVCX10
version: "1.0"
authors: []
date: "2026-04-28"

meta:
  en:
    variable: tVCX10
    unit: yearday
    name: "Date of the annual maximum of the 10-day mean of daily flow"
    description: ""
    method: |
      1. no temporal aggregation - 10-day centered moving average
      2. annual aggregation [Month of minimum monthly flows] - date of the maximum
    sampling_period: Month of minimum monthly flows
    topic: "Flow, High Flows, Seasonality"

  fr:
    variable: tVCX10
    unit: "jour de l'année"
    name: "Date du maximum annuel de la moyenne sur 10 jours du débit journalier"
    description: ""
    method: |
      1. aucune agrégation temporelle - moyenne mobile centrée sur 10 jours
      2. agrégation annuelle [Mois du minimum des débits mensuels] - date du maximum
    sampling_period: Mois du minimum des débits mensuels
    topic: "Débit, Hautes Eaux, Saisonnalité"

  global:
    input_vars: Q
    preferred_sampling_period: "09-01"
    is_date: true
    to_normalise: false
    palette: ["#60265e", "#893687", "#c05fbe", "#dba3da", "#edd1ec",
              "#f6ddd3", "#edbaa7", "#e08765", "#CD5629", "#8f3c1d"]

process:
  P1:
    funct:
      VC10: [rollmean_center, "Q", {k: 10}]
    time_step: none
    keep: all
    NAyear_lim: 10

  P2:
    funct:
      tVCX10: [nanargmax, "VC10", true]
    sampling_period:
      type: adaptive
      funct: [nanmin, "Q"]
    NApct_lim: 3
