id: fQ10A
version: "1.0"
authors: []
date: "2026-04-28"

meta:
  en:
    variable: fQ10A
    unit: "day.year^{-1}"
    name: "Annual frequency of exceeding Q10"
    description: >-
      Annual frequency of exceeding Q > Q10, where Q10 is the flow exceeded
      10 % of the time, extracted from the ranked flow curve
    method: |
      1. no temporal aggregation - the quantile at the 10 % exceedance
         probability is taken as the threshold
      2. annual aggregation [Month of minimum monthly flows] - ratio of the
         number of days with flow exceeding the threshold to the number of
         days in the year
    sampling_period: Month of minimum monthly flows
    topic: "Flow, High Flows, Frequency"

  fr:
    variable: fQ10A
    unit: "jour.an^{-1}"
    name: "Fréquence annuelle de dépassement du Q10"
    description: >-
      Fréquence annuelle de dépassement de Q > Q10, Q10 est le débit dépassé
      10 % du temps, extrait de la courbe des débits classés
    method: |
      1. aucune agrégation temporelle - le quantile à la probabilité au
         dépassement de 10 % est pris comme seuil
      2. agrégation annuelle [Mois du minimum des débits mensuels] - rapport
         du nombre de jours où le débit dépasse le seuil par le nombre de
         jours dans l'année
    sampling_period: Mois du minimum des débits mensuels
    topic: "Débit, Hautes Eaux, Fréquence"

  global:
    input_vars: Q
    preferred_sampling_period: "09-01"
    to_normalise: false
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    funct:
      lowLim: [exceedance_quantile, "Q", {p: 0.1}]
    time_step: none
    keep: all
    NAyear_lim: 10

  P2:
    funct:
      fQ10A: [exceedance_frequency, "Q", {threshold: lowLim}]
    sampling_period:
      type: adaptive
      funct: [nanmin, "Q"]
    NApct_lim: 3
