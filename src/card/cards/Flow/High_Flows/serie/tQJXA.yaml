id: tQJXA
version: "1.0"
authors: []
date: "2026-04-28"

meta:
  en:
    variable: tQJXA
    unit: yearday
    name: "Date of the annual maximum daily discharge"
    description: ""
    method: |
      1. annual aggregation [Month of minimum monthly flows] - date of maximum
    sampling_period: Month of minimum monthly flows
    topic: "Flow, High Flows, Seasonality"

  fr:
    variable: tQJXA
    unit: "jour de l'année"
    name: "Date du débit journalier maximal annuel"
    description: ""
    method: |
      1. agrégation annuelle [Mois du minimum des débits mensuels] - date du maximum
    sampling_period: Mois du minimum des débits mensuels
    topic: "Débit, Hautes Eaux, Saisonnalité"

  global:
    input_vars: Q
    preferred_sampling_period: "09-01"
    is_date: true
    relative: false
    palette: ["#60265e", "#893687", "#c05fbe", "#dba3da", "#edd1ec",
              "#f6ddd3", "#edbaa7", "#e08765", "#CD5629", "#8f3c1d"]

process:
  P1:
    func:
      tQJXA: [nanargmax, "Q", true]
    sampling_period:
      type: adaptive
      func: [nanmin, "Q"]
    max_na_pct: 3
    max_na_years: 10
