id: delta-VCN30_summer_H
version: "1.0"
authors: []
date: "2026-04-30"

meta:
  en:
    variable: [delta-VCN30_summer_H1, delta-VCN30_summer_H2, delta-VCN30_summer_H3]
    unit: "%"
    name: Average change of summer minimum of 30-day mean daily discharge between the {horizon} horizon and historical period
    description: ""
    method: |
      1. no temporal aggregation - 30-day centered moving average
      2. annual aggregation [05-01, 11-30] - minimum
      3. no temporal aggregation - calculation of the average change between the historical period and the {horizon} horizon
    sampling_period: ["05-01", "11-30"]
    topic: "Flow, Low Flows, Intensity"
    horizon_labels: {H1: near, H2: middle, H3: distant}

  fr:
    variable: [delta-VCN30_été_H1, delta-VCN30_été_H2, delta-VCN30_été_H3]
    unit: "%"
    name: "Changement moyen du minimum estival de la moyenne sur 30 jours du débit journalier entre l'horizon {horizon} et la période historique"
    description: ""
    method: |
      1. aucune agrégation temporelle - moyenne mobile centrée sur 30 jours
      2. agrégation annuelle [01-05, 30-11] - minimum
      3. aucune agrégation temporelle - calcul du changement moyen entre la période historique et l'horizon {horizon}
    sampling_period: ["01-05", "30-11"]
    topic: "Débit, Basses Eaux, Intensité"
    horizon_labels: {H1: proche, H2: moyen, H3: lointain}

  global:
    input_vars: Q
    preferred_sampling_period: "01-01"
    horizons:
      H0: ["1976-01-01", "2005-08-31"]
      H1: ["2021-01-01", "2050-12-31"]
      H2: ["2041-01-01", "2070-12-31"]
      H3: ["2070-01-01", "2099-12-31"]
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    func:
      VC30_summer: [rollmean_center, "Q", {k: 30}]
    time_step: none
    keep: all
    max_na_years: 10

  P2:
    func:
      VCN30_summer: [nanmin, "VC30_summer"]
    sampling_period: ["05-01", "11-30"]
    max_na_pct: 3

  P3:
    func:
      delta-VCN30_summer_H1: [delta, "VCN30_summer", "date", {past: $H0, future: $H1, relative: true}]
      delta-VCN30_summer_H2: [delta, "VCN30_summer", "date", {past: $H0, future: $H2, relative: true}]
      delta-VCN30_summer_H3: [delta, "VCN30_summer", "date", {past: $H0, future: $H3, relative: true}]
    time_step: none
