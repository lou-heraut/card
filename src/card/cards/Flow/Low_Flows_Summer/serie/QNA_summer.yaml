id: QNA_summer
version: "1.0"
authors: []
date: "2026-04-30"

meta:
  en:
    variable: QNA_summer
    unit: "m^{3}.s^{-1}"
    name: Summer minimum of daily discharge
    description: ""
    method: ""
    sampling_period: ["05-01", "11-30"]
    topic: "Flow, Low Flows, Intensity"

  fr:
    variable: QNA_été
    unit: "m^{3}.s^{-1}"
    name: Minimum estival du débit journalier
    description: ""
    method: ""
    sampling_period: ["01-05", "30-11"]
