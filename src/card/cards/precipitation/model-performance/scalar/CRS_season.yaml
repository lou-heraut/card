id: CRS_season
version: "1.0.1"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-04-26"

meta:
  en:
    variable: [CRS_DJF, CRS_MAM, CRS_JJA, CRS_SON]
    unit: "without unit"
    name:
      - Winter precipitation correction coefficient
      - Spring precipitation correction coefficient
      - Summer precipitation correction coefficient
      - Autumn precipitation correction coefficient
    description: ""
    method: "1. seasonal annual aggregation - sums of observed and simulated precipitation\n2. no temporal aggregation - inter-annual means\n3. no temporal aggregation - simulated/observed ratio for each season"
    sampling_period:
      - ["12-01", "02-28(29)"]
      - ["03-01", "05-31"]
      - ["06-01", "08-31"]
      - ["09-01", "11-30"]
    classification:
      domain: precipitation
      season: by season
      output: scalar
      purpose: model performance

  fr:
    variable: [CRS_DJF, CRS_MAM, CRS_JJA, CRS_SON]
    unit: "sans unité"
    name:
      - Coefficient correctif des précipitations hivernales
      - Coefficient correctif des précipitations printanières
      - Coefficient correctif des précipitations estivales
      - Coefficient correctif des précipitations automnales
    description: ""
    method: "1. agrégation annuelle saisonnalisée - sommes des précipitations observées et simulées\n2. aucune agrégation temporelle - moyennes inter-annuelles\n3. aucune agrégation temporelle - rapport simulé/observé pour chaque saison"
    sampling_period:
      - ["01-12", "28(29)-02"]
      - ["01-03", "31-05"]
      - ["01-06", "31-08"]
      - ["01-09", "30-11"]
    classification:
      domain: précipitations
      season: par saison
      output: scalaire
      purpose: performance de modèle

  global:
    input_vars: "R_obs, R_sim"
    relative: false
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    func:
      RSA_obs: [nansum_strict, "R_obs"]
      RSA_sim: [nansum_strict, "R_sim"]
    time_step: year-season
    seasons: [DJF, MAM, JJA, SON]
    max_na_pct: 3
    max_na_years: 10
    compress: true

  P2:
    func:
      mean-RSA_obs_DJF: [nanmean, "RSA_obs_DJF"]
      mean-RSA_obs_MAM: [nanmean, "RSA_obs_MAM"]
      mean-RSA_obs_JJA: [nanmean, "RSA_obs_JJA"]
      mean-RSA_obs_SON: [nanmean, "RSA_obs_SON"]
      mean-RSA_sim_DJF: [nanmean, "RSA_sim_DJF"]
      mean-RSA_sim_MAM: [nanmean, "RSA_sim_MAM"]
      mean-RSA_sim_JJA: [nanmean, "RSA_sim_JJA"]
      mean-RSA_sim_SON: [nanmean, "RSA_sim_SON"]
    time_step: none

  P3:
    func:
      CRS_DJF: [ratio, "mean-RSA_sim_DJF", "mean-RSA_obs_DJF"]
      CRS_MAM: [ratio, "mean-RSA_sim_MAM", "mean-RSA_obs_MAM"]
      CRS_JJA: [ratio, "mean-RSA_sim_JJA", "mean-RSA_obs_JJA"]
      CRS_SON: [ratio, "mean-RSA_sim_SON", "mean-RSA_obs_SON"]
    time_step: none
