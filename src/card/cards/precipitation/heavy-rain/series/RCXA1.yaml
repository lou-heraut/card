id: RCXA1
version: "1.0.1"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-07-16"

meta:
  en:
    variable: RCXA1
    unit: mm
    name: Annual maximum of daily precipitation
    description: ""
    method: "1. annual aggregation [Month of minimum monthly precipitation] - maximum"
    sampling_period: Month of minimum monthly precipitation
    classification:
      domain: precipitation
      phenomenon: heavy rain
      aspect: magnitude
      season: annual
      output: series

  fr:
    variable: RCXA1
    unit: mm
    name: Maximum annuel des précipitations journalières
    description: ""
    method: "1. agrégation annuelle [Mois du minimum des précipitations mensuelles] - maximum"
    sampling_period: Mois du minimum des précipitations mensuelles
    classification:
      domain: précipitations
      phenomenon: pluies fortes
      aspect: intensité
      season: annuelle
      output: série

  global:
    input_vars: R
    preferred_sampling_period: "09-01"
    relative: false
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    func:
      RCXA1: [nanmax, "R"]
    sampling_period:
      type: adaptive
      func: [nanmin, "R"]
    max_na_pct: 3
    max_na_years: 10
