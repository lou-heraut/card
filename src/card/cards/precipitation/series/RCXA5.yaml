id: RCXA5
version: "1.0"
authors: []
date: "2026-04-26"

meta:
  en:
    variable: RCXA5
    unit: mm
    name: Annual maximum of 5-day cumulative daily precipitation
    description: ""
    method: "1. no temporal aggregation - 5-day centered moving sum\n2. annual aggregation [Month of minimum monthly precipitation] - maximum"
    sampling_period: Month of minimum monthly precipitation
    classification:
      domain: precipitation
      phenomenon: heavy rain
      aspect: magnitude
      season: annual
      output: series

  fr:
    variable: RCXA5
    unit: mm
    name: Maximum annuel du cumul sur 5 jours des précipitations journalières
    description: ""
    method: "1. aucune agrégation temporelle - somme mobile centrée sur 5 jours\n2. agrégation annuelle [Mois du minimum des précipitations mensuelles] - maximum"
    sampling_period: Mois du minimum des précipitations mensuelles
    classification:
      domain: précipitations
      phenomenon: pluies fortes
      aspect: intensité
      season: annuelle
      output: série

  global:
    input_vars: R
    relative: false
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    func:
      RC5: [rollsum_center, "R", {k: 5}]
    time_step: none
    keep: all
    max_na_years: 10
  P2:
    func:
      RCXA5: [nanmax, "RC5"]
    sampling_period:
      type: adaptive
      func: [nanmin, "R"]
    max_na_pct: 3
