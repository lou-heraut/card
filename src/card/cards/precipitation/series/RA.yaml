id: RA
version: "1.0.1"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-04-26"

meta:
  en:
    variable: RA
    unit: mm
    name: Cumulative annual total precipitation
    description: ""
    method: "1. annual aggregation [09-01, 08-31] - sum"
    sampling_period: ["09-01", "08-31"]
    classification:
      domain: precipitation
      phenomenon: mean precipitation
      aspect: magnitude
      season: annual
      output: series

  fr:
    variable: RA
    unit: mm
    name: Cumul annuel des précipitations totales
    description: ""
    method: "1. agrégation annuelle [01-09, 31-08] - somme"
    sampling_period: ["01-09", "31-08"]
    classification:
      domain: précipitations
      phenomenon: précipitations moyennes
      aspect: intensité
      season: annuelle
      output: série

  global:
    input_vars: R
    relative: false
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    func:
      RA: [nansum_strict, "R"]
    sampling_period: "09-01"
    max_na_pct: 3
    max_na_years: 10
