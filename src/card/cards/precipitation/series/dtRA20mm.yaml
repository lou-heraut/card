id: dtRA20mm
version: "1.0"
authors: []
date: "2026-04-26"

meta:
  en:
    variable: dtRA20mm
    unit: day
    name: Number of heavy rain days in the year
    description: "Number of days with at least 20 mm of precipitation"
    method: "1. annual aggregation [09-01, 08-31] - number of days with precipitation of at least 20 mm"
    sampling_period: ["09-01", "08-31"]
    classification:
      domain: precipitation
      phenomenon: heavy rain
      aspect: duration
      season: annual
      output: series

  fr:
    variable: dtRA20mm
    unit: jour
    name: Nombre de jours de forte pluie dans l'année
    description: "Nombre de jours avec au moins 20 mm de précipitations"
    method: "1. agrégation annuelle [01-09, 31-08] - nombre de jours avec des précipitations d'au moins 20 mm"
    sampling_period: ["01-09", "31-08"]
    classification:
      domain: précipitations
      phenomenon: pluies fortes
      aspect: durée
      season: annuelle
      output: série

  global:
    input_vars: R
    relative: false
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    func:
      dtRA20mm: [apply_threshold, "R", {lim: 20, where: ">=", what: length, select: all}]
    sampling_period: "09-01"
    max_na_pct: 3
    max_na_years: 10
