id: mean-RSA_season
version: "2.0.1"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-07-18"

meta:
  en:
    variable: [mean-RSA_DJF, mean-RSA_MAM, mean-RSA_JJA, mean-RSA_SON]
    unit: mm
    name:
      - "Inter-annual mean of winter total precipitation (months of December, January and February)"
      - "Inter-annual mean of spring total precipitation (months of March, April and May)"
      - "Inter-annual mean of summer total precipitation (months of June, July and August)"
      - "Inter-annual mean of fall total precipitation (months of September, October and November)"
    description:
      - ""
      - ""
      - ""
      - ""
    method:
      - "1. seasonal annual aggregation [12-01, 02-28(29)] - average\n2. no temporal aggregation - average"
      - "1. seasonal annual aggregation [03-01, 05-31] - average\n2. no temporal aggregation - average"
      - "1. seasonal annual aggregation [06-01, 08-31] - average\n2. no temporal aggregation - average"
      - "1. seasonal annual aggregation [09-01, 11-30] - average\n2. no temporal aggregation - average"
    sampling_period:
      - ["12-01", "02-28(29)"]
      - ["03-01", "05-31"]
      - ["06-01", "08-31"]
      - ["09-01", "11-30"]
    classification:
      domain: precipitation
      phenomenon: mean precipitation
      aspect: magnitude
      season: by season
      output: scalar

  fr:
    variable: [moyenne-RSA_DJF, moyenne-RSA_MAM, moyenne-RSA_JJA, moyenne-RSA_SON]
    unit: mm
    name:
      - Moyenne inter-annuelle des précipitations totales d'hiver
      - Moyenne inter-annuelle des précipitations totales de printemps
      - Moyenne inter-annuelle des précipitations totales d'été
      - Moyenne inter-annuelle des précipitations totales d'automne
    description:
      - "Mois de décembre, janvier et février"
      - "Mois de mars, avril et mai"
      - "Mois de juin, juillet et août"
      - "Mois de septembre, octobre et novembre"
    method:
      - "1. agrégation annuelle saisonnalisée [01-12, 28(29)-02] - moyenne\n2. aucune agrégation temporelle - moyenne"
      - "1. agrégation annuelle saisonnalisée [01-03, 31-05] - moyenne\n2. aucune agrégation temporelle - moyenne"
      - "1. agrégation annuelle saisonnalisée [01-06, 31-08] - moyenne\n2. aucune agrégation temporelle - moyenne"
      - "1. agrégation annuelle saisonnalisée [01-09, 30-11] - moyenne\n2. aucune agrégation temporelle - moyenne"
    sampling_period:
      - ["01-12", "28(29)-02"]
      - ["01-03", "31-05"]
      - ["01-06", "31-08"]
      - ["01-09", "30-11"]
    classification:
      domain: précipitations
      phenomenon: précipitations moyennes
      aspect: intensité
      season: par saison
      output: scalaire

  global:
    input_vars: R
    relative: false
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    func:
      RSA: [nansum_strict, "R"]
    time_step: year-season
    seasons: [DJF, MAM, JJA, SON]
    max_na_pct: 3
    max_na_years: 10
    compress: true
  P2:
    func:
      mean-RSA_DJF: [nanmean, "RSA_DJF"]
      mean-RSA_MAM: [nanmean, "RSA_MAM"]
      mean-RSA_JJA: [nanmean, "RSA_JJA"]
      mean-RSA_SON: [nanmean, "RSA_SON"]
    time_step: none
