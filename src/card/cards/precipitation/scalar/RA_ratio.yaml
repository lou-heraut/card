id: RA_ratio
version: "1.0"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-04-26"

meta:
  en:
    variable: [Rl_ratio, Rs_ratio]
    unit: [without unit, without unit]
    name:
      - "Ratio of liquid to total precipitation"
      - "Ratio of solid to total precipitation"
    description: ""
    method: "1. annual aggregation [09-01, 08-31] - sums of total, liquid and solid precipitation\n2. no temporal aggregation - inter-annual means\n3. no temporal aggregation - liquid/total and solid/total ratios"
    sampling_period: ["09-01", "08-31"]
    classification:
      domain: precipitation
      aspect: magnitude
      season: annual
      output: scalar

  fr:
    variable: [Rl_ratio, Rs_ratio]
    unit: [sans unité, sans unité]
    name:
      - "Rapport des précipitations liquides aux précipitations totales"
      - "Rapport des précipitations solides aux précipitations totales"
    description: ""
    method: "1. agrégation annuelle [01-09, 31-08] - sommes des précipitations totales, liquides et solides\n2. aucune agrégation temporelle - moyennes inter-annuelles\n3. aucune agrégation temporelle - rapports liquide/total et solide/total"
    sampling_period: ["01-09", "31-08"]
    classification:
      domain: précipitations
      aspect: intensité
      season: annuelle
      output: scalaire

  global:
    input_vars: "R, Rl, Rs"
    relative: false

process:
  P1:
    func:
      RA:  [nansum_strict, "R"]
      RAl: [nansum_strict, "Rl"]
      RAs: [nansum_strict, "Rs"]
    sampling_period: "09-01"
    max_na_pct: 3
    max_na_years: 10
  P2:
    func:
      mean-RA:  [nanmean, "RA"]
      mean-RAl: [nanmean, "RAl"]
      mean-RAs: [nanmean, "RAs"]
    time_step: none
  P3:
    func:
      Rl_ratio: [ratio, "mean-RAl", "mean-RA"]
      Rs_ratio: [ratio, "mean-RAs", "mean-RA"]
    time_step: none
