id: mean-RA
version: "1.0"
authors: []
date: "2026-04-26"

meta:
  en:
    variable: mean-RA
    unit: mm
    name: Inter-annual mean of the annual total precipitation
    description: ""
    method: "1. annual aggregation [09-01, 08-31] - sum\n2. no temporal aggregation - average"
    sampling_period: ["09-01", "08-31"]
    classification:
      domain: precipitation
      aspect: magnitude
      season: annual
      output: scalar

  fr:
    variable: moyenne-RA
    unit: mm
    name: Moyenne inter-annuelle du cumul annuel des précipitations totales
    description: ""
    method: "1. agrégation annuelle [01-09, 31-08] - somme\n2. aucune agrégation temporelle - moyenne"
    sampling_period: ["01-09", "31-08"]
    classification:
      domain: précipitations
      aspect: intensité
      season: annuelle
      output: scalaire

  global:
    input_vars: R
    relative: false
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    func:
      RA: [nansum_strict, "R"]
    sampling_period: "09-01"
    max_na_pct: 3
    max_na_years: 10
  P2:
    func:
      mean-RA: [nanmean, "RA"]
    time_step: none
