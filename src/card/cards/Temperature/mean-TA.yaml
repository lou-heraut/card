id: mean-TA
version: "1.0"
authors: []
date: "2026-04-26"

meta:
  en:
    variable: mean-TA
    unit: "°C"
    name: Inter-annual mean of the annual mean temperature
    description: ""
    method: "1. annual aggregation [09-01, 08-31] - mean\n2. no temporal aggregation - average"
    sampling_period: ["09-01", "08-31"]
    topic: "Temperature, Average, Intensity"

  fr:
    variable: moyenne-TA
    unit: "°C"
    name: Moyenne inter-annuelle de la température moyenne annuelle
    description: ""
    method: "1. agrégation annuelle [01-09, 31-08] - moyenne\n2. aucune agrégation temporelle - moyenne"
    sampling_period: ["01-09", "31-08"]
    topic: "Température, Moyenne, Intensité"

  global:
    input_vars: T
    relative: false
    palette: ["#053061", "#2166AC", "#4393C3", "#92C5DE", "#D1E5F0",
              "#FDDBC7", "#F4A582", "#D6604D", "#B2182B", "#67001F"]

process:
  P1:
    func:
      TA: [nanmean, "T"]
    sampling_period: "09-01"
    max_na_pct: 3
    max_na_years: 10
  P2:
    func:
      mean-TA: [nanmean, "TA"]
    time_step: none
