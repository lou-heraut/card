id: mean-TSA_season
version: "1.0"
authors: []
date: "2026-04-26"

meta:
  en:
    variable: [mean-TSA_DJF, mean-TSA_MAM, mean-TSA_JJA, mean-TSA_SON]
    unit: "°C"
    name:
      - "Inter-annual mean of winter mean temperatures (months of December, January and February)"
      - "Inter-annual mean of spring mean temperatures (months of March, April and May)"
      - "Inter-annual mean of summer mean temperatures (months of June, July and August)"
      - "Inter-annual mean of fall mean temperatures (months of September, October and November)"
    description:
      - ""
      - ""
      - ""
      - ""
    method:
      - "1. seasonal annual aggregation [12-01, 02-28(29)] - average\n2. no temporal aggregation - average"
      - "1. seasonal annual aggregation [03-01, 05-31] - average\n2. no temporal aggregation - average"
      - "1. seasonal annual aggregation [06-01, 08-31] - average\n2. no temporal aggregation - average"
      - "1. seasonal annual aggregation [09-01, 11-30] - average\n2. no temporal aggregation - average"
    sampling_period:
      - ["12-01", "02-28(29)"]
      - ["03-01", "05-31"]
      - ["06-01", "08-31"]
      - ["09-01", "11-30"]
    topic: "Temperature, Average, Intensity"

  fr:
    variable: [moyenne-TSA_DJF, moyenne-TSA_MAM, moyenne-TSA_JJA, moyenne-TSA_SON]
    unit: "°C"
    name:
      - Moyenne inter-annuelle des températures moyennes d'hiver
      - Moyenne inter-annuelle des températures moyennes de printemps
      - Moyenne inter-annuelle des températures moyennes d'été
      - Moyenne inter-annuelle des températures moyennes d'automne
    description:
      - "Mois de décembre, janvier et février"
      - "Mois de mars, avril et mai"
      - "Mois de juin, juillet et août"
      - "Mois de septembre, octobre et novembre"
    method:
      - "1. agrégation annuelle saisonnalisée [01-12, 28(29)-02] - moyenne\n2. aucune agrégation temporelle - moyenne"
      - "1. agrégation annuelle saisonnalisée [01-03, 31-05] - moyenne\n2. aucune agrégation temporelle - moyenne"
      - "1. agrégation annuelle saisonnalisée [01-06, 31-08] - moyenne\n2. aucune agrégation temporelle - moyenne"
      - "1. agrégation annuelle saisonnalisée [01-09, 30-11] - moyenne\n2. aucune agrégation temporelle - moyenne"
    sampling_period:
      - ["01-12", "28(29)-02"]
      - ["01-03", "31-05"]
      - ["01-06", "31-08"]
      - ["01-09", "30-11"]
    topic: "Température, Moyenne, Intensité"

  global:
    input_vars: T
    relative: false
    palette: ["#053061", "#2166AC", "#4393C3", "#92C5DE", "#D1E5F0",
              "#FDDBC7", "#F4A582", "#D6604D", "#B2182B", "#67001F"]

process:
  P1:
    func:
      TSA: [nanmean, "T"]
    time_step: year-season
    seasons: [DJF, MAM, JJA, SON]
    max_na_pct: 3
    max_na_years: 10
    compress: true
  P2:
    func:
      mean-TSA_DJF: [nanmean, "TSA_DJF"]
      mean-TSA_MAM: [nanmean, "TSA_MAM"]
      mean-TSA_JJA: [nanmean, "TSA_JJA"]
      mean-TSA_SON: [nanmean, "TSA_SON"]
    time_step: none
