id: delta-QSA_season_H
version: "1.1"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-07-21"

meta:
  en:
    variable:
    - delta-QSA_DJF
    - delta-QSA_MAM
    - delta-QSA_JJA
    - delta-QSA_SON
    unit: '%'
    name:
    - Average change of average daily flows for each winter between the {suffix.name} horizon and historical period
    - Average change of average daily flows for each spring between the {suffix.name} horizon and historical period
    - Average change of average daily flows for each summer between the {suffix.name} horizon and historical period
    - Average change of average daily flows for each autumn between the {suffix.name} horizon and historical period
    description:
    - Months of December, January, and February
    - Months of March, April, and May
    - Months of June, July, and August
    - Months of September, October, and November
    method:
    - |-
      1. seasonal annual aggregation [12-01, 02-28(29)] - mean
      2. no temporal aggregation - calculation of the average change between the historical period and the {suffix.name} horizon
    - |-
      1. seasonal annual aggregation [03-01, 05-31] - mean
      2. no temporal aggregation - calculation of the average change between the historical period and the {suffix.name} horizon
    - |-
      1. seasonal annual aggregation [06-01, 08-31] - mean
      2. no temporal aggregation - calculation of the average change between the historical period and the {suffix.name} horizon
    - |-
      1. seasonal annual aggregation [09-01, 11-30] - mean
      2. no temporal aggregation - calculation of the average change between the historical period and the {suffix.name} horizon
    sampling_period:
    - - 12-01
      - 02-28(29)
    - - 03-01
      - 05-31
    - - 06-01
      - 08-31
    - - 09-01
      - 11-30
    classification:
      domain: flow
      phenomenon: mean flows
      aspect: magnitude
      season: by season
      output: scalar
    suffix_default:
      name: target

  fr:
    variable:
    - delta-QSA_DJF
    - delta-QSA_MAM
    - delta-QSA_JJA
    - delta-QSA_SON
    unit: '%'
    name:
    - Changement moyen de la moyenne des débits journaliers de chaque hiver entre l'horizon {suffix.name} et la période historique
    - Changement moyen de la moyenne des débits journaliers de chaque printemps entre l'horizon {suffix.name} et la période historique
    - Changement moyen de la moyenne des débits journaliers de chaque été entre l'horizon {suffix.name} et la période historique
    - Changement moyen de la moyenne des débits journaliers de chaque automne entre l'horizon {suffix.name} et la période historique
    description:
    - Mois de décembre, janvier et février
    - Mois de mars, avril et mai
    - Mois de juin, juillet et août
    - Mois de septembre, octobre et novembre
    method:
    - |-
      1. agrégation annuelle saisonnalisée [01-12, 28(29)-02] - moyenne
      2. aucune agrégation temporelle - calcul du changement moyen entre la période historique et l'horizon {suffix.name}
    - |-
      1. agrégation annuelle saisonnalisée [01-03, 31-05] - moyenne
      2. aucune agrégation temporelle - calcul du changement moyen entre la période historique et l'horizon {suffix.name}
    - |-
      1. agrégation annuelle saisonnalisée [01-06, 31-08] - moyenne
      2. aucune agrégation temporelle - calcul du changement moyen entre la période historique et l'horizon {suffix.name}
    - |-
      1. agrégation annuelle saisonnalisée [01-09, 30-11] - moyenne
      2. aucune agrégation temporelle - calcul du changement moyen entre la période historique et l'horizon {suffix.name}
    sampling_period:
    - - 01-12
      - 28(29)-02
    - - 01-03
      - 31-05
    - - 01-06
      - 31-08
    - - 01-09
      - 30-11
    classification:
      domain: débit
      phenomenon: moyennes eaux
      aspect: intensité
      season: par saison
      output: scalaire
    suffix_default:
      name: cible

  global:
    input_vars: "Q, ref_start, ref_end, horizon_start, horizon_end"
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    func:
      QSA: [nanmean, "Q"]
    time_step: year-season
    seasons: [DJF, MAM, JJA, SON]
    max_na_pct: 3
    max_na_years: 10
    compress: true

  P2:
    func:
      delta-QSA_DJF: [delta, "QSA_DJF", "date", {ref_start: "ref_start", ref_end: "ref_end", horizon_start: "horizon_start", horizon_end: "horizon_end", relative: true}]
      delta-QSA_MAM: [delta, "QSA_MAM", "date", {ref_start: "ref_start", ref_end: "ref_end", horizon_start: "horizon_start", horizon_end: "horizon_end", relative: true}]
      delta-QSA_JJA: [delta, "QSA_JJA", "date", {ref_start: "ref_start", ref_end: "ref_end", horizon_start: "horizon_start", horizon_end: "horizon_end", relative: true}]
      delta-QSA_SON: [delta, "QSA_SON", "date", {ref_start: "ref_start", ref_end: "ref_end", horizon_start: "horizon_start", horizon_end: "horizon_end", relative: true}]
    time_step: none
