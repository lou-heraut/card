id: delta-Q50A_H
version: "1.1"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-07-21"

meta:
  en:
    variable: delta-Q50A
    unit: "%"
    name: "Average change of the annual median of daily flows between the {suffix.name} horizon and historical period"
    description: "Annual flow with an exceedance probability of 50 % (50th percentile)"
    method: |
      1. annual aggregation [01-01, 12-31] - median
      2. no temporal aggregation - calculation of the average change between
         the historical period and the {suffix.name} horizon
    suffix_default:
      name: target
    sampling_period: ["01-01", "12-31"]
    classification:
      domain: flow
      phenomenon: mean flows
      aspect: magnitude
      season: annual
      output: scalar

  fr:
    variable: delta-Q50A
    unit: "%"
    name: "Changement moyen de la médiane annuelle des débits journaliers entre l'horizon {suffix.name} et la période historique"
    description: "Débit annuel avec une probabilité de dépassement de 50 % (centile 50 %)"
    method: |
      1. agrégation annuelle [01-01, 31-12] - médiane
      2. aucune agrégation temporelle - calcul du changement moyen entre la
         période historique et l'horizon {suffix.name}
    suffix_default:
      name: cible
    sampling_period: ["01-01", "31-12"]
    classification:
      domain: débit
      phenomenon: moyennes eaux
      aspect: intensité
      season: annuelle
      output: scalaire

  global:
    input_vars: "Q, ref_start, ref_end, horizon_start, horizon_end"
    preferred_sampling_period: "01-01"
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    func:
      Q50A: [exceedance_quantile, "Q", {p: 0.5}]
    sampling_period: "01-01"
    max_na_pct: 3
    max_na_years: 10

  P2:
    func:
      delta-Q50A: [delta, "Q50A", "date", {ref_start: "ref_start", ref_end: "ref_end", horizon_start: "horizon_start", horizon_end: "horizon_end", relative: true}]
    time_step: none
