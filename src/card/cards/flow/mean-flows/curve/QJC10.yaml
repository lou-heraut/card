id: QJC10
version: "2.1"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-07-18"

meta:
  en:
    variable: QJC10
    unit: "m^{3}.s^{-1}"
    name: Inter-annual daily flow regime over {suffix.name} smoothed over 10 days
    description: >-
      Mean flow of each day of the year over {suffix.name}, then
      10-day centered moving average (365 values)
    method: |
      1. aggregation by day of the year over {suffix.name} - mean
      2. no temporal aggregation - 10-day centered moving average
    suffix_default:
      name: the whole record
    classification:
      domain: flow
      phenomenon: mean flows
      aspect: magnitude
      season: record
      output: curve

  fr:
    variable: QJC10
    unit: "m^{3}.s^{-1}"
    name: Régime journalier inter-annuel sur {suffix.name} lissé sur 10 jours
    description: >-
      Moyenne des débits de chaque jour de l'année sur {suffix.name},
      puis moyenne mobile centrée sur 10 jours (365 valeurs)
    method: |
      1. agrégation par jour de l'année sur {suffix.name} - moyenne
      2. aucune agrégation temporelle - moyenne mobile centrée sur 10 jours
    suffix_default:
      name: la chronique entière
    classification:
      domain: débit
      phenomenon: moyennes eaux
      aspect: intensité
      season: chronique
      output: courbe

  global:
    input_vars: "Q, period_start?, period_end?"
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    func:
      QJ: [over_period, "Q", {func: nanmean, dates: "date", period_start: "period_start", period_end: "period_end"}]
    time_step: yearday
    max_na_pct: 3
    max_na_years: 10

  P2:
    func:
      QJC10: [rollmean_center, "QJ", {k: 10, cyclical: true}]
    time_step: none
    keep: [QJC10]
