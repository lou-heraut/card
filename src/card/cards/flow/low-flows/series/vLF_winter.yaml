id: vLF_winter
version: "1.0"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-07-15"

meta:
  en:
    variable: vLF_winter
    unit: "hm^{3}"
    name: Volume deficit of winter low flows
    description: "In winter, sum of the differences between the 10-day mean and the maximum of VCN10, over the longest sequence below this threshold (November to April)"
    method: |
      1. no temporal aggregation - 10-day centered moving average
      2. annual aggregation [11-01, 04-30] - minimum (extraction from the series of VCN10)
      3. no temporal aggregation - the maximum of the previous series is taken as the threshold
      4. annual aggregation [11-01, 04-30] - sum of the volumes discharged each day of the longest period below the previous threshold
    sampling_period: ["11-01", "04-30"]
    classification:
      domain: flow
      phenomenon: low flows
      aspect: magnitude
      season: winter
      output: series

  fr:
    variable: vBE_hiver
    unit: "hm^{3}"
    name: Volume de déficit des basses eaux hivernales
    description: "En hiver, somme des écarts entre la moyenne sur 10 jours et le maximum des VCN10, sur la séquence la plus longue sous ce seuil (mois de novembre à avril)"
    method: |
      1. aucune agrégation temporelle - moyenne mobile centrée sur 10 jours
      2. agrégation annuelle [01-11, 30-04] - minimum (extraction de la série des VCN10)
      3. aucune agrégation temporelle - le maximum de la précédente série est pris comme seuil
      4. agrégation annuelle [01-11, 30-04] - somme des volumes écoulés chaque jour de la plus longue période sous le précédent seuil
    sampling_period: ["01-11", "30-04"]
    classification:
      domain: débit
      phenomenon: basses eaux
      aspect: intensité
      season: hivernale
      output: série

  global:
    input_vars: Q
    preferred_sampling_period: "01-01"
    palette: ["#003C30", "#01665E", "#35978F", "#80CDC1", "#C7EAE5",
              "#F6E8C3", "#DFC27D", "#BF812D", "#8C510A", "#543005"]

process:
  P1:
    func:
      VC10_winter: [rollmean_center, "Q", {k: 10}]
    time_step: none
    keep: all

  P2:
    func:
      VCN10_winter: [nanmin, "VC10_winter"]
    sampling_period: ["11-01", "04-30"]
    max_na_pct: 3
    max_na_years: 10
    keep: all

  P3:
    func:
      upLim: [nanmax, "VCN10_winter"]
    time_step: none
    keep: all

  P4:
    func:
      vLF_winter: [deficit_volume, "VC10_winter", {threshold: upLim}]
    sampling_period: ["11-01", "04-30"]
    max_na_pct: 3
