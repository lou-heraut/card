id: Q95A
version: "1.0"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-04-28"

meta:
  en:
    variable: Q95A
    unit: "m^{3}.s^{-1}"
    name: Daily flow exceeded 95 % of the time within the year
    description: Annual flow with an exceedance probability of 95 % (5th percentile)
    method: "1. annual aggregation [01-01, 12-31] - quantile at the exceedance probability of 95 %"
    sampling_period: ["01-01", "12-31"]
    classification:
      domain: flow
      phenomenon: low flows
      aspect: magnitude
      season: annual
      output: series

  fr:
    variable: Q95A
    unit: "m^{3}.s^{-1}"
    name: Débit journalier dépassé 95 % du temps de l'année
    description: Débit annuel avec une probabilité de dépassement de 95 % (centile 5 %)
    method: "1. agrégation annuelle [01-01, 31-12] - quantile à la probabilité au dépassement de 95 %"
    sampling_period: ["01-01", "31-12"]
    classification:
      domain: débit
      phenomenon: basses eaux
      aspect: intensité
      season: annuelle
      output: série

  global:
    input_vars: Q
    preferred_sampling_period: "01-01"
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    func:
      Q95A: [exceedance_quantile, "Q", {p: 0.95}]
    sampling_period: "01-01"
    max_na_pct: 3
    max_na_years: 10
