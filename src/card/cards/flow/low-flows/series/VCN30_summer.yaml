id: VCN30_summer
version: "1.0"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-04-30"

meta:
  en:
    variable: VCN30_summer
    unit: "m^{3}.s^{-1}"
    name: Summer minimum of 30-day mean daily discharge
    description: ""
    method: |
      1. no temporal aggregation - 30-day centered moving average
      2. annual aggregation [05-01, 11-30] - minimum
    sampling_period: ["05-01", "11-30"]
    classification:
      domain: flow
      phenomenon: low flows
      aspect: magnitude
      season: summer
      output: series

  fr:
    variable: VCN30_été
    unit: "m^{3}.s^{-1}"
    name: Minimum estival de la moyenne sur 30 jours du débit journalier
    description: ""
    method: |
      1. aucune agrégation temporelle - moyenne mobile centrée sur 30 jours
      2. agrégation annuelle [01-05, 30-11] - minimum
    sampling_period: ["01-05", "30-11"]
    classification:
      domain: débit
      phenomenon: basses eaux
      aspect: intensité
      season: estivale
      output: série

  global:
    input_vars: Q
    preferred_sampling_period: "01-01"
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    func:
      VC30_summer: [rollmean_center, "Q", {k: 30}]
    time_step: none
    keep: all
    max_na_years: 10

  P2:
    func:
      VCN30_summer: [nanmin, "VC30_summer"]
    sampling_period: ["05-01", "11-30"]
    max_na_pct: 3
