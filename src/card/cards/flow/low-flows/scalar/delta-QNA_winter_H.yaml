id: delta-QNA_winter_H
version: "2.1"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-07-21"

meta:
  en:
    variable: delta-QNA_winter
    unit: "%"
    name: "Average change of winter minimum of daily discharge between the {suffix.name} horizon and historical period"
    description: ""
    method: "1. annual aggregation [11-01, 04-30] - minimum\n2. no temporal aggregation - calculation of the average change between the historical period and the {suffix.name} horizon"
    sampling_period: ["11-01", "04-30"]
    classification:
      domain: flow
      phenomenon: low flows
      aspect: magnitude
      season: winter
      output: scalar
    suffix_default:
      name: target

  fr:
    variable: delta-QNA_hiver
    unit: "%"
    name: "Changement moyen du minimum hivernal du débit journalier entre l'horizon {suffix.name} et la période historique"
    description: ""
    method: "1. agrégation annuelle [01-11, 30-04] - minimum\n2. aucune agrégation temporelle - calcul du changement moyen entre la période historique et l'horizon {suffix.name}"
    sampling_period: ["01-11", "30-04"]
    classification:
      domain: débit
      phenomenon: basses eaux
      aspect: intensité
      season: hivernale
      output: scalaire
    suffix_default:
      name: cible

  global:
    input_vars: "Q, ref_start, ref_end, horizon_start, horizon_end"
    preferred_sampling_period: "01-01"
    relative: false
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    func:
      QNA_winter: [nanmin, "Q"]
    sampling_period: ["11-01", "04-30"]
    max_na_pct: 3
    max_na_years: 10

  P2:
    func:
      delta-QNA_winter: [delta, "QNA_winter", "date", {ref_start: "ref_start", ref_end: "ref_end", horizon_start: "horizon_start", horizon_end: "horizon_end", relative: true}]
    time_step: none
