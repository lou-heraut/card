id: delta-QNA_summer_H
version: "2.1"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-07-21"

meta:
  en:
    variable: delta-QNA_summer
    unit: "%"
    name: "Average change of summer minimum of daily discharge between the historical period and the {suffix.name} horizon"
    description: ""
    method: "1. annual aggregation [05-01, 11-30] - minimum\n2. no temporal aggregation - average change between the historical period and the {suffix.name} horizon"
    sampling_period: ["05-01", "11-30"]
    classification:
      domain: flow
      phenomenon: low flows
      aspect: magnitude
      season: summer
      output: scalar
    suffix_default:
      name: target

  fr:
    variable: delta-QNA_été
    unit: "%"
    name: "Changement moyen du minimum estival du débit journalier entre la période historique et l'horizon {suffix.name}"
    description: ""
    method: "1. agrégation annuelle [01-05, 30-11] - minimum\n2. aucune agrégation temporelle - changement moyen entre la période historique et l'horizon {suffix.name}"
    sampling_period: ["01-05", "30-11"]
    classification:
      domain: débit
      phenomenon: basses eaux
      aspect: intensité
      season: estivale
      output: scalaire
    suffix_default:
      name: cible

  global:
    input_vars: "Q, ref_start, ref_end, horizon_start, horizon_end"
    preferred_sampling_period: "01-01"
    relative: false
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    func:
      QNA_summer: [nanmin, "Q"]
    sampling_period: ["05-01", "11-30"]
    max_na_pct: 3
    max_na_years: 10

  P2:
    func:
      delta-QNA_summer: [delta, "QNA_summer", "date", {ref_start: "ref_start", ref_end: "ref_end", horizon_start: "horizon_start", horizon_end: "horizon_end", relative: true}]
    time_step: none
