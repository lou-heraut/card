id: delta-allLF_H
version: "2.1"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-07-21"

meta:
  en:
    variable:
    - delta-startLF
    - delta-centerLF
    - delta-endLF
    - delta-dtLF
    - delta-vLF
    unit:
    - day
    - day
    - day
    - day
    - '%'
    name:
    - Average change of the start of low flows between the {suffix.name} horizon and historical period
    - Average change of the center of low flows between the {suffix.name} horizon and historical period
    - Average change of the end of low flows between the {suffix.name} horizon and historical period
    - Average change of duration of low flows between the {suffix.name} horizon and historical period
    - Average change of low flow deficit volume between the {suffix.name} horizon and historical period
    description:
    - Date of the first 10-day mean flow value below the threshold set at the maximum of VCN10
    - Date of the minimal 10-day mean flow value below the threshold set at the maximum of VCN10
    - Date of the last 10-day mean flow value below the threshold set at the maximum of VCN10
    - Duration of the longest continuous sequence with 10-day mean flows below the threshold set at the maximum of VCN10
    - Sum of differences between the 10-day mean and the maximum of VCN10, over the longest sequence below this threshold
    method:
    - |
      1. no temporal aggregation - 10-day centered moving average
      2. annual aggregation [Month of maximum monthly flows] - minimum (series of VCN10)
      3. no temporal aggregation - the maximum of the previous series is taken as the threshold
      4. annual aggregation [Month of maximum monthly flows] - date of the first day of the longest period below the previous threshold
      5. no temporal aggregation - calculation of the average change between the historical period and the {suffix.name} horizon
    - |
      1. no temporal aggregation - 10-day centered moving average (series of VC10)
      2. annual aggregation [Month of maximum monthly flows] - minimum (series of VCN10)
      3. no temporal aggregation - the maximum of the previous series is taken as the threshold
      4. annual aggregation [Month of maximum monthly flows] - date of the minimum of the VC10 of the longest period below the previous threshold
      5. no temporal aggregation - calculation of the average change between the historical period and the {suffix.name} horizon
    - |
      1. no temporal aggregation - 10-day centered moving average
      2. annual aggregation [Month of maximum monthly flows] - minimum
      3. no temporal aggregation - the maximum of the previous series is taken as the threshold
      4. annual aggregation [Month of maximum monthly flows] - date of the last day of the longest period below the previous threshold
      5. no temporal aggregation - calculation of the average change between the historical period and the {suffix.name} horizon
    - |
      1. no temporal aggregation - 10-day centered moving average
      2. annual aggregation [Month of maximum monthly flows] - minimum (extraction from the series of VCN10)
      3. no temporal aggregation - the maximum of the previous series is taken as the threshold
      4. annual aggregation [Month of maximum monthly flows] - number of days in the longest period below the previous threshold
      5. no temporal aggregation - calculation of the average change between the historical period and the {suffix.name} horizon
    - |
      1. no temporal aggregation - 10-day centered moving average
      2. annual aggregation [Month of maximum monthly flows] - minimum (extraction from the series of VCN10)
      3. no temporal aggregation - the maximum of the previous series is taken as the threshold
      4. annual aggregation [Month of maximum monthly flows] - sum of volumes discharged each day in the longest period below the previous threshold
      5. no temporal aggregation - calculation of the average change between the historical period and the {suffix.name} horizon
    sampling_period: Month of maximum monthly flows
    classification:
      domain: flow
      phenomenon: low flows
      aspect:
      - timing
      - timing
      - timing
      - duration
      - magnitude
      season: annual
      output: scalar
    suffix_default:
      name: target

  fr:
    variable:
    - delta-debutBE
    - delta-centreBE
    - delta-finBE
    - delta-dtBE
    - delta-vBE
    unit:
    - jour
    - jour
    - jour
    - jour
    - '%'
    name:
    - Changement moyen du début des basses eaux entre l'horizon {suffix.name} et la période historique
    - Changement moyen du centre des basses eaux entre l'horizon {suffix.name} et la période historique
    - Changement moyen de la fin des basses eaux entre l'horizon {suffix.name} et la période historique
    - Changement moyen de la durée des basses eaux entre l'horizon {suffix.name} et la période historique
    - Changement moyen du volume de déficit des basses eaux entre l'horizon {suffix.name} et la période historique
    description:
    - Date de la première valeur de débits moyens sur 10 jours sous le seuil fixé au maximum des VCN10
    - Date de la valeur minimale des débits moyens sur 10 jours sous le seuil fixé au maximum des VCN10
    - Date de la dernière valeur de débits moyens sur 10 jours sous le seuil fixé au maximum des VCN10
    - Durée de la plus longue séquence continue avec des débits moyens sur 10 jours sous le seuil fixé au maximum des VCN10
    - Somme des écarts entre la moyenne sur 10 jours et le maximum des VCN10, sur la séquence la plus longue sous ce seuil
    method:
    - |
      1. aucune agrégation temporelle - moyenne mobile centrée sur 10 jours
      2. agrégation annuelle [Mois du maximum des débits mensuels] - minimum (série des VCN10)
      3. aucune agrégation temporelle - le maximum de la précédente série est pris comme seuil
      4. agrégation annuelle [Mois du maximum des débits mensuels] - date du premier jour de la plus longue période sous le précédent seuil
      5. aucune agrégation temporelle - calcul du changement moyen entre la période historique et l'horizon {suffix.name}
    - |
      1. aucune agrégation temporelle - moyenne mobile centrée sur 10 jours (série des VC10)
      2. agrégation annuelle [Mois du maximum des débits mensuels] - minimum (série des VCN10)
      3. aucune agrégation temporelle - le maximum de la précédente série est pris comme seuil
      4. agrégation annuelle [Mois du maximum des débits mensuels] - date du minimum des VC10 de la plus longue période sous le précédent seuil
      5. aucune agrégation temporelle - calcul du changement moyen entre la période historique et l'horizon {suffix.name}
    - |
      1. aucune agrégation temporelle - moyenne mobile centrée sur 10 jours
      2. agrégation annuelle [Mois du maximum des débits mensuels] - minimum
      3. aucune agrégation temporelle - le maximum de la précédente série est pris comme seuil
      4. agrégation annuelle [Mois du maximum des débits mensuels] - date du dernier jour de la plus longue période sous le précédent seuil
      5. aucune agrégation temporelle - calcul du changement moyen entre la période historique et l'horizon {suffix.name}
    - |
      1. aucune agrégation temporelle - moyenne mobile centrée sur 10 jours
      2. agrégation annuelle [Mois du maximum des débits mensuels] - minimum (extraction de la série des VCN10)
      3. aucune agrégation temporelle - le maximum de la précédente série est pris comme seuil
      4. agrégation annuelle [Mois du maximum des débits mensuels] - nombre de jours de la plus longue période sous le précédent seuil
      5. aucune agrégation temporelle - calcul du changement moyen entre la période historique et l'horizon {suffix.name}
    - |
      1. aucune agrégation temporelle - moyenne mobile centrée sur 10 jours
      2. agrégation annuelle [Mois du maximum des débits mensuels] - minimum (extraction de la série des VCN10)
      3. aucune agrégation temporelle - le maximum de la précédente série est pris comme seuil
      4. agrégation annuelle [Mois du maximum des débits mensuels] - somme des volumes écoulés chaque jour de la plus longue période sous le précédent seuil
      5. aucune agrégation temporelle - calcul du changement moyen entre la période historique et l'horizon {suffix.name}
    sampling_period: Mois du maximum des débits mensuels
    classification:
      domain: débit
      phenomenon: basses eaux
      aspect:
      - saisonnalité
      - saisonnalité
      - saisonnalité
      - durée
      - intensité
      season: annuelle
      output: scalaire
    suffix_default:
      name: cible

  global:
    input_vars: "Q, ref_start, ref_end, horizon_start, horizon_end"
    preferred_sampling_period: "01-01"
    is_date: [true, true, true, true, true, true, true, true, true,
              false, false, false, false, false, false]
    relative: [false, false, false, false, false, false, false, false, false,
                   false, false, false, true, true, true]
    palette:
      - ["#60265e", "#893687", "#c05fbe", "#dba3da", "#edd1ec", "#f6ddd3", "#edbaa7", "#e08765", "#CD5629", "#8f3c1d"]
      - ["#60265e", "#893687", "#c05fbe", "#dba3da", "#edd1ec", "#f6ddd3", "#edbaa7", "#e08765", "#CD5629", "#8f3c1d"]
      - ["#60265e", "#893687", "#c05fbe", "#dba3da", "#edd1ec", "#f6ddd3", "#edbaa7", "#e08765", "#CD5629", "#8f3c1d"]
      - ["#60265e", "#893687", "#c05fbe", "#dba3da", "#edd1ec", "#f6ddd3", "#edbaa7", "#e08765", "#CD5629", "#8f3c1d"]
      - ["#60265e", "#893687", "#c05fbe", "#dba3da", "#edd1ec", "#f6ddd3", "#edbaa7", "#e08765", "#CD5629", "#8f3c1d"]
      - ["#60265e", "#893687", "#c05fbe", "#dba3da", "#edd1ec", "#f6ddd3", "#edbaa7", "#e08765", "#CD5629", "#8f3c1d"]
      - ["#60265e", "#893687", "#c05fbe", "#dba3da", "#edd1ec", "#f6ddd3", "#edbaa7", "#e08765", "#CD5629", "#8f3c1d"]
      - ["#60265e", "#893687", "#c05fbe", "#dba3da", "#edd1ec", "#f6ddd3", "#edbaa7", "#e08765", "#CD5629", "#8f3c1d"]
      - ["#60265e", "#893687", "#c05fbe", "#dba3da", "#edd1ec", "#f6ddd3", "#edbaa7", "#e08765", "#CD5629", "#8f3c1d"]
      - ["#003C30", "#01665E", "#35978F", "#80CDC1", "#C7EAE5", "#F6E8C3", "#DFC27D", "#BF812D", "#8C510A", "#543005"]
      - ["#003C30", "#01665E", "#35978F", "#80CDC1", "#C7EAE5", "#F6E8C3", "#DFC27D", "#BF812D", "#8C510A", "#543005"]
      - ["#003C30", "#01665E", "#35978F", "#80CDC1", "#C7EAE5", "#F6E8C3", "#DFC27D", "#BF812D", "#8C510A", "#543005"]
      - ["#003C30", "#01665E", "#35978F", "#80CDC1", "#C7EAE5", "#F6E8C3", "#DFC27D", "#BF812D", "#8C510A", "#543005"]
      - ["#003C30", "#01665E", "#35978F", "#80CDC1", "#C7EAE5", "#F6E8C3", "#DFC27D", "#BF812D", "#8C510A", "#543005"]
      - ["#003C30", "#01665E", "#35978F", "#80CDC1", "#C7EAE5", "#F6E8C3", "#DFC27D", "#BF812D", "#8C510A", "#543005"]

process:
  P1:
    func:
      VC10: [rollmean_center, "Q", {k: 10}]
    time_step: none
    keep: all

  P2:
    func:
      VCN10: [nanmin, "VC10"]
    sampling_period:
      type: adaptive
      func: [nanmax, "Q"]
    max_na_pct: 3
    max_na_years: 10
    keep: all

  P3:
    func:
      upLim: [nanmax, "VCN10"]
    time_step: none
    keep: all

  P4:
    func:
      startLF: [apply_threshold, "VC10", {lim: upLim, where: "<=", what: first, select: longest}, true]
      centerLF: [apply_threshold, "VC10", {lim: upLim, where: "<=", what: nanargmin, select: longest}, true]
      endLF: [apply_threshold, "VC10", {lim: upLim, where: "<=", what: last, select: longest}, true]
      dtLF: [apply_threshold, "VC10", {lim: upLim, where: "<=", what: length, select: longest}]
      vLF: [deficit_volume, "VC10", {threshold: upLim}]
    sampling_period:
      type: adaptive
      func: [nanmax, "Q"]
    max_na_pct: 3

  P5:
    func:
      delta-startLF: [delta, "startLF", "date", {ref_start: "ref_start", ref_end: "ref_end", horizon_start: "horizon_start", horizon_end: "horizon_end", relative: false}]
      delta-centerLF: [delta, "centerLF", "date", {ref_start: "ref_start", ref_end: "ref_end", horizon_start: "horizon_start", horizon_end: "horizon_end", relative: false}]
      delta-endLF: [delta, "endLF", "date", {ref_start: "ref_start", ref_end: "ref_end", horizon_start: "horizon_start", horizon_end: "horizon_end", relative: false}]
      delta-dtLF: [delta, "dtLF", "date", {ref_start: "ref_start", ref_end: "ref_end", horizon_start: "horizon_start", horizon_end: "horizon_end", relative: false}]
      delta-vLF: [delta, "vLF", "date", {ref_start: "ref_start", ref_end: "ref_end", horizon_start: "horizon_start", horizon_end: "horizon_end", relative: true}]
    time_step: none
