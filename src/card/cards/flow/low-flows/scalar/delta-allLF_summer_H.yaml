id: delta-allLF_summer_H
version: "2.1"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-07-21"

meta:
  en:
    variable:
    - delta-startLF_summer
    - delta-centerLF_summer
    - delta-endLF_summer
    - delta-dtLF_summer
    - delta-vLF_summer
    unit:
    - day
    - day
    - day
    - day
    - '%'
    name:
    - Average change of the start of summer low flows between the {suffix.name} horizon and historical period
    - Average change of the center of summer low flows between the {suffix.name} horizon and historical period
    - Average change of the end of summer low flows between the {suffix.name} horizon and historical period
    - Average change of duration of summer low flows between the {suffix.name} horizon and historical period
    - Average change of summer low flow deficit volume between the {suffix.name} horizon and historical period
    description:
    - In summer, date of the first 10-day mean flow value below the threshold set at the maximum of VCN10 (May to November)
    - In summer, date of the minimal 10-day mean flow value below the threshold set at the maximum of VCN10 (May to November)
    - In summer, date of the last 10-day mean flow value below the threshold set at the maximum of VCN10 (May to November)
    - In summer, duration of the longest continuous sequence with 10-day mean flows below the threshold set at the maximum of VCN10 (May to November)
    - In summer, sum of differences between the 10-day mean and the maximum of VCN10, over the longest sequence below this threshold (May to November)
    method:
    - |
      1. no temporal aggregation - 10-day centered moving average
      2. annual aggregation [05-01, 11-30] - minimum (series of VCN10)
      3. no temporal aggregation - the maximum of the previous series is taken as the threshold
      4. annual aggregation [05-01, 11-30] - date of the first day of the longest period below the previous threshold
      5. no temporal aggregation - calculation of the average change between the historical period and the {suffix.name} horizon
    - |
      1. no temporal aggregation - 10-day centered moving average (series of VC10)
      2. annual aggregation [05-01, 11-30] - minimum (series of VCN10)
      3. no temporal aggregation - the maximum of the previous series is taken as the threshold
      4. annual aggregation [05-01, 11-30] - date of the minimum of the VC10 of the longest period below the previous threshold
      5. no temporal aggregation - calculation of the average change between the historical period and the {suffix.name} horizon
    - |
      1. no temporal aggregation - 10-day centered moving average
      2. annual aggregation [05-01, 11-30] - minimum
      3. no temporal aggregation - the maximum of the previous series is taken as the threshold
      4. annual aggregation [05-01, 11-30] - date of the last day of the longest period below the previous threshold
      5. no temporal aggregation - calculation of the average change between the historical period and the {suffix.name} horizon
    - |
      1. no temporal aggregation - 10-day centered moving average
      2. annual aggregation [05-01, 11-30] - minimum (extraction from the series of VCN10)
      3. no temporal aggregation - the maximum of the previous series is taken as the threshold
      4. annual aggregation [05-01, 11-30] - number of days in the longest period below the previous threshold
      5. no temporal aggregation - calculation of the average change between the historical period and the {suffix.name} horizon
    - |
      1. no temporal aggregation - 10-day centered moving average
      2. annual aggregation [05-01, 11-30] - minimum (extraction from the series of VCN10)
      3. no temporal aggregation - the maximum of the previous series is taken as the threshold
      4. annual aggregation [05-01, 11-30] - sum of volumes discharged each day in the longest period below the previous threshold
      5. no temporal aggregation - calculation of the average change between the historical period and the {suffix.name} horizon
    sampling_period:
    - 05-01
    - 11-30
    classification:
      domain: flow
      phenomenon: low flows
      aspect:
      - timing
      - timing
      - timing
      - duration
      - magnitude
      season: summer
      output: scalar
    suffix_default:
      name: target

  fr:
    variable:
    - delta-debutBE_été
    - delta-centreBE_été
    - delta-finBE_été
    - delta-dtBE_été
    - delta-vBE_été
    unit:
    - jour
    - jour
    - jour
    - jour
    - '%'
    name:
    - Changement moyen du début des basses eaux estivales entre l'horizon {suffix.name} et la période historique
    - Changement moyen du centre des basses eaux estivales entre l'horizon {suffix.name} et la période historique
    - Changement moyen de la fin des basses eaux estivales entre l'horizon {suffix.name} et la période historique
    - Changement moyen de la durée des basses eaux estivales entre l'horizon {suffix.name} et la période historique
    - Changement moyen du volume de déficit des basses eaux estivales entre l'horizon {suffix.name} et la période historique
    description:
    - En été, date de la première valeur de débits moyens sur 10 jours sous le seuil fixé au maximum des VCN10 (mois de mai à novembre)
    - En été, date de la valeur minimale des débits moyens sur 10 jours sous le seuil fixé au maximum des VCN10 (mois de mai à novembre)
    - En été, date de la dernière valeur de débits moyens sur 10 jours sous le seuil fixé au maximum des VCN10 (mois de mai à novembre)
    - En été, durée de la plus longue séquence continue avec des débits moyens sur 10 jours sous le seuil fixé au maximum des VCN10 (mois de mai à novembre)
    - En été, somme des écarts entre la moyenne sur 10 jours et le maximum des VCN10, sur la séquence la plus longue sous ce seuil (mois de mai à novembre)
    method:
    - |
      1. aucune agrégation temporelle - moyenne mobile centrée sur 10 jours
      2. agrégation annuelle [01-05, 30-11] - minimum (série des VCN10)
      3. aucune agrégation temporelle - le maximum de la précédente série est pris comme seuil
      4. agrégation annuelle [01-05, 30-11] - date du premier jour de la plus longue période sous le précédent seuil
      5. aucune agrégation temporelle - calcul du changement moyen entre la période historique et l'horizon {suffix.name}
    - |
      1. aucune agrégation temporelle - moyenne mobile centrée sur 10 jours (série des VC10)
      2. agrégation annuelle [01-05, 30-11] - minimum (série des VCN10)
      3. aucune agrégation temporelle - le maximum de la précédente série est pris comme seuil
      4. agrégation annuelle [01-05, 30-11] - date du minimum des VC10 de la plus longue période sous le précédent seuil
      5. aucune agrégation temporelle - calcul du changement moyen entre la période historique et l'horizon {suffix.name}
    - |
      1. aucune agrégation temporelle - moyenne mobile centrée sur 10 jours
      2. agrégation annuelle [01-05, 30-11] - minimum
      3. aucune agrégation temporelle - le maximum de la précédente série est pris comme seuil
      4. agrégation annuelle [01-05, 30-11] - date du dernier jour de la plus longue période sous le précédent seuil
      5. aucune agrégation temporelle - calcul du changement moyen entre la période historique et l'horizon {suffix.name}
    - |
      1. aucune agrégation temporelle - moyenne mobile centrée sur 10 jours
      2. agrégation annuelle [01-05, 30-11] - minimum (extraction de la série des VCN10)
      3. aucune agrégation temporelle - le maximum de la précédente série est pris comme seuil
      4. agrégation annuelle [01-05, 30-11] - nombre de jours de la plus longue période sous le précédent seuil
      5. aucune agrégation temporelle - calcul du changement moyen entre la période historique et l'horizon {suffix.name}
    - |
      1. aucune agrégation temporelle - moyenne mobile centrée sur 10 jours
      2. agrégation annuelle [01-05, 30-11] - minimum (extraction de la série des VCN10)
      3. aucune agrégation temporelle - le maximum de la précédente série est pris comme seuil
      4. agrégation annuelle [01-05, 30-11] - somme des volumes écoulés chaque jour de la plus longue période sous le précédent seuil
      5. aucune agrégation temporelle - calcul du changement moyen entre la période historique et l'horizon {suffix.name}
    sampling_period:
    - 01-05
    - 30-11
    classification:
      domain: débit
      phenomenon: basses eaux
      aspect:
      - saisonnalité
      - saisonnalité
      - saisonnalité
      - durée
      - intensité
      season: estivale
      output: scalaire
    suffix_default:
      name: cible

  global:
    input_vars: "Q, ref_start, ref_end, horizon_start, horizon_end"
    preferred_sampling_period: "01-01"
    is_date: [true, true, true, true, true, true, true, true, true, false, false, false, false, false, false]
    relative: [false, false, false, false, false, false, false, false, false, false, false, false, true, true, true]
    palette:
      - ["#60265e", "#893687", "#c05fbe", "#dba3da", "#edd1ec", "#f6ddd3", "#edbaa7", "#e08765", "#CD5629", "#8f3c1d"]
      - ["#60265e", "#893687", "#c05fbe", "#dba3da", "#edd1ec", "#f6ddd3", "#edbaa7", "#e08765", "#CD5629", "#8f3c1d"]
      - ["#60265e", "#893687", "#c05fbe", "#dba3da", "#edd1ec", "#f6ddd3", "#edbaa7", "#e08765", "#CD5629", "#8f3c1d"]
      - ["#60265e", "#893687", "#c05fbe", "#dba3da", "#edd1ec", "#f6ddd3", "#edbaa7", "#e08765", "#CD5629", "#8f3c1d"]
      - ["#60265e", "#893687", "#c05fbe", "#dba3da", "#edd1ec", "#f6ddd3", "#edbaa7", "#e08765", "#CD5629", "#8f3c1d"]
      - ["#60265e", "#893687", "#c05fbe", "#dba3da", "#edd1ec", "#f6ddd3", "#edbaa7", "#e08765", "#CD5629", "#8f3c1d"]
      - ["#60265e", "#893687", "#c05fbe", "#dba3da", "#edd1ec", "#f6ddd3", "#edbaa7", "#e08765", "#CD5629", "#8f3c1d"]
      - ["#60265e", "#893687", "#c05fbe", "#dba3da", "#edd1ec", "#f6ddd3", "#edbaa7", "#e08765", "#CD5629", "#8f3c1d"]
      - ["#60265e", "#893687", "#c05fbe", "#dba3da", "#edd1ec", "#f6ddd3", "#edbaa7", "#e08765", "#CD5629", "#8f3c1d"]
      - ["#003C30", "#01665E", "#35978F", "#80CDC1", "#C7EAE5", "#F6E8C3", "#DFC27D", "#BF812D", "#8C510A", "#543005"]
      - ["#003C30", "#01665E", "#35978F", "#80CDC1", "#C7EAE5", "#F6E8C3", "#DFC27D", "#BF812D", "#8C510A", "#543005"]
      - ["#003C30", "#01665E", "#35978F", "#80CDC1", "#C7EAE5", "#F6E8C3", "#DFC27D", "#BF812D", "#8C510A", "#543005"]
      - ["#003C30", "#01665E", "#35978F", "#80CDC1", "#C7EAE5", "#F6E8C3", "#DFC27D", "#BF812D", "#8C510A", "#543005"]
      - ["#003C30", "#01665E", "#35978F", "#80CDC1", "#C7EAE5", "#F6E8C3", "#DFC27D", "#BF812D", "#8C510A", "#543005"]
      - ["#003C30", "#01665E", "#35978F", "#80CDC1", "#C7EAE5", "#F6E8C3", "#DFC27D", "#BF812D", "#8C510A", "#543005"]

process:
  P1:
    func:
      VC10_summer: [rollmean_center, "Q", {k: 10}]
    time_step: none
    keep: all

  P2:
    func:
      VCN10_summer: [nanmin, "VC10_summer"]
    sampling_period: ["05-01", "11-30"]
    max_na_pct: 3
    max_na_years: 10
    keep: all

  P3:
    func:
      upLim: [nanmax, "VCN10_summer"]
    time_step: none
    keep: all

  P4:
    func:
      startLF_summer:  [apply_threshold, "VC10_summer", {lim: upLim, where: "<=", what: first, select: longest}, true]
      centerLF_summer: [apply_threshold, "VC10_summer", {lim: upLim, where: "<=", what: nanargmin, select: longest}, true]
      endLF_summer:    [apply_threshold, "VC10_summer", {lim: upLim, where: "<=", what: last, select: longest}, true]
      dtLF_summer:     [apply_threshold, "VC10_summer", {lim: upLim, where: "<=", what: length, select: longest}]
      vLF_summer:      [deficit_volume, "VC10_summer", {threshold: upLim}]
    sampling_period: ["05-01", "11-30"]
    max_na_pct: 3

  P5:
    func:
      delta-startLF_summer: [delta, "startLF_summer", "date", {ref_start: "ref_start", ref_end: "ref_end", horizon_start: "horizon_start", horizon_end: "horizon_end", relative: false}]
      delta-centerLF_summer: [delta, "centerLF_summer", "date", {ref_start: "ref_start", ref_end: "ref_end", horizon_start: "horizon_start", horizon_end: "horizon_end", relative: false}]
      delta-endLF_summer: [delta, "endLF_summer", "date", {ref_start: "ref_start", ref_end: "ref_end", horizon_start: "horizon_start", horizon_end: "horizon_end", relative: false}]
      delta-dtLF_summer: [delta, "dtLF_summer", "date", {ref_start: "ref_start", ref_end: "ref_end", horizon_start: "horizon_start", horizon_end: "horizon_end", relative: false}]
      delta-vLF_summer: [delta, "vLF_summer", "date", {ref_start: "ref_start", ref_end: "ref_end", horizon_start: "horizon_start", horizon_end: "horizon_end", relative: true}]
    time_step: none
