id: delta-QMNA_H
version: "1.2"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-07-21"

meta:
  en:
    variable: delta-QMNA
    unit: "%"
    name: Average change of annual minimum of monthly flows between the {suffix.name} horizon and historical period
    description: ""
    method: |
      1. monthly aggregation - mean
      2. annual aggregation [Month of maximum monthly flows] - minimum
      3. no temporal aggregation - calculation of the average change between the historical period and the {suffix.name} horizon
    suffix_default:
      name: target
    sampling_period: Month of maximum monthly flows
    classification:
      domain: flow
      phenomenon: low flows
      aspect: magnitude
      season: by month
      output: scalar

  fr:
    variable: delta-QMNA
    unit: "%"
    name: Changement moyen du minimum annuel des débits mensuels entre l'horizon {suffix.name} et la période historique
    description: ""
    method: |
      1. agrégation mensuelle - moyenne
      2. agrégation annuelle [Mois du maximum des débits mensuels] - minimum
      3. aucune agrégation temporelle - calcul du changement moyen entre la période historique et l'horizon {suffix.name}
    suffix_default:
      name: cible
    sampling_period: Mois du maximum des débits mensuels
    classification:
      domain: débit
      phenomenon: basses eaux
      aspect: intensité
      season: par mois
      output: scalaire

  global:
    input_vars: "Q, ref_start, ref_end, horizon_start, horizon_end"
    preferred_sampling_period: "01-01"
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    func:
      QMA: [nanmean, "Q"]
    time_step: year-month
    max_na_pct: 3
    max_na_years: 10
    keep: all

  P2:
    func:
      QMNA: [nanmin, "QMA"]
    sampling_period:
      type: adaptive
      func: [nanmax, "QMA"]
    max_na_pct: 3

  P3:
    func:
      delta-QMNA: [delta, "QMNA", "date", {ref_start: "ref_start", ref_end: "ref_end", horizon_start: "horizon_start", horizon_end: "horizon_end", relative: true}]
    time_step: none
