id: rp-VCN10
version: "1.1"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-07-20"

meta:
  en:
    variable: rp-VCN10
    unit: year
    name: Return period of the {suffix.name} with respect to the annual minima of 10-day mean flows
    description: Inverse of the return-level fiches (VCN10-5) - the log-normal law is fitted on the VCN10 series and evaluated at the constant threshold discharge Q_lim given by regulatory texts (e.g. DOE, DCR); a threshold far below the fitted law gives an extrapolated return period, reported as is
    method: |
      1. no temporal aggregation - 10-day centered moving average
      2. annual aggregation [Month of maximum monthly flows] - minimum
      3. no temporal aggregation - return period of the {suffix.short} threshold with the log-normal distribution
    sampling_period: Month of maximum monthly flows
    classification:
      domain: flow
      phenomenon: low flows
      aspect: frequency
      season: annual
      output: scalar
    suffix_default:
      name: station's regulatory threshold discharge
      short: Q_lim

  fr:
    variable: rp-VCN10
    unit: an
    name: Période de retour du {suffix.name} au regard des minimums annuels des débits moyens sur 10 jours
    description: Inverse des fiches de niveau de retour (VCN10-5) - la loi log-normale est ajustée sur la série des VCN10 puis évaluée au débit seuil constant Q_lim donné par les textes réglementaires (par exemple DOE, DCR) ; un seuil loin du corps de la loi donne une période de retour extrapolée, restituée telle quelle
    method: |
      1. aucune agrégation temporelle - moyenne mobile centrée sur 10 jours
      2. agrégation annuelle [Mois du maximum des débits mensuels] - minimum
      3. aucune agrégation temporelle - période de retour du seuil {suffix.short} avec la loi log-normale
    sampling_period: Mois du maximum des débits mensuels
    classification:
      domain: débit
      phenomenon: basses eaux
      aspect: fréquence
      season: annuelle
      output: scalaire
    suffix_default:
      name: débit seuil réglementaire de la station
      short: Q_lim

  global:
    input_vars: "Q, Q_lim"
    preferred_sampling_period: "01-01"

process:
  P1:
    func:
      VC10: [rollmean_center, "Q", {k: 10}]
    time_step: none
    keep: all
    max_na_years: 10

  P2:
    func:
      VCN10: [nanmin, "VC10"]
      Qlim: [nanmean, "Q_lim"]
    sampling_period:
      type: adaptive
      func: [nanmax, "Q"]
    max_na_pct: 3

  P3:
    func:
      rp-VCN10: [return_period, "VCN10", {threshold: Qlim, water_type: "low"}]
    time_step: none
