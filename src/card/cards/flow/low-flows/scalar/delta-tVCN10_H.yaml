id: delta-tVCN10_H
version: "1.2"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-07-21"

meta:
  en:
    variable: delta-tVCN10
    unit: day
    name: Average change of the date of the annual minimum of 10-day mean flows between the {suffix.name} horizon and historical period
    description: ""
    method: |
      1. no temporal aggregation - 10-day centered moving average
      2. annual aggregation [Month of maximum monthly flows] - date of the minimum
      3. no temporal aggregation - calculation of the average change between the historical period and the {suffix.name} horizon
    suffix_default:
      name: target
    sampling_period: Month of maximum monthly flows
    classification:
      domain: flow
      phenomenon: low flows
      aspect: timing
      season: annual
      output: scalar

  fr:
    variable: delta-tVCN10
    unit: jour
    name: Changement moyen de la date du minimum annuel des débits moyens sur 10 jours entre l'horizon {suffix.name} et la période historique
    description: ""
    method: |
      1. aucune agrégation temporelle - moyenne mobile centrée sur 10 jours
      2. agrégation annuelle [Mois du maximum des débits mensuels] - date du minimum
      3. aucune agrégation temporelle - calcul du changement moyen entre la période historique et l'horizon {suffix.name}
    suffix_default:
      name: cible
    sampling_period: Mois du maximum des débits mensuels
    classification:
      domain: débit
      phenomenon: basses eaux
      aspect: saisonnalité
      season: annuelle
      output: scalaire

  global:
    input_vars: "Q, ref_start, ref_end, horizon_start, horizon_end"
    preferred_sampling_period: "01-01"
    is_date: true
    relative: false
    palette: ["#60265e", "#893687", "#c05fbe", "#dba3da", "#edd1ec",
              "#f6ddd3", "#edbaa7", "#e08765", "#CD5629", "#8f3c1d"]

process:
  P1:
    func:
      VC10: [rollmean_center, "Q", {k: 10}]
    time_step: none
    keep: all

  P2:
    func:
      tVCN10: [nanargmin, "VC10", true]
    sampling_period:
      type: adaptive
      func: [nanmax, "Q"]
    max_na_pct: 3
    max_na_years: 10

  P3:
    func:
      delta-tVCN10: [delta, "tVCN10", "date", {ref_start: "ref_start", ref_end: "ref_end", horizon_start: "horizon_start", horizon_end: "horizon_end", relative: false}]
    time_step: none
