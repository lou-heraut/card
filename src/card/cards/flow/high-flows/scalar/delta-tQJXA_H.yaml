id: delta-tQJXA_H
version: "1.1"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-07-21"

meta:
  en:
    variable: delta-tQJXA
    unit: day
    name: "Average change of the date of the annual maximum daily discharge between the {suffix.name} horizon and historical period"
    description: ""
    method: |
      1. annual aggregation [Month of minimum monthly flows] - date of maximum
      2. no temporal aggregation - calculation of the average change between
         the historical period and the {suffix.name} horizon
    suffix_default:
      name: target
    sampling_period: Month of minimum monthly flows
    classification:
      domain: flow
      phenomenon: high flows
      aspect: timing
      season: annual
      output: scalar

  fr:
    variable: delta-tQJXA
    unit: jour
    name: "Changement moyen de la date du débit journalier maximal annuel entre l'horizon {suffix.name} et la période historique"
    description: ""
    method: |
      1. agrégation annuelle [Mois du minimum des débits mensuels] - date du maximum
      2. aucune agrégation temporelle - calcul du changement moyen entre la
         période historique et l'horizon {suffix.name}
    suffix_default:
      name: cible
    sampling_period: Mois du minimum des débits mensuels
    classification:
      domain: débit
      phenomenon: hautes eaux
      aspect: saisonnalité
      season: annuelle
      output: scalaire

  global:
    input_vars: "Q, ref_start, ref_end, horizon_start, horizon_end"
    preferred_sampling_period: "09-01"
    is_date: true
    relative: false
    palette: ["#60265e", "#893687", "#c05fbe", "#dba3da", "#edd1ec",
              "#f6ddd3", "#edbaa7", "#e08765", "#CD5629", "#8f3c1d"]

process:
  P1:
    func:
      tQJXA: [nanargmax, "Q", true]
    sampling_period:
      type: adaptive
      func: [nanmin, "Q"]
    max_na_pct: 3
    max_na_years: 10

  P2:
    func:
      delta-tQJXA: [delta, "tQJXA", "date", {ref_start: "ref_start", ref_end: "ref_end", horizon_start: "horizon_start", horizon_end: "horizon_end", relative: false}]
    time_step: none
