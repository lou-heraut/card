id: delta-VCX10_H
version: "1.1"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-07-21"

meta:
  en:
    variable: delta-VCX10
    unit: "%"
    name: "Average change of annual maximum of the 10-day moving average of daily flows between the {suffix.name} horizon and historical period"
    description: ""
    method: |
      1. no temporal aggregation - 3-day centered moving average
      2. annual aggregation [Month of minimum monthly flows] - maximum
      3. no temporal aggregation - calculation of the average change between
         the historical period and the {suffix.name} horizon
    suffix_default:
      name: target
    sampling_period: Month of minimum monthly flows
    classification:
      domain: flow
      phenomenon: high flows
      aspect: magnitude
      season: annual
      output: scalar

  fr:
    variable: delta-VCX10
    unit: "%"
    name: "Changement moyen du maximum annuel de la moyenne mobile sur 10 jours des débits journaliers entre l'horizon {suffix.name} et la période historique"
    description: ""
    method: |
      1. aucune agrégation temporelle - moyenne mobile centrée sur 10 jours
      2. agrégation annuelle [Mois du minimum des débits mensuels] - maximum
      3. aucune agrégation temporelle - calcul du changement moyen entre la
         période historique et l'horizon {suffix.name}
    suffix_default:
      name: cible
    sampling_period: Mois du minimum des débits mensuels
    classification:
      domain: débit
      phenomenon: hautes eaux
      aspect: intensité
      season: annuelle
      output: scalaire

  global:
    input_vars: "Q, ref_start, ref_end, horizon_start, horizon_end"
    preferred_sampling_period: "09-01"
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    func:
      VC10: [rollmean_center, "Q", {k: 10}]
    time_step: none
    keep: all
    max_na_years: 10

  P2:
    func:
      VCX10: [nanmax, "VC10"]
    sampling_period:
      type: adaptive
      func: [nanmin, "Q"]
    max_na_pct: 3

  P3:
    func:
      delta-VCX10: [delta, "VCX10", "date", {ref_start: "ref_start", ref_end: "ref_end", horizon_start: "horizon_start", horizon_end: "horizon_end", relative: true}]
    time_step: none
