id: n-QJXA-10_H
version: "1.1"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-07-21"

meta:
  en:
    variable: n-QJXA-10
    unit: "without unit"
    name: "Number of years in the {suffix.name} horizon where QJXA is superior to QJXA-10 from the historical period"
    description: ""
    method: |
      1. annual aggregation [Month of minimum monthly flows] - maximum
         (extraction from the QJXA series)
      2. no temporal aggregation - calculation of the flow with a 10-year
         return period using the Gumbel distribution from the historical
         period (QJXA-10)
      3. no temporal aggregation - counting the number of QJXA in the
         {suffix.name} horizon above QJXA-10
    sampling_period: Month of minimum monthly flows
    classification:
      domain: flow
      phenomenon: high flows
      aspect: frequency
      season: annual
      output: scalar
    suffix_default:
      name: target

  fr:
    variable: n-QJXA-10
    unit: "sans unité"
    name: "Nombre d'années de l'horizon {suffix.name} où le QJXA est supérieur au QJXA-10 de la période historique"
    description: ""
    method: |
      1. agrégation annuelle [Mois du minimum des débits mensuels] - maximum
         (extraction de la série des QJXA)
      2. aucune agrégation temporelle - calcul du débit de période de retour
         10 ans avec la loi de Gumbel sur la période historique (QJXA-10)
      3. aucune agrégation temporelle - décompte du nombre de QJXA de
         l'horizon {suffix.name} au dessus du QJXA-10
    sampling_period: Mois du minimum des débits mensuels
    classification:
      domain: débit
      phenomenon: hautes eaux
      aspect: fréquence
      season: annuelle
      output: scalaire
    suffix_default:
      name: cible

  global:
    input_vars: "Q, ref_start, ref_end, horizon_start, horizon_end"
    preferred_sampling_period: "09-01"
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    func:
      QJXA: [nanmax, "Q"]
    sampling_period:
      type: adaptive
      func: [nanmin, "Q"]
    max_na_pct: 3
    max_na_years: 10

  P2:
    func:
      QJXA-10: [return_level, "QJXA",
                {return_period: 10, water_type: "high", dates: "date",
                 period_start: "ref_start", period_end: "ref_end"}]
    time_step: none
    keep: all

  P3:
    func:
      n-QJXA-10: [apply_threshold, "QJXA",
                  {lim: QJXA-10, where: ">=", what: length,
                   select: all, dates: "date",
                   period_start: "horizon_start", period_end: "horizon_end"}]
    time_step: none
