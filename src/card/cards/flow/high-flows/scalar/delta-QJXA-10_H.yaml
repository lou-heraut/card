id: delta-QJXA-10_H
version: "1.1"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-07-21"

meta:
  en:
    variable: delta-QJXA-10
    unit: "%"
    name: "Change of annual maximum daily flow with a 10-year return period between the {suffix.name} horizon and historical period"
    description: ""
    method: |
      1. annual aggregation [Month of minimum monthly flows] - maximum
         (extraction from the QJXA series)
      2. no temporal aggregation - calculation of the 10-year return period
         flow with the Gumbel distribution on the historical period and in
         the {suffix.name} horizon then calculation of the average change
    suffix_default:
      name: target
    sampling_period: Month of minimum monthly flows
    classification:
      domain: flow
      phenomenon: high flows
      aspect: magnitude
      season: annual
      output: scalar

  fr:
    variable: delta-QJXA-10
    unit: "%"
    name: "Changement du débit journalier maximal annuel de période de retour 10 ans entre l'horizon {suffix.name} et la période historique"
    description: ""
    method: |
      1. agrégation annuelle [Mois du minimum des débits mensuels] - maximum
         (extraction de la série des QJXA)
      2. aucune agrégation temporelle - calcul du débit de période de retour
         10 ans avec la loi de Gumbel sur la période historique et en horizon
         {suffix.name} puis calcul du changement moyen
    suffix_default:
      name: cible
    sampling_period: Mois du minimum des débits mensuels
    classification:
      domain: débit
      phenomenon: hautes eaux
      aspect: intensité
      season: annuelle
      output: scalaire

  global:
    input_vars: "Q, ref_start, ref_end, horizon_start, horizon_end"
    preferred_sampling_period: "09-01"
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    func:
      QJXA: [nanmax, "Q"]
    sampling_period:
      type: adaptive
      func: [nanmin, "Q"]
    max_na_pct: 3
    max_na_years: 10

  P2:
    func:
      delta-QJXA-10: [delta, "QJXA", "date", {ref_start: "ref_start", ref_end: "ref_end", horizon_start: "horizon_start", horizon_end: "horizon_end", relative: true, return_period: 10, water_type: "high"}]
    time_step: none
