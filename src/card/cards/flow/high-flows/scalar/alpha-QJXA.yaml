id: alpha-QJXA
version: "1.0"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-04-26"

meta:
  en:
    variable: [alpha-QJXA, hyp-alpha-QJXA]
    unit: ["m^{3}.s^{-1}.year^{-1}", bool]
    name:
      - "Sen's slope of the series of annual maximum daily flows (QJXA)"
      - "Mann-Kendall test result on the series of annual maximum daily
         flows (QJXA)"
    description: ""
    method: |
      1. annual aggregation [Month of minimum monthly flows] - maximum
         (extraction from the series of QJXA)
      2. no temporal aggregation - Sen's slope of the series where the
         Mann-Kendall test is significant at a 10 % risk level
    sampling_period: Month of minimum monthly flows
    classification:
      domain: flow
      phenomenon: high flows
      aspect: magnitude
      season: annual
      output: scalar

  fr:
    variable: [alpha-QJXA, hyp-alpha-QJXA]
    unit: ["m^{3}.s^{-1}.an^{-1}", bool]
    name:
      - "Pente de Sen de la série des débits journaliers maximaux annuels
         (QJXA)"
      - "Résultat du test de Mann-Kendall sur la série des débits
         journaliers maximaux annuels (QJXA)"
    description: ""
    method: |
      1. agrégation annuelle [Mois du minimum des débits mensuels] - maximum
         (extraction de la série des QJXA)
      2. aucune agrégation temporelle - pente de Sen de la série dont le
         test de Mann-Kendall est significatif à un risque de 10 %
    sampling_period: Mois du minimum des débits mensuels
    classification:
      domain: débit
      phenomenon: hautes eaux
      aspect: intensité
      season: annuelle
      output: scalaire

  global:
    input_vars: Q
    source: |
      KENDALL, M. G. (1975). « Rank Correlation Methods ». Griffin, London, UK.
      MANN, H. (1945). « Nonparametric tests against trend ». Econometrica, 13(3):245-259.
      SEN, P. K. (1968). « Estimates of the regression coefficient based on Kendall's tau ».
      In : Journal of the American Statistical Association 63, p. 1379-1389. DOI : doi:10.2307/2285891.
    preferred_sampling_period: "09-01"
    relative: [true, false]
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    func:
      QJXA: [nanmax, "Q"]
    sampling_period:
      type: adaptive
      func: [nanmin, "Q"]
    max_na_pct: 3
    max_na_years: 10

  P2:
    func:
      alpha-QJXA:     [mannkendall_slope, "QJXA", {level: 0.1}]
      hyp-alpha-QJXA: [mannkendall_test,     "QJXA", {level: 0.1}]
    time_step: none
