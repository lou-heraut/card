id: QSA_JJASO
version: "1.0"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-04-30"

meta:
  en:
    variable: QSA_JJASO
    unit: "m^{3}.s^{-1}"
    name: Annual mean daily discharge from June to October
    description: ""
    method: "1. annual aggregation [06-01, 10-31] - mean"
    sampling_period: ["06-01", "10-31"]
    classification:
      domain: flow
      phenomenon: mean flows
      aspect: magnitude
      season: summer
      output: series

  fr:
    variable: QSA_JJASO
    unit: "m^{3}.s^{-1}"
    name: Moyenne annuelle du débit journalier de juin à octobre
    description: ""
    method: "1. agrégation annuelle [01-06, 31-10] - moyenne"
    sampling_period: ["01-06", "31-10"]
    classification:
      domain: débit
      phenomenon: moyennes eaux
      aspect: intensité
      season: estivale
      output: série

  global:
    input_vars: Q
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    func:
      QSA_JJASO: [nanmean, "Q"]
    sampling_period: ["06-01", "10-31"]
    max_na_pct: 3
    max_na_years: 10
