id: centerLF_winter
version: "1.0"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-07-15"

meta:
  en:
    variable: centerLF_winter
    unit: yearday
    name: Center of winter low flows
    description: "In winter, date of the minimal 10-day mean flow value below the threshold set at the maximum of VCN10 (November to April)"
    method: |
      1. no temporal aggregation - 10-day centered moving average (series of VC10)
      2. annual aggregation [11-01, 04-30] - minimum (series of VCN10)
      3. no temporal aggregation - the maximum of the previous series is taken as the threshold
      4. annual aggregation [11-01, 04-30] - date of the minimum of the VC10 of the longest period below the previous threshold
    sampling_period: ["11-01", "04-30"]
    classification:
      domain: flow
      phenomenon: low flows
      aspect: timing
      season: winter
      output: series

  fr:
    variable: centreBE_hiver
    unit: "jour de l'année"
    name: Centre des basses eaux hivernales
    description: "En hiver, date de la valeur minimale des débits moyens sur 10 jours sous le seuil fixé au maximum des VCN10 (mois de novembre à avril)"
    method: |
      1. aucune agrégation temporelle - moyenne mobile centrée sur 10 jours (série des VC10)
      2. agrégation annuelle [01-11, 30-04] - minimum (série des VCN10)
      3. aucune agrégation temporelle - le maximum de la précédente série est pris comme seuil
      4. agrégation annuelle [01-11, 30-04] - date du minimum des VC10 de la plus longue période sous le précédent seuil
    sampling_period: ["01-11", "30-04"]
    classification:
      domain: débit
      phenomenon: basses eaux
      aspect: saisonnalité
      season: hivernale
      output: série

  global:
    input_vars: Q
    preferred_sampling_period: "01-01"
    is_date: true
    relative: false
    palette: ["#60265e", "#893687", "#c05fbe", "#dba3da", "#edd1ec",
              "#f6ddd3", "#edbaa7", "#e08765", "#CD5629", "#8f3c1d"]

process:
  P1:
    func:
      VC10_winter: [rollmean_center, "Q", {k: 10}]
    time_step: none
    keep: all

  P2:
    func:
      VCN10_winter: [nanmin, "VC10_winter"]
    sampling_period: ["11-01", "04-30"]
    max_na_pct: 3
    max_na_years: 10
    keep: all

  P3:
    func:
      upLim: [nanmax, "VCN10_winter"]
    time_step: none
    keep: all

  P4:
    func:
      centerLF_winter: [apply_threshold, "VC10_winter", {lim: upLim, where: "<=", what: nanargmin, select: longest}, true]
    sampling_period: ["11-01", "04-30"]
    max_na_pct: 3
