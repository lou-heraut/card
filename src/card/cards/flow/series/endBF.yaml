id: endBF
version: "1.0"
authors: []
date: "2026-04-26"

meta:
  en:
    variable: endBF
    unit: yearday
    name: End of Base Flow
    description: >-
      Date when 90 % of the annual cumulative base flow is reached
    method: |
      1. annual aggregation [09-01, 08-31] - date when the sum of base flow
         (Wallingford) Qb corresponds to 90 % of the total sum
    sampling_period: ["09-01", "08-31"]
    classification:
      domain: flow
      phenomenon: baseflow
      aspect: timing
      season: annual
      output: series

  fr:
    variable: finQB
    unit: "jour de l'année"
    name: Fin des écoulements lents
    description: >-
      Date à laquelle 90 % du cumul annuel du débit de base sont atteints
    method: |
      1. agrégation annuelle [01-09, 31-08] - date à laquelle la somme du
         débit de base (Wallingford) Qb correspond à 90 % de la somme totale
    sampling_period: ["01-09", "31-08"]
    classification:
      domain: débit
      phenomenon: débit de base
      aspect: saisonnalité
      season: annuelle
      output: série

  global:
    input_vars: Q
    source: >-
      TALLAKSEN, L. et H. VAN LANEN, éd. (2004). Hydrological drought. Processes
      and estimation methods for streamflow and groundwater. Developments in water
      science 48. Netherlands : Elsevier. ISBN : 9780444516886.
    preferred_sampling_period: "09-01"
    is_date: true
    relative: false
    palette: ["#60265e", "#893687", "#c05fbe", "#dba3da", "#edd1ec",
              "#f6ddd3", "#edbaa7", "#e08765", "#CD5629", "#8f3c1d"]

process:
  P1:
    func:
      endBF: [snowmelt_timing, "Q", {fraction: 0.9, method: Wal}, true]
    sampling_period: "09-01"
    max_na_pct: 3
    max_na_years: 10
