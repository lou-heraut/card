id: QM_H1
version: "1.0"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-04-30"

meta:
  en:
    variable: QM_H1
    unit: "m^{3}.s^{-1}"
    name: Mean monthly discharge of near horizon
    description: ""
    method: "1. monthly aggregation over the near horizon [2021-01-01, 2050-12-31] - mean"
    classification:
      domain: flow
      phenomenon: mean flows
      aspect: magnitude
      season: by month
      output: series

  fr:
    variable: QM_H1
    unit: "m^{3}.s^{-1}"
    name: "Débit moyen mensuel de l'horizon proche"
    description: ""
    method: "1. agrégation mensuelle sur l'horizon proche [2021-01-01, 2050-12-31] - moyenne"
    classification:
      domain: débit
      phenomenon: moyennes eaux
      aspect: intensité
      season: par mois
      output: série

  global:
    input_vars: Q

process:
  P1:
    func:
      QM_H1: [nanmean, "Q"]
    period: ["2021-01-01", "2050-12-31"]
    time_step: month
