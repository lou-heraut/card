id: endLF_summer
version: "1.0"
authors: []
date: "2026-07-15"

meta:
  en:
    variable: endLF_summer
    unit: yearday
    name: End of summer low flows
    description: "In summer, date of the last 10-day mean flow value below the threshold set at the maximum of VCN10 (May to November)"
    method: |
      1. no temporal aggregation - 10-day centered moving average
      2. annual aggregation [05-01, 11-30] - minimum
      3. no temporal aggregation - the maximum of the previous series is taken as the threshold
      4. annual aggregation [05-01, 11-30] - date of the last day of the longest period below the previous threshold
    sampling_period: ["05-01", "11-30"]
    classification:
      domain: flow
      phenomenon: low flows
      aspect: timing
      season: summer
      output: series

  fr:
    variable: finBE_été
    unit: "jour de l'année"
    name: Fin des basses eaux estivales
    description: "En été, date de la dernière valeur de débits moyens sur 10 jours sous le seuil fixé au maximum des VCN10 (mois de mai à novembre)"
    method: |
      1. aucune agrégation temporelle - moyenne mobile centrée sur 10 jours
      2. agrégation annuelle [01-05, 30-11] - minimum
      3. aucune agrégation temporelle - le maximum de la précédente série est pris comme seuil
      4. agrégation annuelle [01-05, 30-11] - date du dernier jour de la plus longue période sous le précédent seuil
    sampling_period: ["01-05", "30-11"]
    classification:
      domain: débit
      phenomenon: basses eaux
      aspect: saisonnalité
      season: estivale
      output: série

  global:
    input_vars: Q
    preferred_sampling_period: "01-01"
    is_date: true
    relative: false
    palette: ["#60265e", "#893687", "#c05fbe", "#dba3da", "#edd1ec",
              "#f6ddd3", "#edbaa7", "#e08765", "#CD5629", "#8f3c1d"]

process:
  P1:
    func:
      VC10_summer: [rollmean_center, "Q", {k: 10}]
    time_step: none
    keep: all

  P2:
    func:
      VCN10_summer: [nanmin, "VC10_summer"]
    sampling_period: ["05-01", "11-30"]
    max_na_pct: 3
    max_na_years: 10
    keep: all

  P3:
    func:
      upLim: [nanmax, "VCN10_summer"]
    time_step: none
    keep: all

  P4:
    func:
      endLF_summer: [apply_threshold, "VC10_summer", {lim: upLim, where: "<=", what: last, select: longest}, true]
    sampling_period: ["05-01", "11-30"]
    max_na_pct: 3
