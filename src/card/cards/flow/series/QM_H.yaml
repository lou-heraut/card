id: QM_H
version: "2.0"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-07-22"

meta:
  en:
    variable: QM
    unit: "m^{3}.s^{-1}"
    name: Mean monthly discharge over the {suffix.name} horizon
    description: ""
    method: "1. monthly aggregation restricted to the {suffix.name} horizon - mean"
    suffix_default:
      name: target
    classification:
      domain: flow
      phenomenon: mean flows
      aspect: magnitude
      season: by month
      output: series

  fr:
    variable: QM
    unit: "m^{3}.s^{-1}"
    name: "Débit moyen mensuel sur l'horizon {suffix.name}"
    description: ""
    method: "1. agrégation mensuelle restreinte à l'horizon {suffix.name} - moyenne"
    suffix_default:
      name: cible
    classification:
      domain: débit
      phenomenon: moyennes eaux
      aspect: intensité
      season: par mois
      output: série

  global:
    input_vars: "Q, horizon_start, horizon_end"
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    func:
      QM: [over_period, "Q", {func: nanmean, dates: "date", period_start: "horizon_start", period_end: "horizon_end"}]
    time_step: month
