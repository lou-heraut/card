id: QM_H
version: "2.0"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-07-22"

meta:
  en:
    variable: QM
    unit: "m^{3}.s^{-1}"
    name: Mean monthly discharge over the {suffix.name} period
    description: ""
    method: "1. monthly aggregation restricted to the {suffix.name} period - mean"
    suffix_default:
      name: study
    classification:
      domain: flow
      phenomenon: mean flows
      aspect: magnitude
      season: by month
      output: series

  fr:
    variable: QM
    unit: "m^{3}.s^{-1}"
    name: "Débit moyen mensuel sur la période {suffix.name}"
    description: ""
    method: "1. agrégation mensuelle restreinte à la période {suffix.name} - moyenne"
    suffix_default:
      name: étudiée
    classification:
      domain: débit
      phenomenon: moyennes eaux
      aspect: intensité
      season: par mois
      output: série

  global:
    input_vars: "Q, period_start, period_end"
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    func:
      QM: [over_period, "Q", {func: nanmean, dates: "date", period_start: "period_start", period_end: "period_end"}]
    time_step: month
