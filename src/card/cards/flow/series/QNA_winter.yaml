id: QNA_winter
version: "1.0"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-04-30"

meta:
  en:
    variable: QNA_winter
    unit: "m^{3}.s^{-1}"
    name: Winter minimum of daily discharge
    description: ""
    method: "1. annual aggregation [11-01, 04-30] - minimum"
    sampling_period: ["11-01", "04-30"]
    classification:
      domain: flow
      phenomenon: low flows
      aspect: magnitude
      season: winter
      output: series

  fr:
    variable: QNA_hiver
    unit: "m^{3}.s^{-1}"
    name: Minimum hivernal du débit journalier
    description: ""
    method: "1. agrégation annuelle [01-11, 30-04] - minimum"
    sampling_period: ["01-11", "30-04"]
    classification:
      domain: débit
      phenomenon: basses eaux
      aspect: intensité
      season: hivernale
      output: série

  global:
    input_vars: Q
    preferred_sampling_period: "01-01"
    relative: false
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    func:
      QNA_winter: [nanmin, "Q"]
    sampling_period: ["11-01", "04-30"]
    max_na_pct: 3
    max_na_years: 10
