id: QM
version: "1.1.1"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-07-18"

meta:
  en:
    variable: QM
    unit: "m^{3}.s^{-1}"
    name: Mean monthly discharge over {suffix.name}
    description: ""
    method: "1. monthly aggregation over {suffix.name} - mean"
    suffix_default:
      name: the whole record
    classification:
      domain: flow
      phenomenon: mean flows
      aspect: magnitude
      season: by month
      output: series

  fr:
    variable: QM
    unit: "m^{3}.s^{-1}"
    name: "Débit moyen mensuel sur {suffix.name}"
    description: ""
    method: "1. agrégation mensuelle sur {suffix.name} - moyenne"
    suffix_default:
      name: la chronique entière
    classification:
      domain: débit
      phenomenon: moyennes eaux
      aspect: intensité
      season: par mois
      output: série

  global:
    input_vars: "Q, period_start?, period_end?"
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    func:
      QM: [over_period, "Q", {func: nanmean, dates: "date", period_start: "period_start", period_end: "period_end"}]
    time_step: month
    max_na_pct: 3
    max_na_years: 10
