id: QM
version: "1.0.1"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-07-18"

meta:
  en:
    variable: QM
    unit: "m^{3}.s^{-1}"
    name: Mean monthly discharge
    description: ""
    method: "1. monthly aggregation - mean"
    classification:
      domain: flow
      phenomenon: mean flows
      aspect: magnitude
      season: by month
      output: series

  fr:
    variable: QM
    unit: "m^{3}.s^{-1}"
    name: Débit moyen mensuel
    description: ""
    method: "1. agrégation mensuelle - moyenne"
    classification:
      domain: débit
      phenomenon: moyennes eaux
      aspect: intensité
      season: par mois
      output: série

  global:
    input_vars: Q
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    func:
      QM: [nanmean, "Q"]
    time_step: month
    max_na_pct: 3
    max_na_years: 10
