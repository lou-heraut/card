id: QM
version: "1.0"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-04-30"

meta:
  en:
    variable: QM
    unit: "m^{3}.s^{-1}"
    name: Mean monthly discharge
    description: ""
    method: "1. monthly aggregation - mean"
    classification:
      domain: flow
      phenomenon: mean flows
      aspect: magnitude
      season: by month
      output: series

  fr:
    variable: QM
    unit: "m^{3}.s^{-1}"
    name: Débit moyen mensuel
    description: ""
    method: "1. agrégation mensuelle - moyenne"
    classification:
      domain: débit
      phenomenon: moyennes eaux
      aspect: intensité
      season: par mois
      output: série

  global:
    input_vars: Q

process:
  P1:
    func:
      QM: [nanmean, "Q"]
    time_step: month
    max_na_pct: 3
    max_na_years: 10
