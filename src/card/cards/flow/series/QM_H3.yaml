id: QM_H3
version: "1.0.1"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-07-18"

meta:
  en:
    variable: QM_H3
    unit: "m^{3}.s^{-1}"
    name: Mean monthly discharge of distant horizon
    description: ""
    method: "1. monthly aggregation over the distant horizon [2070-01-01, 2099-12-31] - mean"
    classification:
      domain: flow
      phenomenon: mean flows
      aspect: magnitude
      season: by month
      output: series

  fr:
    variable: QM_H3
    unit: "m^{3}.s^{-1}"
    name: "Débit moyen mensuel de l'horizon lointain"
    description: ""
    method: "1. agrégation mensuelle sur l'horizon lointain [2070-01-01, 2099-12-31] - moyenne"
    classification:
      domain: débit
      phenomenon: moyennes eaux
      aspect: intensité
      season: par mois
      output: série

  global:
    input_vars: Q
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    func:
      QM_H3: [nanmean, "Q"]
    period: ["2070-01-01", "2099-12-31"]
    time_step: month
