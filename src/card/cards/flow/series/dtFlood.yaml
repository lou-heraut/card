id: dtFlood
version: "1.0"
authors: []
date: "2026-04-28"

meta:
  en:
    variable: dtFlood
    unit: day
    name: "Duration of floods"
    description: >-
      Duration of floods, sampled by annual maxima. The series exploited is
      the difference between the raw flow and the base flow, assimilated to
      runoff Qr. Floods are identified based on the annual maximum in the Qr
      series, and for each flood, the duration is defined as the number of
      days where Qr is above half of the annual maxima.
    method: |
      1. no temporal aggregation - Qr difference between daily flow values
         and base flow
      2. annual aggregation [Month of minimum monthly flows] - maximum Qr
      3. annual aggregation [Month of minimum monthly flows] - division by
         two of the annual maxima to obtain a threshold
      4. annual aggregation [Month of minimum monthly flows] - number of days
         where the difference is above the threshold
    sampling_period: Month of minimum monthly flows
    classification:
      domain: flow
      phenomenon: high flows
      aspect: duration
      season: annual
      output: series

  fr:
    variable: dtCrue
    unit: jour
    name: "Durée des crues"
    description: >-
      Durée des crues, échantillonnées par maxima annuel. La série exploitée
      est la différence entre le débit brut et le débit de base, assimilé au
      ruissellement Qr. Les crues sont identifiées sur la base du maximum
      annuel dans la série des Qr et pour chaque crue, la durée est définie
      comme le nombre de jours où Qr est supérieur au maxima annuel divisé
      par 2.
    method: |
      1. aucune agrégation temporelle - différence Qr entre les valeurs
         journalières de débit par le débit de base
      2. agrégation annuelle [Mois du minimum des débits mensuels] - maximum de Qr
      3. agrégation annuelle [Mois du minimum des débits mensuels] - division par
         deux des maxima annuels pour obtenir un seuil
      4. agrégation annuelle [Mois du minimum des débits mensuels] - nombre de
         jours où la différence est supérieure au seuil
    sampling_period: Mois du minimum des débits mensuels
    classification:
      domain: débit
      phenomenon: hautes eaux
      aspect: durée
      season: annuelle
      output: série

  global:
    input_vars: Q
    preferred_sampling_period: "09-01"
    palette: ["#60265e", "#893687", "#c05fbe", "#dba3da", "#edd1ec",
              "#f6ddd3", "#edbaa7", "#e08765", "#CD5629", "#8f3c1d"]

process:
  P1:
    func:
      dQ: [quickflow, "Q"]
    time_step: none
    keep: all
    max_na_years: 10

  P2:
    func:
      dQXA: [nanmax, "dQ"]
    sampling_period:
      type: adaptive
      func: [nanmin, "Q"]
    keep: all

  P3:
    func:
      lowLim: [ratio, "dQXA", 2, {first: true}]
    sampling_period:
      type: adaptive
      func: [nanmin, "Q"]
    keep: all

  P4:
    func:
      dtFlood: [apply_threshold, "dQ",
                {lim: lowLim, where: ">=", what: length, select: dQXA}]
    sampling_period:
      type: adaptive
      func: [nanmin, "Q"]
    max_na_pct: 3
