id: Q75A
version: "1.0"
authors: []
date: "2026-04-30"

meta:
  en:
    variable: Q75A
    unit: "m^{3}.s^{-1}"
    name: Annual first quartile of daily flows
    description: Annual flow with an exceedance probability of 75 % (25th percentile)
    method: "1. annual aggregation [01-01, 12-31] - quantile at the exceedance probability of 75 %"
    sampling_period: ["01-01", "12-31"]
    classification:
      domain: flow
      phenomenon: mean flows
      aspect: magnitude
      season: annual
      output: series

  fr:
    variable: Q75A
    unit: "m^{3}.s^{-1}"
    name: Premier quartile annuel des débits journaliers
    description: "Débit annuel avec une probabilité de dépassement de 75 % (centile 25 %)"
    method: "1. agrégation annuelle [01-01, 31-12] - quantile à la probabilité de dépassement de 75 %"
    sampling_period: ["01-01", "31-12"]
    classification:
      domain: débit
      phenomenon: moyennes eaux
      aspect: intensité
      season: annuelle
      output: série

  global:
    input_vars: Q
    preferred_sampling_period: "01-01"
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    func:
      Q75A: [exceedance_quantile, "Q", {p: 0.75}]
    sampling_period: "01-01"
    max_na_pct: 3
    max_na_years: 10
