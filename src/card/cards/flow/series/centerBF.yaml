id: centerBF
version: "1.0"
authors: []
date: "2026-04-26"

meta:
  en:
    variable: centerBF
    unit: yearday
    name: Center of low flows
    description: >-
      Date when 50 % of the annual cumulative baseflow is reached
    method: |
      1. annual aggregation [09-01, 08-31] - date when the baseflow (Wallingford)
         sum corresponds to 50 % of the total sum
    sampling_period: ["09-01", "08-31"]
    classification:
      domain: flow
      phenomenon: baseflow
      aspect: timing
      season: annual
      output: series

  fr:
    variable: centreQB
    unit: "jour de l'année"
    name: Centre des écoulements lents
    description: >-
      Date à laquelle 50 % du cumul annuel du débit de base sont atteints
    method: |
      1. agrégation annuelle [01-09, 31-08] - date à laquelle la somme du
         débit de base (Wallingford) correspond à 50 % de la somme totale
    sampling_period: ["01-09", "31-08"]
    classification:
      domain: débit
      phenomenon: débit de base
      aspect: saisonnalité
      season: annuelle
      output: série

  global:
    input_vars: Q
    source: >-
      TALLAKSEN, L. et H. VAN LANEN, éd. (2004). Hydrological drought. Processes
      and estimation methods for streamflow and groundwater. Developments in water
      science 48. Netherlands : Elsevier. ISBN : 9780444516886.
    preferred_sampling_period: "09-01"
    is_date: true
    relative: false
    palette: ["#60265e", "#893687", "#c05fbe", "#dba3da", "#edd1ec",
              "#f6ddd3", "#edbaa7", "#e08765", "#CD5629", "#8f3c1d"]

process:
  P1:
    func:
      centerBF: [snowmelt_timing, "Q", {fraction: 0.5, method: Wal}, true]
    sampling_period: "09-01"
    max_na_pct: 3
    max_na_years: 10
