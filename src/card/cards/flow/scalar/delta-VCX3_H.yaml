id: delta-VCX3_H
version: "1.0"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-04-28"

meta:
  en:
    variable: [delta-VCX3_H1, delta-VCX3_H2, delta-VCX3_H3]
    unit: "%"
    name:
      - "Average change of annual maximum of the 3-day moving average of
         daily flows between the near horizon and historical period"
      - "Average change of annual maximum of the 3-day moving average of
         daily flows between the middle horizon and historical period"
      - "Average change of annual maximum of the 3-day moving average of
         daily flows between the distant horizon and historical period"
    description: ""
    method: |
      1. no temporal aggregation - 3-day centered moving average
      2. annual aggregation [Month of minimum monthly flows] - maximum
      3. no temporal aggregation - calculation of the average change between
         the historical period and the {horizon} horizon
    horizon_labels: {H1: near, H2: middle, H3: distant}
    sampling_period: Month of minimum monthly flows
    classification:
      domain: flow
      phenomenon: high flows
      aspect: magnitude
      season: annual
      output: scalar

  fr:
    variable: [delta-VCX3_H1, delta-VCX3_H2, delta-VCX3_H3]
    unit: "%"
    name:
      - "Changement moyen du maximum annuel de la moyenne mobile sur 3 jours
         des débits journaliers entre l'horizon proche et la période historique"
      - "Changement moyen du maximum annuel de la moyenne mobile sur 3 jours
         des débits journaliers entre l'horizon moyen et la période historique"
      - "Changement moyen du maximum annuel de la moyenne mobile sur 3 jours
         des débits journaliers entre l'horizon lointain et la période historique"
    description: ""
    method: |
      1. aucune agrégation temporelle - moyenne mobile centrée sur 3 jours
      2. agrégation annuelle [Mois du minimum des débits mensuels] - maximum
      3. aucune agrégation temporelle - calcul du changement moyen entre la
         période historique et l'horizon {horizon}
    horizon_labels: {H1: proche, H2: moyen, H3: lointain}
    sampling_period: Mois du minimum des débits mensuels
    classification:
      domain: débit
      phenomenon: hautes eaux
      aspect: intensité
      season: annuelle
      output: scalaire

  global:
    input_vars: Q
    preferred_sampling_period: "09-01"
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]
    horizons:
      H0: ["1976-01-01", "2005-08-31"]
      H1: ["2021-01-01", "2050-12-31"]
      H2: ["2041-01-01", "2070-12-31"]
      H3: ["2070-01-01", "2099-12-31"]

process:
  P1:
    func:
      VC3: [rollmean_center, "Q", {k: 3}]
    time_step: none
    keep: all
    max_na_years: 10

  P2:
    func:
      VCX3: [nanmax, "VC3"]
    sampling_period:
      type: adaptive
      func: [nanmin, "Q"]
    max_na_pct: 3

  P3:
    func:
      delta-VCX3_H1: [delta, "VCX3", "date",
                      {past: $H0, future: $H1, relative: true}]
      delta-VCX3_H2: [delta, "VCX3", "date",
                      {past: $H0, future: $H2, relative: true}]
      delta-VCX3_H3: [delta, "VCX3", "date",
                      {past: $H0, future: $H3, relative: true}]
    time_step: none
