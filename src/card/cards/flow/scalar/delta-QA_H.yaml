id: delta-QA_H
version: "1.1"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-07-21"

meta:
  en:
    variable: delta-QA
    unit: "%"
    name: "Average change of annual mean daily discharge between the historical period and the {suffix.name} horizon"
    description: ""
    method: |
      1. annual aggregation [09-01, 08-31] - mean
      2. no temporal aggregation - average change between the historical period and the {suffix.name} horizon
    sampling_period: ["09-01", "08-31"]
    classification:
      domain: flow
      phenomenon: mean flows
      aspect: magnitude
      season: annual
      output: scalar
    suffix_default:
      name: target

  fr:
    variable: delta-QA
    unit: "%"
    name: "Changement moyen de la moyenne annuelle du débit journalier entre la période historique et l'horizon {suffix.name}"
    description: ""
    method: |
      1. agrégation annuelle [01-09, 31-08] - moyenne
      2. aucune agrégation temporelle - changement moyen entre la période historique et l'horizon {suffix.name}
    sampling_period: ["01-09", "31-08"]
    classification:
      domain: débit
      phenomenon: moyennes eaux
      aspect: intensité
      season: annuelle
      output: scalaire
    suffix_default:
      name: cible

  global:
    input_vars: "Q, ref_start, ref_end, horizon_start, horizon_end"
    preferred_sampling_period: "09-01"
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    func:
      QA: [nanmean, "Q"]
    sampling_period: "09-01"
    max_na_pct: 3
    max_na_years: 10

  P2:
    func:
      delta-QA: [delta, "QA", "date", {ref_start: "ref_start", ref_end: "ref_end", horizon_start: "horizon_start", horizon_end: "horizon_end", relative: true}]
    time_step: none
