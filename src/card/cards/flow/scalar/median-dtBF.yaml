id: median-dtBF
version: "1.0.1"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-07-18"

meta:
  en:
    variable: median-dtBF
    unit: day
    name: Inter-annual median of the duration of baseflow
    description: >-
      Median of the durations between the start and end of baseflow
    method: |
      1. annual aggregation [09-01, 08-31] - number of days between the dates
         at which the baseflow (Wallingford) sum corresponds to 10 % and 90 %
         of the total baseflow sum
      2. no temporal aggregation - median
    sampling_period: ["09-01", "08-31"]
    classification:
      domain: flow
      phenomenon: baseflow
      aspect: duration
      season: annual
      output: scalar

  fr:
    variable: mediane-dtQB
    unit: jour
    name: Médiane inter-annuelle de la durée des écoulements lents
    description: >-
      Médiane des durées entre le début et la fin des écoulements lents
    method: |
      1. agrégation annuelle [01-09, 31-08] - nombre de jours entre les dates
         auxquelles la somme du débit de base (Wallingford) correspond à 10 %
         et 90 % de la somme totale du débit de base
      2. aucune agrégation temporelle - médiane
    sampling_period: ["01-09", "31-08"]
    classification:
      domain: débit
      phenomenon: débit de base
      aspect: durée
      season: annuelle
      output: scalaire

  global:
    input_vars: Q
    source: >-
      TALLAKSEN, L. et H. VAN LANEN, éd. (2004). Hydrological drought. Processes
      and estimation methods for streamflow and groundwater. Developments in water
      science 48. Netherlands : Elsevier. ISBN : 9780444516886.
    preferred_sampling_period: "09-01"
    palette: ["#003C30", "#01665E", "#35978F", "#80CDC1", "#C7EAE5",
              "#F6E8C3", "#DFC27D", "#BF812D", "#8C510A", "#543005"]

process:
  P1:
    func:
      dtBF: [snowmelt_duration, "Q", {fraction1: 0.1, fraction2: 0.9, method: Wal}]
    sampling_period: "09-01"
    max_na_pct: 3
    max_na_years: 10

  P2:
    func:
      median-dtBF: [nanmedian, "dtBF"]
    time_step: none
