id: median-tQJXA
version: "1.0"
authors: []
date: "2026-04-28"

meta:
  en:
    variable: median-tQJXA
    unit: yearday
    name: Inter-annual median of the dates of the annual maximum daily discharge
    description: ""
    method: |
      1. annual aggregation [Month of minimum monthly flows] - date of maximum
      2. no temporal aggregation - median
    sampling_period: Month of minimum monthly flows
    classification:
      domain: flow
      phenomenon: high flows
      aspect: timing
      season: annual
      output: scalar

  fr:
    variable: mediane-tQJXA
    unit: "jour de l'année"
    name: Médiane inter-annuelle des dates du débit journalier maximal annuel
    description: ""
    method: |
      1. agrégation annuelle [Mois du minimum des débits mensuels] - date du maximum
      2. aucune agrégation temporelle - médiane
    sampling_period: Mois du minimum des débits mensuels
    classification:
      domain: débit
      phenomenon: hautes eaux
      aspect: saisonnalité
      season: annuelle
      output: scalaire

  global:
    input_vars: Q
    preferred_sampling_period: "09-01"
    is_date: true
    relative: false

process:
  P1:
    func:
      tQJXA: [nanargmax, "Q", true]
    sampling_period:
      type: adaptive
      func: [nanmin, "Q"]
    max_na_pct: 3
    max_na_years: 10

  P2:
    func:
      median-tQJXA: [circular_median, "tQJXA", {periodicity: 365.25}]
    time_step: none
