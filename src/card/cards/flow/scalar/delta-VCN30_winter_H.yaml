id: delta-VCN30_winter_H
version: "1.1"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-07-21"

meta:
  en:
    variable: delta-VCN30_winter
    unit: "%"
    name: "Average change of winter minimum of 30-day mean daily discharge between the {suffix.name} horizon and historical period"
    description: ""
    method: |
      1. no temporal aggregation - 30-day centered moving average
      2. annual aggregation [11-01, 04-30] - minimum
      3. no temporal aggregation - calculation of the average change between the historical period and the {suffix.name} horizon
    sampling_period: ["11-01", "04-30"]
    classification:
      domain: flow
      phenomenon: low flows
      aspect: magnitude
      season: winter
      output: scalar
    suffix_default:
      name: target

  fr:
    variable: delta-VCN30_hiver
    unit: "%"
    name: "Changement moyen du minimum hivernal de la moyenne sur 30 jours du débit journalier entre l'horizon {suffix.name} et la période historique"
    description: ""
    method: |
      1. aucune agrégation temporelle - moyenne mobile centrée sur 30 jours
      2. agrégation annuelle [01-11, 30-04] - minimum
      3. aucune agrégation temporelle - calcul du changement moyen entre la période historique et l'horizon {suffix.name}
    sampling_period: ["01-11", "30-04"]
    classification:
      domain: débit
      phenomenon: basses eaux
      aspect: intensité
      season: hivernale
      output: scalaire
    suffix_default:
      name: cible

  global:
    input_vars: "Q, ref_start, ref_end, horizon_start, horizon_end"
    preferred_sampling_period: "01-01"
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    func:
      VC30_winter: [rollmean_center, "Q", {k: 30}]
    time_step: none
    keep: all
    max_na_years: 10

  P2:
    func:
      VCN30_winter: [nanmin, "VC30_winter"]
    sampling_period: ["11-01", "04-30"]
    max_na_pct: 3

  P3:
    func:
      delta-VCN30_winter: [delta, "VCN30_winter", "date", {ref_start: "ref_start", ref_end: "ref_end", horizon_start: "horizon_start", horizon_end: "horizon_end", relative: true}]
    time_step: none
