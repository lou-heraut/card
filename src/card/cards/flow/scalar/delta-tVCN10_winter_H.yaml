id: delta-tVCN10_winter_H
version: "1.1"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-07-21"

meta:
  en:
    variable: delta-tVCN10_winter
    unit: day
    name: "Average change of the date of the winter minimum of 10-day mean flows between the {suffix.name} horizon and historical period"
    description: Months from November to April
    method: |
      1. no temporal aggregation - 10-day centered moving average
      2. annual aggregation [11-01, 04-30] - date of the minimum
      3. no temporal aggregation - calculation of the average change between the historical period and the {suffix.name} horizon
    sampling_period: ["11-01", "04-30"]
    classification:
      domain: flow
      phenomenon: low flows
      aspect: timing
      season: winter
      output: scalar
    suffix_default:
      name: target

  fr:
    variable: delta-tVCN10_hiver
    unit: jour
    name: "Changement moyen de la date du minimum hivernal des débits moyens sur 10 jours entre l'horizon {suffix.name} et la période historique"
    description: Mois de novembre à avril
    method: |
      1. aucune agrégation temporelle - moyenne mobile centrée sur 10 jours
      2. agrégation annuelle [01-11, 30-04] - date du minimum
      3. aucune agrégation temporelle - calcul du changement moyen entre la période historique et l'horizon {suffix.name}
    sampling_period: ["01-11", "30-04"]
    classification:
      domain: débit
      phenomenon: basses eaux
      aspect: saisonnalité
      season: hivernale
      output: scalaire
    suffix_default:
      name: cible

  global:
    input_vars: "Q, ref_start, ref_end, horizon_start, horizon_end"
    preferred_sampling_period: "01-01"
    is_date: true
    relative: false
    palette: ["#60265e", "#893687", "#c05fbe", "#dba3da", "#edd1ec",
              "#f6ddd3", "#edbaa7", "#e08765", "#CD5629", "#8f3c1d"]

process:
  P1:
    func:
      VC10_winter: [rollmean_center, "Q", {k: 10}]
    time_step: none
    keep: all

  P2:
    func:
      tVCN10_winter: [nanargmin, "VC10_winter", true]
    sampling_period: ["11-01", "04-30"]
    max_na_pct: 3
    max_na_years: 10

  P3:
    func:
      delta-tVCN10_winter: [delta, "tVCN10_winter", "date", {ref_start: "ref_start", ref_end: "ref_end", horizon_start: "horizon_start", horizon_end: "horizon_end", relative: false}]
    time_step: none
