process:
  P1:
    func:
      VC10_summer: [rollmean_center, "Q", {k: 10}]
    time_step: none
    keep: all

  P2:
    func:
      VCN10_summer: [nanmin, "VC10_summer"]
    sampling_period: ["05-01", "11-30"]
    max_na_pct: 3
    max_na_years: 10
    keep: all

  P3:
    func:
      upLim: [nanmax, "VCN10_summer"]
    time_step: none
    keep: all

  P4:
    func:
      startLF_summer:  [apply_threshold, "VC10_summer", {lim: upLim, where: "<=", what: first, select: longest}, true]
      centerLF_summer: [apply_threshold, "VC10_summer", {lim: upLim, where: "<=", what: nanargmin, select: longest}, true]
      endLF_summer:    [apply_threshold, "VC10_summer", {lim: upLim, where: "<=", what: last, select: longest}, true]
      dtLF_summer:     [apply_threshold, "VC10_summer", {lim: upLim, where: "<=", what: length, select: longest}]
      vLF_summer:      [deficit_volume, "VC10_summer", {threshold: upLim}]
    sampling_period: ["05-01", "11-30"]
    max_na_pct: 3

  P5:
    func:
      delta-startLF_summer_H1:  [delta, "startLF_summer", "date", {past: $H0, future: $H1, relative: false}]
      delta-startLF_summer_H2:  [delta, "startLF_summer", "date", {past: $H0, future: $H2, relative: false}]
      delta-startLF_summer_H3:  [delta, "startLF_summer", "date", {past: $H0, future: $H3, relative: false}]
      delta-centerLF_summer_H1: [delta, "centerLF_summer", "date", {past: $H0, future: $H1, relative: false}]
      delta-centerLF_summer_H2: [delta, "centerLF_summer", "date", {past: $H0, future: $H2, relative: false}]
      delta-centerLF_summer_H3: [delta, "centerLF_summer", "date", {past: $H0, future: $H3, relative: false}]
      delta-endLF_summer_H1:    [delta, "endLF_summer", "date", {past: $H0, future: $H1, relative: false}]
      delta-endLF_summer_H2:    [delta, "endLF_summer", "date", {past: $H0, future: $H2, relative: false}]
      delta-endLF_summer_H3:    [delta, "endLF_summer", "date", {past: $H0, future: $H3, relative: false}]
      delta-dtLF_summer_H1:     [delta, "dtLF_summer", "date", {past: $H0, future: $H1, relative: false}]
      delta-dtLF_summer_H2:     [delta, "dtLF_summer", "date", {past: $H0, future: $H2, relative: false}]
      delta-dtLF_summer_H3:     [delta, "dtLF_summer", "date", {past: $H0, future: $H3, relative: false}]
      delta-vLF_summer_H1:      [delta, "vLF_summer", "date", {past: $H0, future: $H1, relative: true}]
      delta-vLF_summer_H2:      [delta, "vLF_summer", "date", {past: $H0, future: $H2, relative: true}]
      delta-vLF_summer_H3:      [delta, "vLF_summer", "date", {past: $H0, future: $H3, relative: true}]
    time_step: none
