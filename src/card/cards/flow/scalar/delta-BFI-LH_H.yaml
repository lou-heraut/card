id: delta-BFI-LH_H
version: "1.1"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-07-21"

meta:
  en:
    variable: delta-BFI-LH
    unit: without unit
    name: "Average change of the baseflow index between the {suffix.name} horizon and historical period (Lyne and Hollick)"
    description: >-
      Ratio between mean inter-annual base flow and mean inter-annual flow
    method: |
      1. no temporal aggregation - extraction of the base flow (Lyne and Hollick)
      2. no temporal aggregation - calculation of the BFI change between the
         historical period and the {suffix.name} horizon
    suffix_default:
      name: target
    classification:
      domain: flow
      phenomenon: baseflow
      aspect: magnitude
      season: record
      output: scalar

  fr:
    variable: delta-BFI-LH
    unit: sans unité
    name: "Changement moyen de l'indice de débit de base entre l'horizon {suffix.name} et la période historique (Lyne et Hollick)"
    description: >-
      Rapport entre débit de base moyen inter-annuel et débit moyen inter-annuel
    method: |
      1. aucune agrégation temporelle - extraction du débit de base (Lyne et Hollick)
      2. aucune agrégation temporelle - calcul du changement de BFI entre la
         période historique et l'horizon {suffix.name}
    suffix_default:
      name: cible
    classification:
      domain: débit
      phenomenon: débit de base
      aspect: intensité
      season: chronique
      output: scalaire

  global:
    input_vars: "Q, ref_start, ref_end, horizon_start, horizon_end"
    relative: false

process:
  P1:
    func:
      BF-LH: [baseflow, "Q", {method: LH}]
    time_step: none
    keep: all
    max_na_years: 10

  P2:
    func:
      delta-BFI-LH: [delta, "BF-LH", "date", {ref_start: "ref_start", ref_end: "ref_end", horizon_start: "horizon_start", horizon_end: "horizon_end", relative: false, Q_for_BFI: "Q"}]
    time_step: none
