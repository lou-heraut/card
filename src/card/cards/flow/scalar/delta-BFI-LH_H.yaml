id: delta-BFI-LH_H
version: "1.0"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-04-26"

meta:
  en:
    variable: [delta-BFI-LH_H1, delta-BFI-LH_H2, delta-BFI-LH_H3]
    unit: without unit
    name:
      - "Average change of the baseflow index between the near horizon and historical period
         (Lyne and Hollick)"
      - "Average change of the baseflow index between the middle horizon and historical period
         (Lyne and Hollick)"
      - "Average change of the baseflow index between the distant horizon and historical period
         (Lyne and Hollick)"
    description: >-
      Ratio between mean inter-annual base flow and mean inter-annual flow
    method: |
      1. no temporal aggregation - extraction of the base flow (Lyne and Hollick)
      2. no temporal aggregation - calculation of the BFI change between the
         historical period and the {horizon} horizon
    horizon_labels: {H1: near, H2: middle, H3: distant}
    classification:
      domain: flow
      phenomenon: baseflow
      aspect: magnitude
      season: record
      output: scalar

  fr:
    variable: [delta-BFI-LH_H1, delta-BFI-LH_H2, delta-BFI-LH_H3]
    unit: sans unité
    name:
      - "Changement moyen de l'indice de débit de base entre l'horizon proche et la
         période historique (Lyne et Hollick)"
      - "Changement moyen de l'indice de débit de base entre l'horizon moyen et la
         période historique (Lyne et Hollick)"
      - "Changement moyen de l'indice de débit de base entre l'horizon lointain et la
         période historique (Lyne et Hollick)"
    description: >-
      Rapport entre débit de base moyen inter-annuel et débit moyen inter-annuel
    method: |
      1. aucune agrégation temporelle - extraction du débit de base (Lyne et Hollick)
      2. aucune agrégation temporelle - calcul du changement de BFI entre la
         période historique et l'horizon {horizon}
    horizon_labels: {H1: proche, H2: moyen, H3: lointain}
    classification:
      domain: débit
      phenomenon: débit de base
      aspect: intensité
      season: chronique
      output: scalaire

  global:
    input_vars: Q
    relative: false
    horizons:
      H0: ["1976-01-01", "2005-08-31"]
      H1: ["2021-01-01", "2050-12-31"]
      H2: ["2041-01-01", "2070-12-31"]
      H3: ["2070-01-01", "2099-12-31"]

process:
  P1:
    func:
      BF-LH: [baseflow, "Q", {method: LH}]
    time_step: none
    keep: all
    max_na_years: 10

  P2:
    func:
      delta-BFI-LH_H1: [delta, "BF-LH", "date",
                         {past: $H0, future: $H1, relative: false, Q_for_BFI: "Q"}]
      delta-BFI-LH_H2: [delta, "BF-LH", "date",
                         {past: $H0, future: $H2, relative: false, Q_for_BFI: "Q"}]
      delta-BFI-LH_H3: [delta, "BF-LH", "date",
                         {past: $H0, future: $H3, relative: false, Q_for_BFI: "Q"}]
    time_step: none
