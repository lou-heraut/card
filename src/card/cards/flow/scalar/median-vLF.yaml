id: median-vLF
version: "1.0"
authors: []
date: "2026-04-30"

meta:
  en:
    variable: median-vLF
    unit: "hm^{3}"
    name: Inter-annual median of low-flow deficit volumes
    description: Median of sums of the differences between the 10-day average and the maximum of the VCN10, over the longest sequence below this threshold
    method: |
      1. no temporal aggregation - 10-day centered moving average
      2. annual aggregation [Month of maximum monthly flows] - minimum (extraction of the VCN10 series)
      3. no temporal aggregation - the maximum of the previous series is taken as the threshold
      4. annual aggregation [Month of maximum monthly flows] - sum of volumes discharged each day over the longest period below the previous threshold
      5. no temporal aggregation - median
    sampling_period: Month of maximum monthly flows
    classification:
      domain: flow
      phenomenon: low flows
      aspect: magnitude
      season: annual
      output: scalar

  fr:
    variable: mediane-vBE
    unit: "hm^{3}"
    name: Médiane inter-annuelle des volumes de déficit des basses eaux
    description: Médiane des sommes des écarts entre la moyenne sur 10 jours et le maximum des VCN10, sur la séquence la plus longue sous ce seuil
    method: |
      1. aucune agrégation temporelle - moyenne mobile centrée sur 10 jours
      2. agrégation annuelle [Mois du maximum des débits mensuels] - minimum (extraction de la série des VCN10)
      3. aucune agrégation temporelle - le maximum de la précédente série est pris comme seuil
      4. agrégation annuelle [Mois du maximum des débits mensuels] - somme des volumes écoulés chaque jour de la plus longue période sous le précédent seuil
      5. aucune agrégation temporelle - médiane
    sampling_period: Mois du maximum des débits mensuels
    classification:
      domain: débit
      phenomenon: basses eaux
      aspect: intensité
      season: annuelle
      output: scalaire

  global:
    input_vars: Q
    preferred_sampling_period: "01-01"

process:
  P1:
    func:
      VC10: [rollmean_center, "Q", {k: 10}]
    time_step: none
    keep: all

  P2:
    func:
      VCN10: [nanmin, "VC10"]
    sampling_period:
      type: adaptive
      func: [nanmax, "Q"]
    max_na_pct: 3
    max_na_years: 10
    keep: all

  P3:
    func:
      upLim: [nanmax, "VCN10"]
    time_step: none
    keep: all

  P4:
    func:
      vLF: [deficit_volume, "VC10", {threshold: upLim}]
    sampling_period:
      type: adaptive
      func: [nanmax, "Q"]
    max_na_pct: 3

  P5:
    func:
      median-vLF: [nanmedian, "vLF"]
    time_step: none
