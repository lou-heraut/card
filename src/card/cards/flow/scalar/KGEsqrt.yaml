id: KGEsqrt
version: "1.0"
authors: []
date: "2026-04-26"

meta:
  en:
    variable: KGEsqrt
    unit: "without unit"
    name: Kling-Gupta Efficiency of the square root of data
    description: >-
      Similar to KGE, this score gives equivalent weight across the entire
      range of the evaluated variable.
    method: "1. no temporal aggregation - square root of simulated and reference data, then KGE calculation"
    classification:
      domain: flow
      season: record
      output: scalar
      purpose: model performance

  fr:
    variable: KGEracine
    unit: "sans unité"
    name: Coefficient d'efficience de Kling-Gupta de la racine carrée des données
    description: >-
      Identique au KGE, ce score donne cependant un poids équivalent sur
      l'ensemble de la plage de variation de la variable évaluée.
    method: "1. aucune agrégation temporelle - racine carrée des données simulées et de référence puis KGE"
    classification:
      domain: débit
      season: chronique
      output: scalaire
      purpose: performance de modèle

  global:
    input_vars: "Q_obs, Q_sim"
    source: |
      GUPTA, H. V. et al. (2009). « Decomposition of the mean squared error and NSE performance criteria :
      Implications for improving hydrological modelling ». In : Journal of Hydrology 377, p. 80-91.
    relative: false

process:
  P1:
    func:
      KGEsqrt: [KGE_sqrt, "Q_obs", "Q_sim"]
    time_step: none
    max_na_years: 10
