id: median-endLF
version: "2.0"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-04-30"

meta:
  en:
    variable: median-endLF
    unit: yearday
    name: Inter-annual median of the end of low flows
    description: Median of the dates of the last 10-day mean flow under the maximum of the annual minima of the 10-day mean flow of daily VCN10
    method: |
      1. no temporal aggregation - 10-day centered moving average
      2. annual aggregation [Month of maximum monthly flows] - minimum (extraction from the series of VCN10)
      3. no temporal aggregation - the maximum of the series of VCN10 is taken as the threshold
      4. annual aggregation [Month of maximum monthly flows] - date of the last day of the longest period below the previous threshold
      5. no temporal aggregation - median
    sampling_period: Month of maximum monthly flows
    classification:
      domain: flow
      phenomenon: low flows
      aspect: timing
      season: annual
      output: scalar

  fr:
    variable: mediane-finBE
    unit: "jour de l'année"
    name: Médiane inter-annuelle de la fin des basses eaux
    description: Médiane des dates de la dernière moyenne sur 10 jours sous le maximum des minimums annuels de la moyenne sur 10 jours du débit journalier VCN10
    method: |
      1. aucune agrégation temporelle - moyenne mobile centrée sur 10 jours
      2. agrégation annuelle [Mois du maximum des débits mensuels] - minimum (extraction de la série des VCN10)
      3. aucune agrégation temporelle - le maximum de la série des VCN10 est pris comme seuil
      4. agrégation annuelle [Mois du maximum des débits mensuels] - date du dernier jour de la plus longue période sous le précédent seuil
      5. aucune agrégation temporelle - médiane
    sampling_period: Mois du maximum des débits mensuels
    classification:
      domain: débit
      phenomenon: basses eaux
      aspect: saisonnalité
      season: annuelle
      output: scalaire

  global:
    input_vars: Q
    preferred_sampling_period: "01-01"
    is_date: true
    relative: false

process:
  P1:
    func:
      VC10: [rollmean_center, "Q", {k: 10}]
    time_step: none
    keep: all

  P2:
    func:
      VCN10: [nanmin, "VC10"]
    sampling_period:
      type: adaptive
      func: [nanmax, "Q"]
    max_na_pct: 3
    max_na_years: 10
    keep: all

  P3:
    func:
      upLim: [nanmax, "VCN10"]
    time_step: none
    keep: all

  P4:
    func:
      endLF: [apply_threshold, "VC10", {lim: upLim, where: "<=", what: last, select: longest}, true]
    sampling_period:
      type: adaptive
      func: [nanmax, "Q"]
    max_na_pct: 3

  P5:
    func:
      median-endLF: [circular_median, "endLF", {periodicity: 365.25}]
    time_step: none
