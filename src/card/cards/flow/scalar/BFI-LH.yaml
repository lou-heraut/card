id: BFI-LH
version: "1.0"
authors: []
date: "2026-07-15"

meta:
  en:
    variable: BFI-LH
    unit: without unit
    name: Baseflow index (Lyne and Hollick)
    description: >-
      Ratio between mean inter-annual base flow and mean inter-annual flow
    method: |
      1. no temporal aggregation - extraction of the base flow (Lyne and Hollick)
      2. no temporal aggregation - calculation of the Base Flow Index (BFI)
    classification:
      domain: flow
      phenomenon: baseflow
      aspect: magnitude
      season: record
      output: scalar

  fr:
    variable: BFI-LH
    unit: sans unité
    name: Indice de débit de base (Lyne et Hollick)
    description: >-
      Rapport entre débit de base moyen inter-annuel et débit moyen inter-annuel
    method: |
      1. aucune agrégation temporelle - extraction du débit de base (Lyne et Hollick)
      2. aucune agrégation temporelle - calcul du BFI
    classification:
      domain: débit
      phenomenon: débit de base
      aspect: intensité
      season: chronique
      output: scalaire

  global:
    input_vars: Q
    source: >-
      LYNE, V. et M. HOLLICK (1979). Stochastic time-variable rainfall-runoff
      modelling. Institute of Engineers Australia National Conference,
      p. 89-93.
    relative: false

process:
  P1:
    func:
      BF-LH: [baseflow, "Q", {method: LH}]
    time_step: none
    keep: all
    max_na_years: 10

  P2:
    func:
      BFI-LH: [BFI, "Q", "BF-LH"]
    time_step: none
