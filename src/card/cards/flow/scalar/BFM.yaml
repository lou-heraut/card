id: BFM
version: "1.1"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-04-26"

meta:
  en:
    variable: BFM
    unit: without unit
    name: Baseflow magnitude
    description: ""
    method: |
      1. no temporal aggregation - extraction of the base flow (Wallingford)
      2. aggregation by day of the year - average of the base flow BFA
      3. no temporal aggregation - calculation of the base flow magnitude BFM
    classification:
      domain: flow
      phenomenon: baseflow
      aspect: magnitude
      season: record
      output: scalar

  fr:
    variable: BFM
    unit: sans unité
    name: Magnitude du débit de base
    description: ""
    method: |
      1. aucune agrégation temporelle - extraction du débit de base (Wallingford)
      2. agrégation par jour de l'année - moyenne du débit de base BFA
      3. aucune agrégation temporelle - calcul du BFM
    classification:
      domain: débit
      phenomenon: débit de base
      aspect: intensité
      season: chronique
      output: scalaire

  global:
    input_vars: Q
    source: >-
      TALLAKSEN, L. et H. VAN LANEN, éd. (2004). Hydrological drought. Processes
      and estimation methods for streamflow and groundwater. Developments in water
      science 48. Netherlands : Elsevier. ISBN : 9780444516886.
    relative: false

process:
  P1:
    func:
      BF: [baseflow, "Q", {method: Wal}]
    time_step: none
    keep: all
    max_na_years: 10

  P2:
    func:
      BFA: [nanmean, "BF"]
    time_step: yearday
    max_na_pct: 3

  P3:
    func:
      BFM: [BFM, "BFA"]
    time_step: none
