id: delta-QMNA_H
version: "1.0"
authors: []
date: "2026-04-28"

meta:
  en:
    variable: [delta-QMNA_H1, delta-QMNA_H2, delta-QMNA_H3]
    unit: "%"
    name:
      - Average change of annual minimum of monthly flows between the near horizon and historical period
      - Average change of annual minimum of monthly flows between the middle horizon and historical period
      - Average change of annual minimum of monthly flows between the distant horizon and historical period
    description: ""
    method: |
      1. monthly aggregation - mean
      2. annual aggregation [Month of maximum monthly flows] - minimum
      3. no temporal aggregation - calculation of the average change between the historical period and the {horizon} horizon
    horizon_labels: {H1: near, H2: middle, H3: distant}
    sampling_period: Month of maximum monthly flows
    classification:
      domain: flow
      phenomenon: low flows
      aspect: magnitude
      season: by month
      output: scalar

  fr:
    variable: [delta-QMNA_H1, delta-QMNA_H2, delta-QMNA_H3]
    unit: "%"
    name:
      - Changement moyen du minimum annuel des débits mensuels entre l'horizon proche et la période historique
      - Changement moyen du minimum annuel des débits mensuels entre l'horizon moyen et la période historique
      - Changement moyen du minimum annuel des débits mensuels entre l'horizon lointain et la période historique
    description: ""
    method: |
      1. agrégation mensuelle - moyenne
      2. agrégation annuelle [Mois du maximum des débits mensuels] - minimum
      3. aucune agrégation temporelle - calcul du changement moyen entre la période historique et l'horizon {horizon}
    horizon_labels: {H1: proche, H2: moyen, H3: lointain}
    sampling_period: Mois du maximum des débits mensuels
    classification:
      domain: débit
      phenomenon: basses eaux
      aspect: intensité
      season: par mois
      output: scalaire

  global:
    input_vars: Q
    preferred_sampling_period: "01-01"
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]
    horizons:
      H0: ["1976-01-01", "2005-08-31"]
      H1: ["2021-01-01", "2050-12-31"]
      H2: ["2041-01-01", "2070-12-31"]
      H3: ["2070-01-01", "2099-12-31"]

process:
  P1:
    func:
      QMA: [nanmean, "Q"]
    time_step: year-month
    max_na_pct: 3
    max_na_years: 10
    keep: all

  P2:
    func:
      QMNA: [nanmin, "QMA"]
    sampling_period:
      type: adaptive
      func: [nanmax, "QMA"]
    max_na_pct: 3

  P3:
    func:
      delta-QMNA_H1: [delta, "QMNA", "date", {past: $H0, future: $H1, relative: true}]
      delta-QMNA_H2: [delta, "QMNA", "date", {past: $H0, future: $H2, relative: true}]
      delta-QMNA_H3: [delta, "QMNA", "date", {past: $H0, future: $H3, relative: true}]
    time_step: none
