id: BF-LH
version: "1.0.1"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-07-18"

meta:
  en:
    variable: BF-LH
    unit: "m^{3}.s^{-1}"
    name: Base flow (Lyne and Hollick)
    description: ""
    method: "1. no temporal aggregation - extraction of the base flow (Lyne and Hollick)"
    classification:
      domain: flow
      phenomenon: baseflow
      aspect: magnitude
      season: record
      output: scalar

  fr:
    variable: QB-LH
    unit: "m^{3}.s^{-1}"
    name: Débit de base (Lyne et Hollick)
    description: ""
    method: "1. aucune agrégation temporelle - extraction du débit de base (Lyne et Hollick)"
    classification:
      domain: débit
      phenomenon: débit de base
      aspect: intensité
      season: chronique
      output: scalaire

  global:
    input_vars: Q
    relative: false
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    func:
      BF-LH: [baseflow, "Q", {method: LH}]
    time_step: none
    keep: all
    max_na_years: 10
