id: median-vBF
version: "1.0"
authors: []
date: "2026-04-26"

meta:
  en:
    variable: median-vBF
    unit: "hm^{3}"
    name: Inter-annual median of the annual volume generated by base flow
    description: ""
    method: |
      1. annual aggregation [09-01, 08-31] - sum of volumes discharged each
         day for base flow (Wallingford)
      2. no temporal aggregation - median
    sampling_period: ["09-01", "08-31"]
    classification:
      domain: flow
      phenomenon: baseflow
      aspect: magnitude
      season: annual
      output: scalar

  fr:
    variable: mediane-vQB
    unit: "hm^{3}"
    name: Médiane inter-annuelle du volume annuel généré par les écoulements lents
    description: ""
    method: |
      1. agrégation annuelle [01-09, 31-08] - somme des volumes écoulés chaque
         jour pour le débit de base (Wallingford)
      2. aucune agrégation temporelle - médiane
    sampling_period: ["01-09", "31-08"]
    classification:
      domain: débit
      phenomenon: débit de base
      aspect: intensité
      season: annuelle
      output: scalaire

  global:
    input_vars: Q
    source: >-
      TALLAKSEN, L. et H. VAN LANEN, éd. (2004). Hydrological drought. Processes
      and estimation methods for streamflow and groundwater. Developments in water
      science 48. Netherlands : Elsevier. ISBN : 9780444516886.
    preferred_sampling_period: "09-01"

process:
  P1:
    func:
      vBF: [snowmelt_volume, "Q", {method: Wal}]
    sampling_period: "09-01"
    max_na_pct: 3
    max_na_years: 10

  P2:
    func:
      median-vBF: [nanmedian, "vBF"]
    time_step: none
