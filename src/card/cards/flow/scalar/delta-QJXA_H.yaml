id: delta-QJXA_H
version: "1.0"
authors: []
date: "2026-04-28"

meta:
  en:
    variable: [delta-QJXA_H1, delta-QJXA_H2, delta-QJXA_H3]
    unit: "%"
    name:
      - "Average change of annual maximum daily flow between the near
         horizon and historical period"
      - "Average change of annual maximum daily flow between the middle
         horizon and historical period"
      - "Average change of annual maximum daily flow between the distant
         horizon and historical period"
    description: ""
    method: |
      1. annual aggregation [Month of minimum monthly flows] - maximum
      2. no temporal aggregation - calculation of the average change between
         the historical period and the {horizon} horizon
    horizon_labels: {H1: near, H2: middle, H3: distant}
    sampling_period: Month of minimum monthly flows
    classification:
      domain: flow
      phenomenon: high flows
      aspect: magnitude
      season: annual
      output: scalar

  fr:
    variable: [delta-QJXA_H1, delta-QJXA_H2, delta-QJXA_H3]
    unit: "%"
    name:
      - "Changement moyen du débit journalier maximal annuel entre l'horizon
         proche et la période historique"
      - "Changement moyen du débit journalier maximal annuel entre l'horizon
         moyen et la période historique"
      - "Changement moyen du débit journalier maximal annuel entre l'horizon
         lointain et la période historique"
    description: ""
    method: |
      1. agrégation annuelle [Mois du minimum des débits mensuels] - maximum
      2. aucune agrégation temporelle - calcul du changement moyen entre la
         période historique et l'horizon {horizon}
    horizon_labels: {H1: proche, H2: moyen, H3: lointain}
    sampling_period: Mois du minimum des débits mensuels
    classification:
      domain: débit
      phenomenon: hautes eaux
      aspect: intensité
      season: annuelle
      output: scalaire

  global:
    input_vars: Q
    preferred_sampling_period: "09-01"
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]
    horizons:
      H0: ["1976-01-01", "2005-08-31"]
      H1: ["2021-01-01", "2050-12-31"]
      H2: ["2041-01-01", "2070-12-31"]
      H3: ["2070-01-01", "2099-12-31"]

process:
  P1:
    func:
      QJXA: [nanmax, "Q"]
    sampling_period:
      type: adaptive
      func: [nanmin, "Q"]
    max_na_pct: 3
    max_na_years: 10

  P2:
    func:
      delta-QJXA_H1: [delta, "QJXA", "date",
                      {past: $H0, future: $H1, relative: true}]
      delta-QJXA_H2: [delta, "QJXA", "date",
                      {past: $H0, future: $H2, relative: true}]
      delta-QJXA_H3: [delta, "QJXA", "date",
                      {past: $H0, future: $H3, relative: true}]
    time_step: none
