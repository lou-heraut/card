  P4:
    func:
      startLF: [apply_threshold, "VC10", {lim: upLim, where: "<=", what: first, select: longest}, true]
      centerLF: [apply_threshold, "VC10", {lim: upLim, where: "<=", what: nanargmin, select: longest}, true]
      endLF: [apply_threshold, "VC10", {lim: upLim, where: "<=", what: last, select: longest}, true]
      dtLF: [apply_threshold, "VC10", {lim: upLim, where: "<=", what: length, select: longest}]
      vLF: [deficit_volume, "VC10", {threshold: upLim}]
    sampling_period:
      type: adaptive
      func: [nanmax, "Q"]
    max_na_pct: 3

  P5:
    func:
      delta-startLF_H1: [delta, "startLF", "date", {past: $H0, future: $H1, relative: false}]
      delta-startLF_H2: [delta, "startLF", "date", {past: $H0, future: $H2, relative: false}]
      delta-startLF_H3: [delta, "startLF", "date", {past: $H0, future: $H3, relative: false}]
      delta-centerLF_H1: [delta, "centerLF", "date", {past: $H0, future: $H1, relative: false}]
      delta-centerLF_H2: [delta, "centerLF", "date", {past: $H0, future: $H2, relative: false}]
      delta-centerLF_H3: [delta, "centerLF", "date", {past: $H0, future: $H3, relative: false}]
      delta-endLF_H1: [delta, "endLF", "date", {past: $H0, future: $H1, relative: false}]
      delta-endLF_H2: [delta, "endLF", "date", {past: $H0, future: $H2, relative: false}]
      delta-endLF_H3: [delta, "endLF", "date", {past: $H0, future: $H3, relative: false}]
      delta-dtLF_H1: [delta, "dtLF", "date", {past: $H0, future: $H1, relative: false}]
      delta-dtLF_H2: [delta, "dtLF", "date", {past: $H0, future: $H2, relative: false}]
      delta-dtLF_H3: [delta, "dtLF", "date", {past: $H0, future: $H3, relative: false}]
      delta-vLF_H1: [delta, "vLF", "date", {past: $H0, future: $H1, relative: true}]
      delta-vLF_H2: [delta, "vLF", "date", {past: $H0, future: $H2, relative: true}]
      delta-vLF_H3: [delta, "vLF", "date", {past: $H0, future: $H3, relative: true}]
    time_step: none
