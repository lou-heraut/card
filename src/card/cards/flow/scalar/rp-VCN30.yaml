id: rp-VCN30
version: "1.0"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-07-18"

meta:
  en:
    variable: rp-VCN30
    unit: year
    name: Return period of the station's regulatory threshold discharge with respect to the annual minima of 30-day mean flows
    description: Inverse of the return-level fiches (VCN30-2) - the log-normal law is fitted on the VCN30 series and evaluated at the constant threshold discharge Q_lim given by regulatory texts (e.g. DOE, DCR); a threshold far below the fitted law gives an extrapolated return period, reported as is
    method: |
      1. no temporal aggregation - 30-day centered moving average
      2. annual aggregation [Month of maximum monthly flows] - minimum
      3. no temporal aggregation - return period of the threshold Q_lim with the log-normal distribution
    sampling_period: Month of maximum monthly flows
    classification:
      domain: flow
      phenomenon: low flows
      aspect: frequency
      season: annual
      output: scalar

  fr:
    variable: rp-VCN30
    unit: an
    name: Période de retour du débit seuil réglementaire de la station au regard des minimums annuels des débits moyens sur 30 jours
    description: Inverse des fiches de niveau de retour (VCN30-2) - la loi log-normale est ajustée sur la série des VCN30 puis évaluée au débit seuil constant Q_lim donné par les textes réglementaires (par exemple DOE, DCR) ; un seuil loin du corps de la loi donne une période de retour extrapolée, restituée telle quelle
    method: |
      1. aucune agrégation temporelle - moyenne mobile centrée sur 30 jours
      2. agrégation annuelle [Mois du maximum des débits mensuels] - minimum
      3. aucune agrégation temporelle - période de retour du seuil Q_lim avec la loi log-normale
    sampling_period: Mois du maximum des débits mensuels
    classification:
      domain: débit
      phenomenon: basses eaux
      aspect: fréquence
      season: annuelle
      output: scalaire

  global:
    input_vars: "Q, Q_lim"
    preferred_sampling_period: "01-01"

process:
  P1:
    func:
      VC30: [rollmean_center, "Q", {k: 30}]
    time_step: none
    keep: all
    max_na_years: 10

  P2:
    func:
      VCN30: [nanmin, "VC30"]
      Qlim: [nanmean, "Q_lim"]
    sampling_period:
      type: adaptive
      func: [nanmax, "Q"]
    max_na_pct: 3

  P3:
    func:
      rp-VCN30: [return_period, "VCN30", {threshold: Qlim, water_type: "low"}]
    time_step: none
