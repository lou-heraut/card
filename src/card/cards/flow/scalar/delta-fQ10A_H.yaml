id: delta-fQ10A_H
version: "1.1"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-07-21"

meta:
  en:
    variable: delta-fQ10A
    unit: without unit
    name: "Average change of the annual frequency of exceeding Q10 between the {suffix.name} horizon and historical period"
    description: >-
      Annual frequency of exceeding Q > Q10, where Q10 is the flow exceeded
      10 % of the time, extracted from the ranked flow curve
    method: |
      1. no temporal aggregation - the quantile at the 10 % exceedance
         probability is taken as the threshold
      2. annual aggregation [Month of minimum monthly flows] - ratio of the
         number of days with flow exceeding the threshold to the number of
         days in the year
      3. no temporal aggregation - calculation of the average change between
         the historical period and the {suffix.name} horizon
    suffix_default:
      name: target
    sampling_period: Month of minimum monthly flows
    classification:
      domain: flow
      phenomenon: high flows
      aspect: frequency
      season: annual
      output: scalar

  fr:
    variable: delta-fQ10A
    unit: sans unité
    name: "Changement moyen de la fréquence annuelle de dépassement du Q10 entre l'horizon {suffix.name} et la période historique"
    description: >-
      Fréquence annuelle de dépassement de Q > Q10, Q10 est le débit dépassé
      10 % du temps, extrait de la courbe des débits classés
    method: |
      1. aucune agrégation temporelle - le quantile à la probabilité au
         dépassement de 10 % est pris comme seuil
      2. agrégation annuelle [Mois du minimum des débits mensuels] - rapport
         du nombre de jours où le débit dépasse le seuil par le nombre de
         jours dans l'année
      3. aucune agrégation temporelle - calcul du changement moyen entre la
         période historique et l'horizon {suffix.name}
    suffix_default:
      name: cible
    sampling_period: Mois du minimum des débits mensuels
    classification:
      domain: débit
      phenomenon: hautes eaux
      aspect: fréquence
      season: annuelle
      output: scalaire

  global:
    input_vars: "Q, ref_start, ref_end, horizon_start, horizon_end"
    preferred_sampling_period: "09-01"
    relative: false
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    func:
      lowLim: [exceedance_quantile, "Q", {p: 0.1}]
    time_step: none
    keep: all
    max_na_years: 10

  P2:
    func:
      fQ10A: [exceedance_frequency, "Q", {threshold: lowLim}]
    sampling_period:
      type: adaptive
      func: [nanmin, "Q"]
    max_na_pct: 3

  P3:
    func:
      delta-fQ10A: [delta, "fQ10A", "date", {ref_start: "ref_start", ref_end: "ref_end", horizon_start: "horizon_start", horizon_end: "horizon_end", relative: false}]
    time_step: none
