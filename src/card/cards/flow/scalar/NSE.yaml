id: NSE
version: "1.0"
authors: []
date: "2026-04-26"

meta:
  en:
    variable: NSE
    unit: "without unit"
    name: Nash-Sutcliffe Efficiency
    description: >-
      It measures the proximity between the reference data series and the
      simulated ones, based on the square deviation. The coefficient gives
      strong emphasis on the reconstruction of high values of the examined
      variable.
    method: "1. no temporal aggregation - NSE calculation"
    classification:
      domain: flow
      season: record
      output: scalar
      purpose: model performance

  fr:
    variable: NSE
    unit: "sans unité"
    name: Coefficient d'efficience de Nash-Sutcliffe
    description: >-
      Il mesure la proximité entre les séries de données de référence et
      celles simulées, sur la base de l'écart quadratique. Le coefficient
      donne un poids fort à la reconstitution des valeurs fortes de la
      variable examinée.
    method: "1. aucune agrégation temporelle - calcul du NSE"
    classification:
      domain: débit
      season: chronique
      output: scalaire
      purpose: performance de modèle

  global:
    input_vars: "Q_obs, Q_sim"
    source: |
      NASH, J. E. et J. V. SUTCLIFFE (1970). « River flow forecasting through conceptual models
      part I — A discussion of principles ». In : Journal of Hydrology 10.3, p. 282-290.
      DOI : 10.1016/0022-1694(70)90255-6.
    relative: false

process:
  P1:
    func:
      NSE: [NSE, "Q_obs", "Q_sim"]
    time_step: none
    max_na_years: 10
