id: alpha-QA
version: "1.0"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-04-26"

meta:
  en:
    variable: [alpha-QA, hyp-alpha-QA]
    unit: ["m^{3}.s^{-1}.year^{-1}", bool]
    name:
      - "Sen's slope of the series of annual mean daily flows"
      - "Mann-Kendall test result on the series of annual mean daily flows"
    description: ""
    method: |
      1. annual aggregation [09-01, 08-31] - mean
      2. no temporal aggregation - Sen's slope of the series where the
         Mann-Kendall test is significant at a 10 % risk level
    sampling_period: ["09-01", "08-31"]
    classification:
      domain: flow
      phenomenon: mean flows
      aspect: magnitude
      season: annual
      output: scalar

  fr:
    variable: [alpha-QA, hyp-alpha-QA]
    unit: ["m^{3}.s^{-1}.an^{-1}", bool]
    name:
      - "Pente de Sen de la série des débits moyens annuels"
      - "Résultat du test de Mann-Kendall sur la série des débits moyens
         annuels"
    description: ""
    method: |
      1. agrégation annuelle [01-09, 31-08] - moyenne
      2. aucune agrégation temporelle - pente de Sen de la série dont le
         test de Mann-Kendall est significatif à un risque de 10 %
    sampling_period: ["01-09", "31-08"]
    classification:
      domain: débit
      phenomenon: moyennes eaux
      aspect: intensité
      season: annuelle
      output: scalaire

  global:
    input_vars: Q
    source: |
      KENDALL, M. G. (1975). « Rank Correlation Methods ». Griffin, London, UK.
      MANN, H. (1945). « Nonparametric tests against trend ». Econometrica, 13(3):245–259.
      SEN, P. K. (1968). « Estimates of the regression coefficient based on Kendall's tau ».
      In : Journal of the American Statistical Association 63, p. 1379-1389. DOI : doi:10.2307/2285891.
    preferred_sampling_period: "09-01"
    relative: [true, false]

process:
  P1:
    func:
      QA: [nanmean, "Q"]
    sampling_period: "09-01"
    max_na_pct: 3
    max_na_years: 10

  P2:
    func:
      alpha-QA:     [mannkendall_slope, "QA", {level: 0.1}]
      hyp-alpha-QA: [mannkendall_test,     "QA", {level: 0.1}]
    time_step: none
