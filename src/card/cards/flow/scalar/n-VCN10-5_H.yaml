id: n-VCN10-5_H
version: "1.1.0"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-07-21"

meta:
  en:
    variable: n-VCN10-5
    unit: without unit
    name: "Number of years in the {suffix.name} horizon where VCN10 is below or equal to VCN10-5 from the historical period"
    description: ""
    method: |
      1. no temporal aggregation - 10-day centered moving average
      2. annual aggregation [Month of maximum monthly flows] - minimum (VCN10)
      3. no temporal aggregation - calculation of the 5-year return period flow with the log-normal distribution from the historical period (VCN10-5)
      4. no temporal aggregation - counting the number of VCN10 in the {suffix.name} horizon below or equal to VCN10-5
    sampling_period: Month of maximum monthly flows
    classification:
      domain: flow
      phenomenon: low flows
      aspect: frequency
      season: annual
      output: scalar
    suffix_default:
      name: target

  fr:
    variable: nVCN10-5
    unit: sans unité
    name: "Nombre d'années de l'horizon {suffix.name} où le VCN10 est inférieur ou égal au VCN10-5 de la période historique"
    description: ""
    method: |
      1. aucune agrégation temporelle - moyenne mobile centrée sur 10 jours
      2. agrégation annuelle [Mois du maximum des débits mensuels] - minimum (VCN10)
      3. aucune agrégation temporelle - calcul du débit de période de retour 5 ans avec la loi log-normal sur la période historique (VCN10-5)
      4. aucune agrégation temporelle - décompte du nombre de VCN10 de l'horizon {suffix.name} inférieurs ou égaux au VCN10-5
    sampling_period: Mois du maximum des débits mensuels
    classification:
      domain: débit
      phenomenon: basses eaux
      aspect: fréquence
      season: annuelle
      output: scalaire
    suffix_default:
      name: cible

  global:
    input_vars: "Q, ref_start, ref_end, horizon_start, horizon_end"
    preferred_sampling_period: "01-01"
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    func:
      VC10: [rollmean_center, "Q", {k: 10}]
    time_step: none
    keep: all
    max_na_years: 10

  P2:
    func:
      VCN10: [nanmin, "VC10"]
    sampling_period:
      type: adaptive
      func: [nanmax, "Q"]
    max_na_pct: 3

  P3:
    func:
      VCN10-5: [return_level, "VCN10", {return_period: 5, water_type: "low", dates: "date", period_start: "ref_start", period_end: "ref_end"}]
    time_step: none
    keep: all

  P4:
    func:
      n-VCN10-5: [apply_threshold, "VCN10", {lim: VCN10-5, where: "<=", what: length, select: all, dates: "date", period_start: "horizon_start", period_end: "horizon_end"}]
    time_step: none
