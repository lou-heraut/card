id: QJXA-10
version: "1.0"
authors: []
date: "2026-04-28"

meta:
  en:
    variable: QJXA-10
    unit: "m^{3}.s^{-1}"
    name: "Annual maximum daily flow with a 10-year return period"
    description: ""
    method: |
      1. annual aggregation [Month of minimum monthly flows] - maximum
         (extraction from the QJXA series)
      2. no temporal aggregation - calculation of the flow with a 10-year
         return period using the Gumbel distribution
    sampling_period: Month of minimum monthly flows
    classification:
      domain: flow
      phenomenon: high flows
      aspect: magnitude
      season: annual
      output: scalar

  fr:
    variable: QJXA-10
    unit: "m^{3}.s^{-1}"
    name: "Débit journalier maximal annuel de période de retour 10 ans"
    description: ""
    method: |
      1. agrégation annuelle [Mois du minimum des débits mensuels] - maximum
         (extraction de la série des QJXA)
      2. aucune agrégation temporelle - calcul du débit de période de retour
         10 ans avec la loi de Gumbel
    sampling_period: Mois du minimum des débits mensuels
    classification:
      domain: débit
      phenomenon: hautes eaux
      aspect: intensité
      season: annuelle
      output: scalaire

  global:
    input_vars: Q
    preferred_sampling_period: "09-01"
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    func:
      QJXA: [nanmax, "Q"]
    sampling_period:
      type: adaptive
      func: [nanmin, "Q"]
    max_na_pct: 3
    max_na_years: 10

  P2:
    func:
      QJXA-10: [return_level, "QJXA", {return_period: 10, water_type: "high"}]
    time_step: none
