id: delta-QMNA_summer_H
version: "1.1"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-07-21"

meta:
  en:
    variable: delta-QMNA_summer
    unit: "%"
    name: "Average change of summer minimum of monthly flows between the {suffix.name} horizon and historical period"
    description: ""
    method: |
      1. monthly aggregation - mean
      2. annual aggregation [05-01, 11-30] - minimum
      3. no temporal aggregation - calculation of the average change between the historical period and the {suffix.name} horizon
    sampling_period: ["05-01", "11-30"]
    classification:
      domain: flow
      phenomenon: low flows
      aspect: magnitude
      season: summer
      output: scalar
    suffix_default:
      name: target

  fr:
    variable: delta-QMNA_été
    unit: "%"
    name: "Changement moyen du minimum estival des débits mensuels entre l'horizon {suffix.name} et la période historique"
    description: ""
    method: |
      1. agrégation mensuelle - moyenne
      2. agrégation annuelle [01-05, 30-11] - minimum
      3. aucune agrégation temporelle - calcul du changement moyen entre la période historique et l'horizon {suffix.name}
    sampling_period: ["01-05", "30-11"]
    classification:
      domain: débit
      phenomenon: basses eaux
      aspect: intensité
      season: estivale
      output: scalaire
    suffix_default:
      name: cible

  global:
    input_vars: "Q, ref_start, ref_end, horizon_start, horizon_end"
    preferred_sampling_period: "01-01"
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    func:
      QMA_summer: [nanmean, "Q"]
    time_step: year-month
    max_na_pct: 3
    max_na_years: 10
    keep: all

  P2:
    func:
      QMNA_summer: [nanmin, "QMA_summer"]
    sampling_period: ["05-01", "11-30"]
    max_na_pct: 3

  P3:
    func:
      delta-QMNA_summer: [delta, "QMNA_summer", "date", {ref_start: "ref_start", ref_end: "ref_end", horizon_start: "horizon_start", horizon_end: "horizon_end", relative: true}]
    time_step: none
