id: delta-Q95A_H
version: "1.0"
authors: []
date: "2026-04-28"

meta:
  en:
    variable: [delta-Q95A_H1, delta-Q95A_H2, delta-Q95A_H3]
    unit: "%"
    name:
      - Average change of the daily flow exceeded 95 % of the time within the year between the near horizon and historical period
      - Average change of the daily flow exceeded 95 % of the time within the year between the middle horizon and historical period
      - Average change of the daily flow exceeded 95 % of the time within the year between the distant horizon and historical period
    description: Annual flow with an exceedance probability of 95 % (5th percentile)
    method: |
      1. annual aggregation [01-01, 12-31] - quantile at the exceedance probability of 95 %
      2. no temporal aggregation - calculation of the average change between the historical period and the {horizon} horizon
    horizon_labels: {H1: near, H2: middle, H3: distant}
    sampling_period: ["01-01", "12-31"]
    classification:
      domain: flow
      phenomenon: low flows
      aspect: magnitude
      season: annual
      output: scalar

  fr:
    variable: [delta-Q95A_H1, delta-Q95A_H2, delta-Q95A_H3]
    unit: "%"
    name:
      - Changement moyen du débit journalier dépassé 95 % du temps de l'année entre l'horizon proche et la période historique
      - Changement moyen du débit journalier dépassé 95 % du temps de l'année entre l'horizon moyen et la période historique
      - Changement moyen du débit journalier dépassé 95 % du temps de l'année entre l'horizon lointain et la période historique
    description: Débit annuel avec une probabilité de dépassement de 95 % (centile 5 %)
    method: |
      1. agrégation annuelle [01-01, 31-12] - quantile à la probabilité au dépassement de 95 %
      2. aucune agrégation temporelle - calcul du changement moyen entre la période historique et l'horizon {horizon}
    horizon_labels: {H1: proche, H2: moyen, H3: lointain}
    sampling_period: ["01-01", "31-12"]
    classification:
      domain: débit
      phenomenon: basses eaux
      aspect: intensité
      season: annuelle
      output: scalaire

  global:
    input_vars: Q
    preferred_sampling_period: "01-01"
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]
    horizons:
      H0: ["1976-01-01", "2005-08-31"]
      H1: ["2021-01-01", "2050-12-31"]
      H2: ["2041-01-01", "2070-12-31"]
      H3: ["2070-01-01", "2099-12-31"]

process:
  P1:
    func:
      Q95A: [exceedance_quantile, "Q", {p: 0.95}]
    sampling_period: "01-01"
    max_na_pct: 3
    max_na_years: 10

  P2:
    func:
      delta-Q95A_H1: [delta, "Q95A", "date", {past: $H0, future: $H1, relative: true}]
      delta-Q95A_H2: [delta, "Q95A", "date", {past: $H0, future: $H2, relative: true}]
      delta-Q95A_H3: [delta, "Q95A", "date", {past: $H0, future: $H3, relative: true}]
    time_step: none
