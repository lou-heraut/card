id: epsilon_R_season
version: "1.0"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-04-26"

meta:
  en:
    variable: [epsilon_R_DJF, epsilon_R_MAM, epsilon_R_JJA, epsilon_R_SON]
    unit: without unit
    name:
      - Winter flow elasticity to precipitation
      - Spring flow elasticity to precipitation
      - Summer flow elasticity to precipitation
      - Autumn flow elasticity to precipitation
    description:
      - "Months of December, January, and February"
      - "Months of March, April, and May"
      - "Months of June, July, and August"
      - "Months of September, October, and November"
    method:
      - "1. seasonal annual aggregation [12-01, 02-28(29)] - mean flow and mean total precipitation\n2. no temporal aggregation - calculation of elasticity ε"
      - "1. seasonal annual aggregation [03-01, 05-31] - mean flow and mean total precipitation\n2. no temporal aggregation - calculation of elasticity ε"
      - "1. seasonal annual aggregation [06-01, 08-31] - mean flow and mean total precipitation\n2. no temporal aggregation - calculation of elasticity ε"
      - "1. seasonal annual aggregation [09-01, 11-30] - mean flow and mean total precipitation\n2. no temporal aggregation - calculation of elasticity ε"
    sampling_period:
      - ["12-01", "02-28(29)"]
      - ["03-01", "05-31"]
      - ["06-01", "08-31"]
      - ["09-01", "11-30"]
    classification:
      domain: [flow, precipitation]
      season: by season
      output: scalar
      purpose: climate sensitivity

  fr:
    variable: [epsilon_R_DJF, epsilon_R_MAM, epsilon_R_JJA, epsilon_R_SON]
    unit: sans unité
    name:
      - Élasticité hivernale du débit aux précipitations
      - Élasticité printanière du débit aux précipitations
      - Élasticité estivale du débit aux précipitations
      - Élasticité automnale du débit aux précipitations
    description:
      - "Mois de décembre, janvier et février"
      - "Mois de mars, avril et mai"
      - "Mois de juin, juillet et août"
      - "Mois de septembre, octobre et novembre"
    method:
      - "1. agrégation annuelle saisonnalisée [01-12, 28(29)-02] - débit moyen et précipitations totales moyennes\n2. aucune agrégation temporelle - calcul de l'élasticité ε"
      - "1. agrégation annuelle saisonnalisée [01-03, 31-05] - débit moyen et précipitations totales moyennes\n2. aucune agrégation temporelle - calcul de l'élasticité ε"
      - "1. agrégation annuelle saisonnalisée [01-06, 31-08] - débit moyen et précipitations totales moyennes\n2. aucune agrégation temporelle - calcul de l'élasticité ε"
      - "1. agrégation annuelle saisonnalisée [01-09, 30-11] - débit moyen et précipitations totales moyennes\n2. aucune agrégation temporelle - calcul de l'élasticité ε"
    sampling_period:
      - ["01-12", "28(29)-02"]
      - ["01-03", "31-05"]
      - ["01-06", "31-08"]
      - ["01-09", "30-11"]
    classification:
      domain: [débit, précipitations]
      season: par saison
      output: scalaire
      purpose: sensibilité climatique

  global:
    input_vars: "Q, R"
    source: |
      SANKARASUBRAMANIAN, A., R. M. VOGEL et J. F. LIMBRUNNER (1991). « Climate elasticity of streamflow in the United States ». In : Water Resour. Res. 37, p. 1771-1781.

process:
  P1:
    func:
      QA: [nanmean, "Q"]
      RA: [nanmean, "R"]
    time_step: year-season
    seasons: [DJF, MAM, JJA, SON]
    max_na_pct: 3
    max_na_years: 10
    compress: true
  P2:
    func:
      epsilon_R_DJF: [elasticity, {Q: "QA_DJF", X: "RA_DJF"}]
      epsilon_R_MAM: [elasticity, {Q: "QA_MAM", X: "RA_MAM"}]
      epsilon_R_JJA: [elasticity, {Q: "QA_JJA", X: "RA_JJA"}]
      epsilon_R_SON: [elasticity, {Q: "QA_SON", X: "RA_SON"}]
    time_step: none
