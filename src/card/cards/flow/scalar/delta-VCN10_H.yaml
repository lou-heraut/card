id: delta-VCN10_H
version: "1.1"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-07-21"

meta:
  en:
    variable: delta-VCN10
    unit: "%"
    name:
      - Average change of annual minimum of 10-day mean daily discharge between the near horizon and historical period
      - Average change of annual minimum of 10-day mean daily discharge between the middle horizon and historical period
      - Average change of annual minimum of 10-day mean daily discharge between the distant horizon and historical period
    description: ""
    method: |
      1. no temporal aggregation - 10-day centered moving average
      2. annual aggregation [Month of maximum monthly flows] - minimum
      3. no temporal aggregation - calculation of the average change between the historical period and the {suffix.name} horizon
    suffix_default:
      name: target
    sampling_period: Month of maximum monthly flows
    classification:
      domain: flow
      phenomenon: low flows
      aspect: magnitude
      season: annual
      output: scalar

  fr:
    variable: delta-VCN10
    unit: "%"
    name:
      - Changement moyen du minimum annuel de la moyenne sur 10 jours du débit journalier entre l'horizon proche et la période historique
      - Changement moyen du minimum annuel de la moyenne sur 10 jours du débit journalier entre l'horizon moyen et la période historique
      - Changement moyen du minimum annuel de la moyenne sur 10 jours du débit journalier entre l'horizon lointain et la période historique
    description: ""
    method: |
      1. aucune agrégation temporelle - moyenne mobile centrée sur 10 jours
      2. agrégation annuelle [Mois du maximum des débits mensuels] - minimum
      3. aucune agrégation temporelle - calcul du changement moyen entre la période historique et l'horizon {suffix.name}
    suffix_default:
      name: cible
    sampling_period: Mois du maximum des débits mensuels
    classification:
      domain: débit
      phenomenon: basses eaux
      aspect: intensité
      season: annuelle
      output: scalaire

  global:
    input_vars: "Q, ref_start, ref_end, horizon_start, horizon_end"
    preferred_sampling_period: "01-01"
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    func:
      VC10: [rollmean_center, "Q", {k: 10}]
    time_step: none
    keep: all
    max_na_years: 10

  P2:
    func:
      VCN10: [nanmin, "VC10"]
    sampling_period:
      type: adaptive
      func: [nanmax, "Q"]
    max_na_pct: 3

  P3:
    func:
      delta-VCN10: [delta, "VCN10", "date", {ref_start: "ref_start", ref_end: "ref_end", horizon_start: "horizon_start", horizon_end: "horizon_end", relative: true}]
    time_step: none
