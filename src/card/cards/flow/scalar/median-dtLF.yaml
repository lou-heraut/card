id: median-dtLF
version: "1.0"
authors: []
date: "2026-04-30"

meta:
  en:
    variable: median-dtLF
    unit: day
    name: Inter-annual median of the duration of low flows
    description: Median of the durations of the longest continuous period with 10-day mean flows below the maximum of VCN10
    method: |
      1. no temporal aggregation - 10-day centered moving average
      2. annual aggregation [Month of maximum monthly flows] - minimum (extraction from the series of VCN10)
      3. no temporal aggregation - the maximum of the series of VCN10 is taken as the threshold
      4. annual aggregation [Month of maximum monthly flows] - number of days in the longest period below the previous threshold
      5. no temporal aggregation - median
    sampling_period: Month of maximum monthly flows
    classification:
      domain: flow
      phenomenon: low flows
      aspect: duration
      season: annual
      output: scalar

  fr:
    variable: mediane-dtBE
    unit: jour
    name: Médiane inter-annuelle de la durée des basses eaux
    description: Médiane des durées de la plus longue période continue de la moyenne sur 10 jours sous le maximum des VCN10
    method: |
      1. aucune agrégation temporelle - moyenne mobile centrée sur 10 jours
      2. agrégation annuelle [Mois du maximum des débits mensuels] - minimum (extraction de la série des VCN10)
      3. aucune agrégation temporelle - le maximum de la série des VCN10 est pris comme seuil
      4. agrégation annuelle [Mois du maximum des débits mensuels] - nombre de jours de la plus longue période sous le précédent seuil
      5. aucune agrégation temporelle - médiane
    sampling_period: Mois du maximum des débits mensuels
    classification:
      domain: débit
      phenomenon: basses eaux
      aspect: durée
      season: annuelle
      output: scalaire

  global:
    input_vars: Q
    preferred_sampling_period: "01-01"
    relative: false

process:
  P1:
    func:
      VC10: [rollmean_center, "Q", {k: 10}]
    time_step: none
    keep: all

  P2:
    func:
      VCN10: [nanmin, "VC10"]
    sampling_period:
      type: adaptive
      func: [nanmax, "Q"]
    max_na_pct: 3
    max_na_years: 10
    keep: all

  P3:
    func:
      upLim: [nanmax, "VCN10"]
    time_step: none
    keep: all

  P4:
    func:
      dtLF: [apply_threshold, "VC10", {lim: upLim, where: "<=", what: length, select: longest}]
    sampling_period:
      type: adaptive
      func: [nanmax, "Q"]
    max_na_pct: 3

  P5:
    func:
      median-dtLF: [nanmedian, "dtLF"]
    time_step: none
