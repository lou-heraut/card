id: delta-centerLF_H
version: "1.0"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-04-28"

meta:
  en:
    variable: [delta-centerLF_H1, delta-centerLF_H2, delta-centerLF_H3]
    unit: day
    name:
      - Average change of the center of low flows between the near horizon and historical period
      - Average change of the center of low flows between the middle horizon and historical period
      - Average change of the center of low flows between the distant horizon and historical period
    description: Date of the minimal 10-day mean flow value below the threshold set at the maximum of VCN10
    method: |
      1. no temporal aggregation - 10-day centered moving average (series of VC10)
      2. annual aggregation [Month of maximum monthly flows] - minimum (series of VCN10)
      3. no temporal aggregation - the maximum of the previous series is taken as the threshold
      4. annual aggregation [Month of maximum monthly flows] - date of the minimum of the VC10 of the longest period below the previous threshold
      5. no temporal aggregation - calculation of the average change between the historical period and the {horizon} horizon
    horizon_labels: {H1: near, H2: middle, H3: distant}
    sampling_period: Month of maximum monthly flows
    classification:
      domain: flow
      phenomenon: low flows
      aspect: timing
      season: annual
      output: scalar

  fr:
    variable: [delta-centreBE_H1, delta-centreBE_H2, delta-centreBE_H3]
    unit: jour
    name:
      - Changement moyen du centre des basses eaux entre l'horizon proche et la période historique
      - Changement moyen du centre des basses eaux entre l'horizon moyen et la période historique
      - Changement moyen du centre des basses eaux entre l'horizon lointain et la période historique
    description: Date de la valeur minimale des débits moyens sur 10 jours sous le seuil fixé au maximum des VCN10
    method: |
      1. aucune agrégation temporelle - moyenne mobile centrée sur 10 jours (série des VC10)
      2. agrégation annuelle [Mois du maximum des débits mensuels] - minimum (série des VCN10)
      3. aucune agrégation temporelle - le maximum de la précédente série est pris comme seuil
      4. agrégation annuelle [Mois du maximum des débits mensuels] - date du minimum des VC10 de la plus longue période sous le précédent seuil
      5. aucune agrégation temporelle - calcul du changement moyen entre la période historique et l'horizon {horizon}
    horizon_labels: {H1: proche, H2: moyen, H3: lointain}
    sampling_period: Mois du maximum des débits mensuels
    classification:
      domain: débit
      phenomenon: basses eaux
      aspect: saisonnalité
      season: annuelle
      output: scalaire

  global:
    input_vars: Q
    preferred_sampling_period: "01-01"
    is_date: true
    relative: false
    palette: ["#60265e", "#893687", "#c05fbe", "#dba3da", "#edd1ec",
              "#f6ddd3", "#edbaa7", "#e08765", "#CD5629", "#8f3c1d"]
    horizons:
      H0: ["1976-01-01", "2005-08-31"]
      H1: ["2021-01-01", "2050-12-31"]
      H2: ["2041-01-01", "2070-12-31"]
      H3: ["2070-01-01", "2099-12-31"]

process:
  P1:
    func:
      VC10: [rollmean_center, "Q", {k: 10}]
    time_step: none
    keep: all

  P2:
    func:
      VCN10: [nanmin, "VC10"]
    sampling_period:
      type: adaptive
      func: [nanmax, "Q"]
    max_na_pct: 3
    max_na_years: 10
    keep: all

  P3:
    func:
      upLim: [nanmax, "VCN10"]
    time_step: none
    keep: all

  P4:
    func:
      centerLF: [apply_threshold, "VC10", {lim: upLim, where: "<=", what: nanargmin, select: longest}, true]
    sampling_period:
      type: adaptive
      func: [nanmax, "Q"]
    max_na_pct: 3

  P5:
    func:
      delta-centerLF_H1: [delta, "centerLF", "date", {past: $H0, future: $H1, relative: false}]
      delta-centerLF_H2: [delta, "centerLF", "date", {past: $H0, future: $H2, relative: false}]
      delta-centerLF_H3: [delta, "centerLF", "date", {past: $H0, future: $H3, relative: false}]
    time_step: none
