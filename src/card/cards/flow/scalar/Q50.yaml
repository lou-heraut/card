id: Q50
version: "1.0"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-04-26"

meta:
  en:
    variable: Q50
    unit: "m^{3}.s^{-1}"
    name: Median of daily flows (whole record)
    description: "Flow with an exceedance probability of 50 %"
    method: "1. no temporal aggregation - quantile at the exceedance probability of 50 %"
    classification:
      domain: flow
      phenomenon: mean flows
      aspect: magnitude
      season: record
      output: scalar

  fr:
    variable: Q50
    unit: "m^{3}.s^{-1}"
    name: Médiane des débits journaliers (chronique entière)
    description: "Débit avec une probabilité de dépassement de 50 %"
    method: "1. aucune agrégation temporelle - quantile à la probabilité de dépassement de 50 %"
    classification:
      domain: débit
      phenomenon: moyennes eaux
      aspect: intensité
      season: chronique
      output: scalaire

  global:
    input_vars: Q
    preferred_sampling_period: "01-01"

process:
  P1:
    func:
      Q50: [exceedance_quantile, "Q", {p: 0.5}]
    time_step: none
    max_na_years: 10
