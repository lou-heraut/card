id: delta-startBF_H
version: "1.1"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-07-21"

meta:
  en:
    variable: delta-startBF
    unit: day
    name: "Average change of the start of low flows between the {suffix.name} horizon and historical period"
    description: >-
      Date when 10 % of the annual cumulative baseflow is reached
    method: |
      1. annual aggregation [09-01, 08-31] - date when the baseflow (Wallingford)
         sum corresponds to 10 % of the total sum
      2. no temporal aggregation - calculation of the average change between the
         historical period and the {suffix.name} horizon
    suffix_default:
      name: target
    sampling_period: ["09-01", "08-31"]
    classification:
      domain: flow
      phenomenon: baseflow
      aspect: timing
      season: annual
      output: scalar

  fr:
    variable: delta-debutQB
    unit: jour
    name: "Changement moyen du début des écoulements lents entre l'horizon {suffix.name} et la période historique"
    description: >-
      Date à laquelle 10 % du cumul annuel du débit de base sont atteints
    method: |
      1. agrégation annuelle [01-09, 31-08] - date à laquelle la somme du débit
         de base (Wallingford) correspond à 10 % de la somme totale
      2. aucune agrégation temporelle - calcul du changement moyen entre la
         période historique et l'horizon {suffix.name}
    suffix_default:
      name: cible
    sampling_period: ["01-09", "31-08"]
    classification:
      domain: débit
      phenomenon: débit de base
      aspect: saisonnalité
      season: annuelle
      output: scalaire

  global:
    input_vars: "Q, ref_start, ref_end, horizon_start, horizon_end"
    source: >-
      TALLAKSEN, L. et H. VAN LANEN, éd. (2004). Hydrological drought. Processes
      and estimation methods for streamflow and groundwater. Developments in water
      science 48. Netherlands : Elsevier. ISBN : 9780444516886.
    preferred_sampling_period: "09-01"
    is_date: true
    relative: false
    palette: ["#60265e", "#893687", "#c05fbe", "#dba3da", "#edd1ec",
              "#f6ddd3", "#edbaa7", "#e08765", "#CD5629", "#8f3c1d"]

process:
  P1:
    func:
      startBF: [snowmelt_timing, "Q", {fraction: 0.1, method: Wal}, true]
    sampling_period: "09-01"
    max_na_pct: 3
    max_na_years: 10

  P2:
    func:
      delta-startBF: [delta, "startBF", "date", {ref_start: "ref_start", ref_end: "ref_end", horizon_start: "horizon_start", horizon_end: "horizon_end", relative: false}]
    time_step: none
