id: median-startBF
version: "1.0.1"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-07-18"

meta:
  en:
    variable: median-startBF
    unit: yearday
    name: Inter-annual median of the start of baseflow
    description: >-
      Median of the dates at which 10 % of the annual cumulative baseflow
      is reached
    method: |
      1. annual aggregation [09-01, 08-31] - date at which the baseflow
         (Wallingford) sum corresponds to 10 % of the total sum
      2. no temporal aggregation - median
    sampling_period: ["09-01", "08-31"]
    classification:
      domain: flow
      phenomenon: baseflow
      aspect: timing
      season: annual
      output: scalar

  fr:
    variable: mediane-debutQB
    unit: "jour de l'année"
    name: Médiane inter-annuelle du début des écoulements lents
    description: >-
      Médiane des dates à laquelle 10 % du cumul annuel du débit de base
      sont atteints
    method: |
      1. agrégation annuelle [01-09, 31-08] - date à laquelle la somme du
         débit de base (Wallingford) correspond à 10 % de la somme totale
      2. aucune agrégation temporelle - médiane
    sampling_period: ["01-09", "31-08"]
    classification:
      domain: débit
      phenomenon: débit de base
      aspect: saisonnalité
      season: annuelle
      output: scalaire

  global:
    input_vars: Q
    source: >-
      TALLAKSEN, L. et H. VAN LANEN, éd. (2004). Hydrological drought. Processes
      and estimation methods for streamflow and groundwater. Developments in water
      science 48. Netherlands : Elsevier. ISBN : 9780444516886.
    preferred_sampling_period: "09-01"
    is_date: true
    relative: false
    palette: ["#60265e", "#893687", "#c05fbe", "#dba3da", "#edd1ec",
              "#f6ddd3", "#edbaa7", "#e08765", "#CD5629", "#8f3c1d"]

process:
  P1:
    func:
      startBF: [snowmelt_timing, "Q", {fraction: 0.1, method: Wal}, true]
    sampling_period: "09-01"
    max_na_pct: 3
    max_na_years: 10

  P2:
    func:
      median-startBF: [circular_median, "startBF", {periodicity: 365.25}]
    time_step: none
