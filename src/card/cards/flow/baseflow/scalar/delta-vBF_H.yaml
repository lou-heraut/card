id: delta-vBF_H
version: "1.1"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-07-21"

meta:
  en:
    variable: delta-vBF
    unit: "%"
    name: "Average change of annual volume generated by the baseflow between the {suffix.name} horizon and historical period"
    description: ""
    method: |
      1. annual aggregation [09-01, 08-31] - sum of volumes discharged each day
         for base flow (Wallingford)
      2. no temporal aggregation - calculation of the average change between the
         historical period and the {suffix.name} horizon
    suffix_default:
      name: target
    sampling_period: ["09-01", "08-31"]
    classification:
      domain: flow
      phenomenon: baseflow
      aspect: magnitude
      season: annual
      output: scalar

  fr:
    variable: delta-vQB
    unit: "%"
    name: "Changement moyen du volume annuel généré par le débit de base entre l'horizon {suffix.name} et la période historique"
    description: ""
    method: |
      1. agrégation annuelle [01-09, 31-08] - somme des volumes écoulés chaque
         jour pour le débit de base (Wallingford)
      2. aucune agrégation temporelle - calcul du changement moyen entre la
         période historique et l'horizon {suffix.name}
    suffix_default:
      name: cible
    sampling_period: ["01-09", "31-08"]
    classification:
      domain: débit
      phenomenon: débit de base
      aspect: intensité
      season: annuelle
      output: scalaire

  global:
    input_vars: "Q, ref_start, ref_end, horizon_start, horizon_end"
    source: >-
      TALLAKSEN, L. et H. VAN LANEN, éd. (2004). Hydrological drought. Processes
      and estimation methods for streamflow and groundwater. Developments in water
      science 48. Netherlands : Elsevier. ISBN : 9780444516886.
    preferred_sampling_period: "09-01"
    palette: ["#003C30", "#01665E", "#35978F", "#80CDC1", "#C7EAE5",
              "#F6E8C3", "#DFC27D", "#BF812D", "#8C510A", "#543005"]

process:
  P1:
    func:
      vBF: [snowmelt_volume, "Q", {method: Wal}]
    sampling_period: "09-01"
    max_na_pct: 3
    max_na_years: 10

  P2:
    func:
      delta-vBF: [delta, "vBF", "date", {ref_start: "ref_start", ref_end: "ref_end", horizon_start: "horizon_start", horizon_end: "horizon_end", relative: true}]
    time_step: none
