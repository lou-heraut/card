id: median-QJ_H2
version: "1.0"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-04-30"

meta:
  en:
    variable: median-QJ_H2
    unit: "m^{3}.s^{-1}"
    name: Median inter-annual flow of middle horizon
    description: ""
    method: "1. aggregation by day of the year over the middle horizon [2041-01-01, 2070-12-31] - median"
    classification:
      domain: flow
      phenomenon: mean flows
      aspect: magnitude
      season: record
      output: curve

  fr:
    variable: mediane-QJ_H2
    unit: "m^{3}.s^{-1}"
    name: "Débit médian inter-annuel de l'horizon moyen"
    description: ""
    method: "1. agrégation par jour de l'année sur l'horizon moyen [2041-01-01, 2070-12-31] - médiane"
    classification:
      domain: débit
      phenomenon: moyennes eaux
      aspect: intensité
      season: chronique
      output: courbe

  global:
    input_vars: Q

process:
  P1:
    func:
      median-QJ_H2: [nanmedian, "Q"]
    period: ["2041-01-01", "2070-12-31"]
    time_step: yearday
