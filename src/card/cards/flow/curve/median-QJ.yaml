id: median-QJ
version: "1.0"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-04-30"

meta:
  en:
    variable: median-QJ
    unit: "m^{3}.s^{-1}"
    name: Median inter-annual flow
    description: ""
    method: "1. aggregation by day of the year - median"
    classification:
      domain: flow
      phenomenon: mean flows
      aspect: magnitude
      season: record
      output: curve

  fr:
    variable: mediane-QJ
    unit: "m^{3}.s^{-1}"
    name: Débit médian inter-annuel
    description: ""
    method: "1. agrégation par jour de l'année - médiane"
    classification:
      domain: débit
      phenomenon: moyennes eaux
      aspect: intensité
      season: chronique
      output: courbe

  global:
    input_vars: Q

process:
  P1:
    func:
      median-QJ: [nanmedian, "Q"]
    time_step: yearday
