id: median-QJC5
version: "1.0"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-04-26"

meta:
  en:
    variable: median-QJC5
    unit: "m^{3}.s^{-1}"
    name: Inter-annual median daily flow regime smoothed over 5 days
    description: >-
      Median flow of each day of the year over the whole record, then
      5-day centered moving average (365 values)
    method: |
      1. aggregation by day of the year - median
      2. no temporal aggregation - 5-day centered moving average
    classification:
      domain: flow
      phenomenon: mean flows
      aspect: magnitude
      season: record
      output: curve

  fr:
    variable: mediane-QJC5
    unit: "m^{3}.s^{-1}"
    name: Régime journalier médian inter-annuel lissé sur 5 jours
    description: >-
      Médiane des débits de chaque jour de l'année sur l'ensemble de la
      chronique, puis moyenne mobile centrée sur 5 jours (365 valeurs)
    method: |
      1. agrégation par jour de l'année - médiane
      2. aucune agrégation temporelle - moyenne mobile centrée sur 5 jours
    classification:
      domain: débit
      phenomenon: moyennes eaux
      aspect: intensité
      season: chronique
      output: courbe

  global:
    input_vars: Q

process:
  P1:
    func:
      median-QJ: [nanmedian, "Q"]
    time_step: yearday

  P2:
    func:
      median-QJC5: [rollmean_center, "median-QJ", {k: 5, cyclical: true}]
    time_step: none
    keep: all
