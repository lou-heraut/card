id: FDC_H1
version: "1.0.1"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-07-18"

meta:
  en:
    variable: FDC_H1
    unit: "m^{3}.s^{-1}"
    name: Flow duration curve of the near horizon
    description: >-
      Curve of flow quantiles as a function of exceedance probability over the near horizon [2021-01-01, 2050-12-31];
      the card outputs its two coordinates (FDC_H1_p, unitless
      probabilities; FDC_H1_Q, flow quantiles)
    method: "1. no temporal aggregation - flow duration curves with 1000 points spaced according to a centered reduced normal distribution."
    classification:
      domain: flow
      phenomenon: mean flows
      aspect: magnitude
      season: record
      output: curve

  fr:
    variable: CDC_H1
    unit: "m^{3}.s^{-1}"
    name: Courbe des débits classés de l'horizon proche
    description: >-
      Courbe des quantiles de débit en fonction de la probabilité de
      dépassement sur l'horizon proche [2021-01-01, 2050-12-31] ;
      la fiche produit ses deux coordonnées (FDC_H1_p, probabilités
      sans unité ; FDC_H1_Q, quantiles de débit)
    method: "1. aucune agrégation temporelle - courbes des débits classés avec 1000 points espacés selon une loi normale centrée réduite"
    classification:
      domain: débit
      phenomenon: moyennes eaux
      aspect: intensité
      season: chronique
      output: courbe

  global:
    input_vars: Q
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    func:
      FDC_H1_p: [fdc_probabilities, {n: 1000, norm_spacing: true}]
      FDC_H1_Q: [fdc_quantiles, "Q", {n: 1000, norm_spacing: true}]
    period: ["2021-01-01", "2050-12-31"]
    time_step: none
    max_na_years: 10
