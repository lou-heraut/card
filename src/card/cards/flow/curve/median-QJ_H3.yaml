id: median-QJ_H3
version: "1.0.1"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-07-18"

meta:
  en:
    variable: median-QJ_H3
    unit: "m^{3}.s^{-1}"
    name: Median inter-annual flow of distant horizon
    description: ""
    method: "1. aggregation by day of the year over the distant horizon [2070-01-01, 2099-12-31] - median"
    classification:
      domain: flow
      phenomenon: mean flows
      aspect: magnitude
      season: record
      output: curve

  fr:
    variable: mediane-QJ_H3
    unit: "m^{3}.s^{-1}"
    name: "Débit médian inter-annuel de l'horizon lointain"
    description: ""
    method: "1. agrégation par jour de l'année sur l'horizon lointain [2070-01-01, 2099-12-31] - médiane"
    classification:
      domain: débit
      phenomenon: moyennes eaux
      aspect: intensité
      season: chronique
      output: courbe

  global:
    input_vars: Q
    palette: ["#452C1A", "#7F4A23", "#B3762A", "#D4B86A", "#EFE0B0",
              "#BCE6DB", "#7ACEB9", "#449C93", "#2A6863", "#193830"]

process:
  P1:
    func:
      median-QJ_H3: [nanmedian, "Q"]
    period: ["2070-01-01", "2099-12-31"]
    time_step: yearday
