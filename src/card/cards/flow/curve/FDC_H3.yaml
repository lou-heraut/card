id: FDC_H3
version: "1.0"
authors: ["Louis Héraut (INRAE, UR RiverLy)"]
date: "2026-04-30"

meta:
  en:
    variable: FDC_H3
    unit: "m^{3}.s^{-1}"
    name: Flow duration curve of the distant horizon
    description: >-
      Curve of flow quantiles as a function of exceedance probability over the distant horizon [2070-01-01, 2099-12-31];
      the card outputs its two coordinates (FDC_H3_p, unitless
      probabilities; FDC_H3_Q, flow quantiles)
    method: "1. no temporal aggregation - flow duration curves with 1000 points spaced according to a centered reduced normal distribution."
    classification:
      domain: flow
      phenomenon: mean flows
      aspect: magnitude
      season: record
      output: curve

  fr:
    variable: CDC_H3
    unit: "m^{3}.s^{-1}"
    name: Courbe des débits classés de l'horizon lointain
    description: >-
      Courbe des quantiles de débit en fonction de la probabilité de
      dépassement sur l'horizon lointain [2070-01-01, 2099-12-31] ;
      la fiche produit ses deux coordonnées (FDC_H3_p, probabilités
      sans unité ; FDC_H3_Q, quantiles de débit)
    method: "1. aucune agrégation temporelle - courbes des débits classés avec 1000 points espacés selon une loi normale centrée réduite"
    classification:
      domain: débit
      phenomenon: moyennes eaux
      aspect: intensité
      season: chronique
      output: courbe

  global:
    input_vars: Q

process:
  P1:
    func:
      FDC_H3_p: [fdc_probabilities, {n: 1000, norm_spacing: true}]
      FDC_H3_Q: [fdc_quantiles, "Q", {n: 1000, norm_spacing: true}]
    period: ["2070-01-01", "2099-12-31"]
    time_step: none
    max_na_years: 10
